<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  
  <link rel="icon" href="images/favicon.ico" sizes="any">
  <link rel="icon" type="image/png" sizes="32x32" href="images/favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="images/favicon-16x16.png">
  <link rel="apple-touch-icon" href="images/apple-touch-icon.png">
  <link rel="manifest" href="images/site.webmanifest">
  
  <title>Lilou｜後台管理系統</title>

  <!--Developed by TylerChen Design 2026-->
  <style>
    :root {
      --admin-text-xs: 13px;
      --admin-text-sm: 14px;
      --admin-text-base: 15px;
      --admin-text-md: 16px;
      --admin-text-lg: 18px;
      --admin-text-xl: 22px;
    }
    html { font-size: 15px; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans TC", "PingFang TC", "Microsoft JhengHei", sans-serif;
      font-size: var(--admin-text-base);
      line-height: 1.55;
      letter-spacing: .005em;
    }
    input, select, textarea {
      -webkit-appearance:none;
      appearance:none;
      font-size: var(--admin-text-sm);
      line-height: 1.4;
    }
    textarea { min-height: 44px; }
    .tab-active { background:#5B7290; color:#fff; }
    .tab-idle { background:#fff; color:#57534e; }
    .tab-btn { font-size: var(--admin-text-base) !important; }
    .mono { font-variant-numeric: tabular-nums; }

    /* 字級重新整理：保留清楚閱讀感，僅縮小篩選與表格欄位，不壓到內容文字 */
    #adminPanel input,
    #adminPanel select,
    #adminPanel textarea {
      font-size: var(--admin-text-sm) !important;
      font-weight: 700;
    }
    #adminPanel button {
      font-size: var(--admin-text-sm);
    }
    #tab-orders input,
    #tab-orders select,
    #tab-orders button,
    #tab-dashboard input,
    #tab-dashboard select,
    #tab-dashboard button {
      font-size: var(--admin-text-sm) !important;
    }
    article[data-order-id] {
      font-size: var(--admin-text-base);
    }
    article[data-order-id] .text-lg,
    article[data-order-id] .md\:text-lg {
      font-size: var(--admin-text-xl) !important;
      line-height: 1.25 !important;
    }
    article[data-order-id] .text-base,
    article[data-order-id] .md\:text-base {
      font-size: var(--admin-text-md) !important;
      line-height: 1.4 !important;
    }
    article[data-order-id] .text-sm {
      font-size: var(--admin-text-base) !important;
      line-height: 1.5 !important;
    }
    table input,
    table select,
    table textarea {
      font-size: var(--admin-text-sm) !important;
    }
    .dashboard-kpi-label {
      font-size: 13px;
      line-height: 1.35;
      letter-spacing: .02em;
      font-weight: 500 !important;
    }
    .dashboard-kpi-value {
      font-size: 30px;
      line-height: 1.15;
      letter-spacing: -.015em;
      font-weight: 600 !important;
    }
    .dashboard-money-value {
      font-size: 31px;
      line-height: 1.12;
      letter-spacing: -.025em;
      font-weight: 600 !important;
    }
    @media (max-width: 640px) {
      /* 手機保留 16px，避免 iOS 輸入時自動放大 */
      #adminPanel input,
      #adminPanel select,
      #adminPanel textarea {
        font-size: 16px !important;
      }
      .tab-btn { font-size: 14px !important; }
      .dashboard-kpi-value { font-size: 24px; }
      .dashboard-money-value { font-size: 26px; }
      article[data-order-id] .text-lg,
      article[data-order-id] .md\:text-lg { font-size: 19px !important; }
    }
    .order-item-chip {
      font-size: 14px !important;
      line-height: 1.35 !important;
      font-weight: 500 !important;
      padding: 5px 10px !important;
      border-radius: 999px;
    }
    .order-item-chip .qty {
      font-weight: 600 !important;
      margin-left: 4px;
    }
    .order-group-item-chip {
      font-size: 14px !important;
      line-height: 1.4 !important;
      font-weight: 500 !important;
      padding: 5px 9px !important;
    }
    .order-group-title {
      font-size: 16px !important;
      line-height: 1.35 !important;
      font-weight: 700 !important;
    }
    .order-detail-title {
      font-size: 13px !important;
      letter-spacing: .08em;
      font-weight: 600 !important;
    }
    @media (max-width: 640px) {
      .order-item-chip,
      .order-group-item-chip {
        font-size: 14px !important;
      }
      .order-group-title {
        font-size: 16px !important;
      }
    }
    .dashboard-filter-panel summary::-webkit-details-marker,
    .admin-filter-panel summary::-webkit-details-marker { display: none; }
    .dashboard-filter-panel summary,
    .admin-filter-panel summary { list-style: none; }
    @media (min-width: 768px) {
      .dashboard-filter-panel summary,
      .admin-filter-panel summary { display: none; }
    }

    .admin-toast {
      transform: translateY(16px);
      opacity: 0;
      transition: opacity .22s ease, transform .22s ease;
      box-shadow: 0 18px 40px rgba(28, 23, 21, .16);
    }
    .admin-toast.show { transform: translateY(0); opacity: 1; }
    .admin-toast-spinner {
      width: 16px; height: 16px; border-radius: 999px;
      border: 2px solid rgba(255,255,255,.45);
      border-top-color: #fff;
      animation: adminSpin .75s linear infinite;
    }
    @keyframes adminSpin { to { transform: rotate(360deg); } }

    table[data-edit-table="products"] input[data-key="price"],
    table[data-edit-table="products"] input[data-key="stock"],
    table[data-edit-table="products"] input[data-key="sort"],
    table[data-edit-table="packaging"] input[data-key="extra_price"],
    table[data-edit-table="packaging"] input[data-key="box_size"],
    table[data-edit-table="packaging"] input[data-key="sort"],
    table[data-edit-table="coupons"] input[data-key="value"],
    table[data-edit-table="coupons"] input[data-key="min_spend"] {
      padding-left: 10px !important;
      padding-right: 10px !important;
      text-align: left;
    }
  
/* 訂單卡片一般資訊：降低字重，手機版日期與下單時間分行 */
.order-meta-line {
  font-weight: 500 !important;
  color: #44403C !important;
  line-height: 1.6 !important;
}
.order-meta-date-row {
  display: flex;
  flex-wrap: wrap;
  gap: 0 0.35rem;
}
.order-meta-date-row .order-meta-part {
  white-space: nowrap;
}
@media (max-width: 640px) {
  .order-meta-date-row {
    display: block;
  }
  .order-meta-date-row .order-meta-separator {
    display: none;
  }
  .order-meta-date-row .order-meta-part {
    display: block;
    white-space: nowrap;
  }
}

</style>
</head>
<body class="bg-[#F4F6F9] text-stone-800 min-h-screen">
  <header class="bg-[#5B7290] text-white sticky top-0 z-40 shadow-sm">
    <div class="max-w-7xl mx-auto px-4 py-4 flex items-center justify-between gap-3">
      <div>
        <h1 class="text-sm md:text-lg font-black tracking-wide">LILOU｜後台管理系統 2.0</h1>
      </div>
      <div class="flex items-center gap-2">
        <button id="adminReloadBtn" onclick="loadAll()" title="重新整理資料" class="hidden border border-white/30 rounded-xl px-3 py-2 text-xs font-black hover:bg-white/10">重新整理</button>
        <button id="logoutBtn" onclick="logoutAdmin()" class="hidden border border-white/30 rounded-xl px-3 py-2 text-xs font-black hover:bg-white/10">登出</button>
      </div>
    </div>
  </header>

  <main class="max-w-7xl mx-auto p-4 md:p-6">
    <section id="loginPanel" class="bg-white rounded-3xl border border-stone-100 shadow-sm p-5 md:p-8 max-w-md mx-auto mt-10 space-y-4">
      <div>
        <h2 class="text-xl font-black text-stone-900">後台登入</h2>
        <p class="text-sm text-stone-500 mt-1">此頁不會顯示在前台，請輸入管理密碼。</p>
      </div>
      <div>
        <label class="text-xs font-black text-stone-500 tracking-widest">管理密碼</label>
        <input id="adminPassword" type="password" class="mt-1 w-full h-12 rounded-xl border border-stone-200 px-3 bg-stone-50 focus:outline-none focus:border-[#5B7290]" placeholder="請輸入密碼">
      </div>
      <button onclick="adminLogin()" class="w-full h-12 rounded-xl bg-[#5B7290] text-white font-black tracking-widest hover:bg-[#3E4F66]">登入</button>
      <p id="loginMessage" class="hidden text-sm font-bold"></p>
    </section>

    <section id="adminPanel" class="hidden space-y-5">
      <div class="bg-white rounded-3xl border border-stone-100 shadow-sm p-3 overflow-x-auto">
        <div id="tabs" class="flex gap-2 min-w-max">
          <button onclick="switchTab('dashboard')" data-tab="dashboard" class="tab-btn px-4 py-2 rounded-xl font-black text-sm tab-active">Dashboard</button>
          <button onclick="switchTab('orders')" data-tab="orders" class="tab-btn px-4 py-2 rounded-xl font-black text-sm tab-idle">訂單管理</button>
          <button onclick="switchTab('products')" data-tab="products" class="tab-btn px-4 py-2 rounded-xl font-black text-sm tab-idle">產品</button>
          <button onclick="switchTab('packaging')" data-tab="packaging" class="tab-btn px-4 py-2 rounded-xl font-black text-sm tab-idle">包裝</button>
          <button onclick="switchTab('coupons')" data-tab="coupons" class="tab-btn px-4 py-2 rounded-xl font-black text-sm tab-idle">優惠券</button>
          <button onclick="switchTab('settings')" data-tab="settings" class="tab-btn px-4 py-2 rounded-xl font-black text-sm tab-idle">日期設定</button>
          <button onclick="switchTab('revenue')" data-tab="revenue" class="tab-btn px-4 py-2 rounded-xl font-black text-sm tab-idle">分潤統計</button>
        </div>
      </div>

      <p id="adminMessage" class="hidden text-sm font-bold" aria-live="polite"></p>

      <section id="tab-dashboard" class="tab-page space-y-5"></section>
      <section id="tab-orders" class="tab-page hidden space-y-5"></section>
      <section id="tab-products" class="tab-page hidden space-y-5"></section>
      <section id="tab-packaging" class="tab-page hidden space-y-5"></section>
      <section id="tab-coupons" class="tab-page hidden space-y-5"></section>
      <section id="tab-settings" class="tab-page hidden space-y-5"></section>
      <section id="tab-revenue" class="tab-page hidden space-y-5"></section>
    </section>
  </main>
  <div id="adminToastArea" class="fixed right-4 bottom-4 z-[9999] flex flex-col gap-2 pointer-events-none"></div>

<script>
const API_URL = "https://script.google.com/macros/s/AKfycbyA3ovLtC-hDYGL-_9CMNKk9A--TcrU-W-mN6Hc0GaZ8eDrvAsew3ZdtYBLSyimuiU/exec";
const TOKEN_KEY = "lilou_admin_token";
let adminData = null;
let currentTab = "dashboard";

function escapeHtml(value) {
  return (value ?? "").toString()
    .replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;")
    .replace(/"/g, "&quot;").replace(/'/g, "&#039;");
}

function showMessage(id, text, type = "info") {
  const el = document.getElementById(id);
  el.textContent = text;
  el.classList.remove("hidden", "text-red-500", "text-emerald-600", "text-stone-500");
  el.classList.add(type === "error" ? "text-red-500" : type === "success" ? "text-emerald-600" : "text-stone-500");
}

function formatAdminNow() {
  const now = new Date();
  return now.getFullYear() + "/" +
    String(now.getMonth() + 1).padStart(2, "0") + "/" +
    String(now.getDate()).padStart(2, "0") + " " +
    String(now.getHours()).padStart(2, "0") + ":" +
    String(now.getMinutes()).padStart(2, "0") + ":" +
    String(now.getSeconds()).padStart(2, "0");
}

function showSuccessMessage(id, text) {
  showMessage(id, `✅ ${text}（${formatAdminNow()}）`, "success");
}

function hideAdminInlineMessage() {
  const el = document.getElementById("adminMessage");
  if (!el) return;
  el.textContent = "";
  el.classList.add("hidden");
}

function showAdminToast(message, type = "info", duration = 2600) {
  const area = document.getElementById("adminToastArea");
  if (!area) return;

  const toast = document.createElement("div");
  const isError = type === "error";
  const isSuccess = type === "success";
  const isLoading = type === "loading";
  const bgClass = isError ? "bg-red-600" : isSuccess ? "bg-emerald-600" : "bg-[#5B7290]";
  const icon = isLoading ? `<span class="admin-toast-spinner"></span>` : isError ? "❌" : isSuccess ? "✅" : "ℹ️";

  toast.className = `admin-toast pointer-events-auto ${bgClass} text-white rounded-2xl px-4 py-3 min-w-[220px] max-w-[340px] flex items-center gap-2 text-sm font-black tracking-wide`;
  toast.innerHTML = `<span class="shrink-0">${icon}</span><span class="leading-relaxed">${escapeHtml(message)}</span>`;
  area.appendChild(toast);

  requestAnimationFrame(() => toast.classList.add("show"));

  if (duration !== 0) {
    setTimeout(() => removeAdminToast(toast), duration);
  }
  return toast;
}

function removeAdminToast(toast) {
  if (!toast) return;
  toast.classList.remove("show");
  setTimeout(() => toast.remove(), 240);
}

function setButtonLoading(button, loadingText) {
  if (!button || button.tagName !== "BUTTON") return null;
  const original = {
    text: button.innerHTML,
    disabled: button.disabled
  };
  button.disabled = true;
  button.classList.add("opacity-70", "cursor-wait");
  button.innerHTML = `<span class="inline-flex items-center gap-2"><span class="admin-toast-spinner !w-4 !h-4"></span>${escapeHtml(loadingText || "處理中...")}</span>`;
  return function restoreButton() {
    button.disabled = original.disabled;
    button.classList.remove("opacity-70", "cursor-wait");
    button.innerHTML = original.text;
  };
}

function getActiveActionButton() {
  const active = document.activeElement;
  return active && active.tagName === "BUTTON" ? active : null;
}

function getToken() { return localStorage.getItem(TOKEN_KEY) || ""; }

function setLoggedInState(isLoggedIn) {
  document.getElementById("loginPanel").classList.toggle("hidden", isLoggedIn);
  document.getElementById("adminPanel").classList.toggle("hidden", !isLoggedIn);
  document.getElementById("logoutBtn").classList.toggle("hidden", !isLoggedIn);
  document.getElementById("adminReloadBtn")?.classList.toggle("hidden", !isLoggedIn);
}

async function adminLogin() {
  const password = document.getElementById("adminPassword").value.trim();
  if (!password) { showMessage("loginMessage", "請輸入管理密碼。", "error"); return; }
  showMessage("loginMessage", "登入中...", "info");
  try {
    const res = await fetch(`${API_URL}?action=adminLogin&password=${encodeURIComponent(password)}&_=${Date.now()}`);
    const data = await res.json();
    if (data.status !== "success") { showMessage("loginMessage", data.message || "登入失敗。", "error"); return; }
    localStorage.setItem(TOKEN_KEY, data.token);
    setLoggedInState(true);
    await loadAll();
  } catch (err) {
    showMessage("loginMessage", "登入失敗：" + err.message, "error");
  }
}

function logoutAdmin() {
  localStorage.removeItem(TOKEN_KEY);
  adminData = null;
  setLoggedInState(false);
}

function switchTab(tab) {
  currentTab = tab;
  document.querySelectorAll(".tab-btn").forEach(btn => {
    const active = btn.dataset.tab === tab;
    btn.classList.toggle("tab-active", active);
    btn.classList.toggle("tab-idle", !active);
  });
  document.querySelectorAll(".tab-page").forEach(page => page.classList.add("hidden"));
  document.getElementById("tab-" + tab).classList.remove("hidden");
}

async function loadAll() {
  const token = getToken();
  if (!token) { setLoggedInState(false); return; }
  const restoreButton = setButtonLoading(getActiveActionButton(), "同步中...");
  const loadingToast = showAdminToast("同步資料中...", "loading", 0);
  hideAdminInlineMessage();
  try {
    const res = await fetch(`${API_URL}?action=adminGetAll&token=${encodeURIComponent(token)}&_=${Date.now()}`);
    const data = await res.json();
    if (data.status !== "success") {
      hideAdminInlineMessage();
      removeAdminToast(loadingToast);
      showAdminToast(data.message || "載入失敗。", "error");
      if ((data.message || "").includes("登入")) logoutAdmin();
      return;
    }
    adminData = data;
    renderAll();
    hideAdminInlineMessage();
    removeAdminToast(loadingToast);
    showAdminToast(`資料已更新 ${formatAdminNow().slice(11)}`, "success");
  } catch (err) {
    hideAdminInlineMessage();
    removeAdminToast(loadingToast);
    showAdminToast("載入失敗：" + err.message, "error", 4200);
  } finally {
    if (restoreButton) restoreButton();
  }
}

function renderAll() {
  renderDashboard();
  renderOrders();
  renderProducts();
  renderPackaging();
  renderCoupons();
  renderSettings();
  renderRevenueShare();
  switchTab(currentTab);
}


function normalizePackageForSummary(packageName) {
  const raw = (packageName || "未命名包裝").toString().trim();
  const match = raw.match(/^(.*?)(?:\s*[x×]\s*(\d+)\s*組)\s*$/i);
  if (match) {
    return {
      name: (match[1] || "未命名包裝").trim(),
      qty: Math.max(1, parseInt(match[2], 10) || 1)
    };
  }
  return { name: raw || "未命名包裝", qty: 1 };
}

function parseOrderDetailGroups(details) {
  const text = (details || "").toString().trim();
  const groups = [];
  if (!text) return { text, groups };

  const regex = /【第(\d+)組:\s*([^】]+)】([\s\S]*?)(?=\s*｜\s*【第\d+組:|$)/g;
  let match;
  while ((match = regex.exec(text)) !== null) {
    const groupNo = match[1];
    const packageInfo = normalizePackageForSummary(match[2]);
    const packageName = packageInfo.name;
    const packageQty = packageInfo.qty;
    const itemsText = (match[3] || "").trim().replace(/^｜\s*/, "");
    const items = itemsText
      .split(/、/)
      .map(item => item.trim())
      .filter(Boolean);
    groups.push({ groupNo, packageName, packageQty, items });
  }
  return { text, groups };
}

function summarizeOrderItems(details) {
  const { text, groups } = parseOrderDetailGroups(details);
  const itemSummary = {};

  if (groups.length) {
    groups.forEach(group => {
      group.items.forEach(item => {
        const itemMatch = item.match(/^(.+?)[(（](\d+)/);
        if (itemMatch) {
          const itemName = itemMatch[1].trim();
          const qty = parseInt(itemMatch[2], 10) || 0;
          if (itemName && qty) itemSummary[itemName] = (itemSummary[itemName] || 0) + qty;
        }
      });
    });
  } else if (text) {
    const itemRegex = /([^、｜()（）]+)[(（](\d+)/g;
    let itemMatch;
    while ((itemMatch = itemRegex.exec(text)) !== null) {
      const name = itemMatch[1].trim();
      const qty = Number(itemMatch[2]) || 0;
      if (name && qty) itemSummary[name] = (itemSummary[name] || 0) + qty;
    }
  }

  return { text, groups, itemSummary };
}

function formatOrderDetailsAdmin(details) {
  const { text, groups, itemSummary } = summarizeOrderItems(details);
  if (!text) return `<p class="text-stone-400 font-medium">無商品明細</p>`;

  const itemChips = Object.entries(itemSummary)
    .sort((a, b) => b[1] - a[1])
    .map(([name, qty]) => `
      <span class="order-item-chip inline-flex items-center rounded-full bg-white border border-stone-200 text-stone-800">
        <span>${escapeHtml(name)}</span>
        <span class="qty">× ${qty}</span>
      </span>
    `)
    .join("");

  if (!groups.length && !itemChips) {
    return `<div class="whitespace-pre-wrap text-stone-700 font-medium leading-relaxed bg-white border border-stone-200 rounded-2xl p-3">${escapeHtml(text)}</div>`;
  }

  return `<div class="bg-white border border-stone-200 rounded-xl px-3 py-2 space-y-1.5">
    <div class="font-semibold text-stone-800 text-sm">共 ${groups.length || "-"} 組</div>
    <div class="flex flex-wrap gap-1.5">${itemChips || `<span class="text-xs text-stone-400 font-medium">無品項統計</span>`}</div>
  </div>`;
}

function normalizeProductLookupKey(value) {
  return (value || "").toString()
    .toLowerCase()
    .replace(/[\s\u3000]/g, "")
    .replace(/[()（）【】\[\]・·,，、\/／\-＿_]/g, "")
    .replace(/迷你可麗露|大顆可麗露|可麗露|迷你露|口味|兩入袋|兩入|袋裝|袋/g, "")
    .trim();
}

function getProductUnitPriceByName(itemName) {
  const target = (itemName || "").toString().trim();
  if (!target) return 0;
  const products = adminData?.products || [];

  const exact = products.find(p => (p.name || "").toString().trim() === target);
  if (exact) return parseMoneyNumber(exact.price || 0);

  const targetKey = normalizeProductLookupKey(target);
  const found = products.find(p => {
    const productName = (p.name || "").toString().trim();
    const productKey = normalizeProductLookupKey(productName);
    if (!productName || !productKey || !targetKey) return false;
    return productName.includes(target) || target.includes(productName) ||
      productKey === targetKey || productKey.includes(targetKey) || targetKey.includes(productKey);
  });
  return parseMoneyNumber(found?.price || 0);
}

function parseGroupItemForAmount(itemText) {
  const raw = (itemText || "").toString().trim();
  const match = raw.match(/^(.+?)[(（](\d+)/);
  if (!match) return { name: raw, qty: 0 };
  return {
    name: (match[1] || "").trim(),
    qty: Number(match[2]) || 0
  };
}

function calculateGroupAmount(group) {
  return (group.items || []).reduce((sum, item) => {
    const parsed = parseGroupItemForAmount(item);
    if (!parsed.name || !parsed.qty) return sum;
    return sum + getProductUnitPriceByName(parsed.name) * parsed.qty;
  }, 0);
}

function getOrderSubtotalForGroupAmount(order) {
  return getOrderAmountNumbers(order).subtotal;
}

function buildGroupAmountMap(groups, order) {
  const amounts = (groups || []).map(group => calculateGroupAmount(group));
  const subtotal = getOrderSubtotalForGroupAmount(order);
  const knownSum = amounts.reduce((sum, value) => sum + value, 0);
  const unknownIndexes = amounts
    .map((value, index) => value > 0 ? -1 : index)
    .filter(index => index >= 0);

  if (subtotal > 0 && unknownIndexes.length && knownSum < subtotal) {
    const remaining = subtotal - knownSum;
    if (unknownIndexes.length === 1) {
      amounts[unknownIndexes[0]] = remaining;
    } else {
      const weights = unknownIndexes.map(index => {
        const qty = (groups[index].items || []).reduce((sum, item) => sum + (parseGroupItemForAmount(item).qty || 0), 0);
        return qty || 1;
      });
      const weightSum = weights.reduce((sum, value) => sum + value, 0) || unknownIndexes.length;
      let assigned = 0;
      unknownIndexes.forEach((index, position) => {
        const value = position === unknownIndexes.length - 1
          ? remaining - assigned
          : Math.round(remaining * weights[position] / weightSum);
        amounts[index] = value;
        assigned += value;
      });
    }
  }
  return amounts;
}

function parseMoneyNumber(value) {
  const n = Number((value || "").toString().replace(/[^0-9.-]/g, ""));
  return isNaN(n) ? 0 : n;
}

function formatMoneyForOrder(value) {
  const n = parseMoneyNumber(value);
  return "NT$" + Math.round(n).toLocaleString("zh-TW");
}

function formatSignedMoneyForOrder(value, forceMinus = false) {
  const n = parseMoneyNumber(value);
  const absValue = Math.abs(n);
  if (!absValue) return "NT$0";
  const sign = forceMinus || n < 0 ? "-" : "+";
  return sign + "NT$" + Math.round(absValue).toLocaleString("zh-TW");
}

function firstAmountValue(order, keys) {
  if (!order) return 0;
  for (const key of keys) {
    if (order[key] !== undefined && order[key] !== null && order[key] !== "") {
      return parseMoneyNumber(order[key]);
    }
  }
  return 0;
}

function getOrderAmountNumbers(order) {
  const total = firstAmountValue(order, ["total", "totalPrice", "Total_Price", "total_price", "Total"]);
  const shipping = firstAmountValue(order, ["shippingFee", "shipping_fee", "Shipping_Fee", "ShippingFee"]);
  const discountRaw = firstAmountValue(order, ["discountAmount", "discount_amount", "Discount_Amount", "DiscountAmount"]);
  const discount = Math.abs(discountRaw);
  let subtotal = firstAmountValue(order, ["productSubtotal", "subtotalAmount", "subtotal_amount", "Subtotal_Amount", "SubtotalAmount"]);

  if (!subtotal && total) {
    subtotal = Math.max(0, total - shipping + discount);
  }

  const finalTotal = total || Math.max(0, subtotal + shipping - discount);
  return { subtotal, discount, shipping, total: finalTotal };
}

        const qty = Number(itemMatch[2]) || 0;

function formatMonthDayWithWeekday(value) {

function formatCurrency(value) {
  const n = Number(value || 0);
  return "NT$" + Math.round(isNaN(n) ? 0 : n).toLocaleString("zh-TW");
}

function getOrderCreatedDate(order) {
  const timestampDate = normalizeOrderDateForCompare(order.timestamp || "");
  if (timestampDate) return timestampDate;
  return normalizeOrderDateForCompare(order.date || "");
}

function getDateRangeRows(endDate, days) {
  const rows = [];
  for (let i = days - 1; i >= 0; i--) {
    const date = addDaysToDateInput(endDate, -i);
    const parts = date.split("-");
    rows.push({
      date,
      label: `${Number(parts[1])}/${Number(parts[2])}`,
      revenue: 0
    });
  }
  return rows;
}

function getRevenueRowsByCreatedDate(orders, endDate, days) {
  const rows = getDateRangeRows(endDate, days);
  const rowMap = Object.fromEntries(rows.map(row => [row.date, row]));
  orders.forEach(order => {
    const createdDate = getOrderCreatedDate(order);
    if (rowMap[createdDate]) {
      rowMap[createdDate].revenue += parseMoneyNumber(order.total);
    }
  });
  return rows;
}

function sumRevenueByCreatedDate(orders, startDate, endDate) {
  return orders.reduce((sum, order) => {
    const createdDate = getOrderCreatedDate(order);
    if (!createdDate) return sum;
    if (startDate && createdDate < startDate) return sum;
    if (endDate && createdDate > endDate) return sum;
    return sum + parseMoneyNumber(order.total);
  }, 0);
}

function renderRevenueLineChart(rows) {
  if (!rows || !rows.length) {
    return `<p class="text-stone-400 font-medium">目前無資料</p>`;
  }

  const width = 720;
  const height = 290;

  const left = 54;
  const right = 18;
  const top = 24;
  const bottom = 42;

  const chartWidth = width - left - right;
  const chartHeight = height - top - bottom;

  const maxRevenue = Math.max(...rows.map(r => r.revenue), 1);
  const midValue = Math.round(maxRevenue / 2);

  const points = rows.map((row, index) => {
    const x = rows.length === 1
      ? left + chartWidth / 2
      : left + (chartWidth * index / (rows.length - 1));

    const y = top + chartHeight - (row.revenue / maxRevenue * chartHeight);

    return {
      ...row,
      x,
      y
    };
  });

  const pointLine = points.map(p => `${p.x},${p.y}`).join(" ");
  const areaLine = `${left},${top + chartHeight} ${pointLine} ${left + chartWidth},${top + chartHeight}`;

  // 最多顯示 7 個日期
  const labelInterval = Math.max(1, Math.ceil(points.length / 7));

  return `
  <div>
    <svg
      viewBox="0 0 ${width} ${height}"
      class="w-full h-[280px]"
      role="img"
      aria-label="每日營業額">

      <!-- Y 軸 -->
      <line x1="${left}" y1="${top}" x2="${left}" y2="${top + chartHeight}" stroke="#E7E5E4"/>
      <line x1="${left}" y1="${top + chartHeight}" x2="${left + chartWidth}" y2="${top + chartHeight}" stroke="#E7E5E4"/>
      <line x1="${left}" y1="${top + chartHeight/2}" x2="${left + chartWidth}" y2="${top + chartHeight/2}" stroke="#F1F0EE"/>

      <text x="${left-8}" y="${top+4}" text-anchor="end" font-size="11" fill="#A8A29E">
        ${formatCurrency(maxRevenue)}
      </text>

      <text x="${left-8}" y="${top + chartHeight/2 +4}" text-anchor="end" font-size="11" fill="#A8A29E">
        ${formatCurrency(midValue)}
      </text>

      <text x="${left-8}" y="${top + chartHeight +4}" text-anchor="end" font-size="11" fill="#A8A29E">
        NT$0
      </text>

      <!-- 面積 -->
      <polygon
        points="${areaLine}"
        fill="#5B7290"
        opacity="0.08">
      </polygon>

      <!-- 曲線 -->
      <polyline
        points="${pointLine}"
        fill="none"
        stroke="#5B7290"
        stroke-width="3"
        stroke-linejoin="round"
        stroke-linecap="round">
      </polyline>

      <!-- 點 -->
      ${points.map(point => `
        <circle
          cx="${point.x}"
          cy="${point.y}"
          r="4"
          fill="#5B7290">
          <title>${escapeHtml(point.label)}：${formatCurrency(point.revenue)}</title>
        </circle>
      `).join("")}

      <!-- X 軸日期 -->
      ${points
        .filter((point, index) =>
          index % labelInterval === 0 ||
          index === points.length - 1
        )
        .map(point => `
          <text
            x="${point.x}"
            y="${top + chartHeight + 30}"
            text-anchor="middle"
            font-size="12"
            fill="#78716C"
            font-weight="500">
            ${escapeHtml(point.label)}
          </text>
        `).join("")}

    </svg>
  </div>`;
}

function renderSalesRankingChart(productionSummary) {
  const rawEntries = Object.entries(productionSummary || {})
    .filter(([, qty]) => Number(qty) > 0)

  if (!rawEntries.length) {
    return `<div class="bg-white rounded-3xl border border-stone-100 shadow-sm p-4 md:p-5">

  const topEntries = rawEntries.slice(0, 6);
  const otherQty = rawEntries.slice(6).reduce((sum, [, qty]) => sum + qty, 0);
  const entries = otherQty > 0 ? topEntries.concat([["其他", otherQty]]) : topEntries;
  const total = entries.reduce((sum, [, qty]) => sum + qty, 0) || 1;
  const colors = ["#5B7290", "#8CA0B8", "#D5A373", "#B5838D", "#7A9E7E", "#A98467", "#D6D3D1"];
  let degree = 0;
  const segments = entries.map(([name, qty], index) => {
    const start = degree;
    const end = degree + (qty / total * 360);
    degree = end;
    return `${colors[index % colors.length]} ${start}deg ${end}deg`;

function getDateRangeRowsBetween(startDate, endDate) {
  const start = normalizeOrderDateForCompare(startDate);
  const end = normalizeOrderDateForCompare(endDate);
  if (!start || !end) return getDateRangeRows(getTodayDateInputValue(), 7);
  const rows = [];
  const startObj = new Date(start + "T00:00:00");
  const endObj = new Date(end + "T00:00:00");
  if (isNaN(startObj.getTime()) || isNaN(endObj.getTime()) || startObj > endObj) return [];
  const maxDays = 62;
  let current = new Date(startObj);
  let count = 0;
  while (current <= endObj && count < maxDays) {
    const date = formatDateInputValue(current);
    const parts = date.split("-");
    rows.push({ date, label: `${Number(parts[1])}/${Number(parts[2])}`, revenue: 0 });
    current.setDate(current.getDate() + 1);
    count++;
  }
  return rows;
}

function getRevenueRowsForRange(orders, startDate, endDate) {
  const rows = getDateRangeRowsBetween(startDate, endDate);
  const rowMap = Object.fromEntries(rows.map(row => [row.date, row]));
  orders.forEach(order => {
    const createdDate = getOrderCreatedDate(order);
    if (rowMap[createdDate]) rowMap[createdDate].revenue += parseMoneyNumber(order.total);
  });
  return rows;
}

function getDashboardDefaultRange() {
  return { start: "", end: "" };
}

function getDashboardSevenDayRange() {
  const today = getTodayDateInputValue();
  return { start: addDaysToDateInput(today, -6), end: today };
}

function getDashboardFilterState() {
  const fallback = getDashboardDefaultRange();
  const start = document.getElementById("dashboardStartDate")?.value || fallback.start;
  const end = document.getElementById("dashboardEndDate")?.value || fallback.end;
  const method = document.getElementById("dashboardMethodFilter")?.value || "";
  return { start, end, method };
}

function getDashboardPeriodLabel(start, end) {
  const seven = getDashboardSevenDayRange();
  if (!start && !end) return "全部期間";
  if (start === seven.start && end === seven.end) return "近 7 日";
  if (start && end) return `${start.replace(/-/g, "/")}～${end.replace(/-/g, "/")}`;
  if (start && !end) return `${start.replace(/-/g, "/")} 之後`;
  if (!start && end) return `${end.replace(/-/g, "/")} 以前`;
  return "全部期間";
}

function getDashboardRangeMode(start, end) {
  const today = getTodayDateInputValue();
  const seven = getDashboardSevenDayRange();
  const now = new Date(today + "T00:00:00");
  const monthStart = formatDateInputValue(
    new Date(now.getFullYear(), now.getMonth(), 1)
  );
  const monthEnd = formatDateInputValue(
    new Date(now.getFullYear(), now.getMonth() + 1, 0)
  );
  if (!start && !end) return "all";
  if (start === today && end === today) return "today";
  if (start === seven.start && end === seven.end) return "seven";
  if (start === monthStart && end === monthEnd) return "month";
  return "custom";
}

function dashboardRangeButton(mode, label) {
  return `<button data-dashboard-range="${mode}" onclick="setDashboardRange('${mode}')" class="dashboard-range-btn flex-1 h-11 rounded-xl border px-3 font-semibold text-xs transition-colors">${label}</button>`;
}

function orderPassDashboardFilter(order, state) {
  const createdDate = getOrderCreatedDate(order);
  const startOk = !state.start || (createdDate && createdDate >= state.start);
  const endOk = !state.end || (createdDate && createdDate <= state.end);
  const methodOk = !state.method || getOrderMethodType(order) === state.method;
  return startOk && endOk && methodOk;
}

function openOrderFromDashboard(orderId) {
  if (!orderId) return;

  switchTab("orders");

  requestAnimationFrame(() => {
    const searchInput = document.getElementById("orderSearch");
    const statusFilter = document.getElementById("orderStatusFilter");
    const methodFilter = document.getElementById("orderMethodFilter");
    const startInput = document.getElementById("orderStartDate");
    const endInput = document.getElementById("orderEndDate");

    if (searchInput) searchInput.value = orderId;
    if (statusFilter) statusFilter.value = "";
    if (methodFilter) methodFilter.value = "";
    if (startInput) startInput.value = "";
    if (endInput) endInput.value = "";
    updateOrderRangeButtons("all");

    filterOrders();

    requestAnimationFrame(() => {
      const targetId = (window.CSS && CSS.escape) ? CSS.escape(orderId) : orderId.replace(/"/g, '\\"');
      const card = document.querySelector(`[data-order-id="${targetId}"]`);
      if (!card) return;

      card.scrollIntoView({ behavior: "smooth", block: "center" });

      const details = card.querySelector("details");
      if (details) details.open = true;

      const originalBoxShadow = card.style.boxShadow;
      const originalBackground = card.style.backgroundColor;
      card.style.boxShadow = "0 0 0 3px rgba(91, 114, 144, .28), 0 18px 40px rgba(91, 114, 144, .18)";
      card.style.backgroundColor = "#fffdf5";

      setTimeout(() => {
        card.style.boxShadow = originalBoxShadow;
        card.style.backgroundColor = originalBackground;
      }, 2200);
    });
  });
}

function setDashboardRange(mode) {
  const today = getTodayDateInputValue();
  const startInput = document.getElementById("dashboardStartDate");
  const endInput = document.getElementById("dashboardEndDate");
  if (!startInput || !endInput) return;
  if (mode === "today") {
    startInput.value = today;
    endInput.value = today;
  } else if (mode === "seven") {
    const seven = getDashboardSevenDayRange();
    startInput.value = seven.start;
    endInput.value = seven.end;
  } else if (mode === "month") {
    const now = new Date(today + "T00:00:00");
    startInput.value = formatDateInputValue(new Date(now.getFullYear(), now.getMonth(), 1));
    endInput.value = formatDateInputValue(new Date(now.getFullYear(), now.getMonth() + 1, 0));
  } else if (mode === "all") {
    startInput.value = "";
    endInput.value = "";
  }
  filterDashboard();
}

  const el = document.getElementById("dashboardFilterMobileSummary");

function updateDashboardRangeButtons(state){
    const mode = getDashboardRangeMode(

        state.end

    document
    .querySelectorAll(".dashboard-range-btn")
    .forEach(btn=>{
        const active =
            btn.dataset.dashboardRange===mode;
        btn.classList.toggle("bg-[#5B7290]",active);
        btn.classList.toggle("text-white",active);
        btn.classList.toggle("border-[#5B7290]",active);
        btn.classList.toggle("bg-white",!active);
        btn.classList.toggle("text-stone-600",!active);

function renderDashboardContent() {
  const state = getDashboardFilterState();
  updateDashboardFilterSummary(state);
  updateDashboardRangeButtons(state);
  const today = getTodayDateInputValue();
  const allOrders = adminData.orders || [];
  const activeOrders = allOrders.filter(o => o.orderStatus !== "已取消");
  const filteredActiveOrders = activeOrders.filter(o => orderPassDashboardFilter(o, state));
  const methodStoreOrders = filteredActiveOrders.filter(o => getOrderMethodFamily(o) === "store");
  const methodDeliveryOrders = filteredActiveOrders.filter(o => getOrderMethodFamily(o) === "delivery");
  const summary = summarizeDetailsFromOrders(filteredActiveOrders);
  const revenueRows = getRevenueRowsForRange(filteredActiveOrders, state.start, state.end);
  const periodLabel = getDashboardPeriodLabel(state.start, state.end);

  const rangeRevenue = filteredActiveOrders.reduce((sum, order) => sum + parseMoneyNumber(order.total), 0);
  const storeRevenue = methodStoreOrders.reduce((sum, order) => sum + parseMoneyNumber(order.total), 0);
  const deliveryRevenue = methodDeliveryOrders.reduce((sum, order) => sum + parseMoneyNumber(order.total), 0);

  const todayNewOrders = activeOrders.filter(o => getOrderCreatedDate(o) === today);
  const todayNewStoreOrders = todayNewOrders.filter(o => getOrderMethodFamily(o) === "store").length;
  const todayNewDeliveryOrders = todayNewOrders.filter(o => getOrderMethodFamily(o) === "delivery").length;

  const d = {
    totalOrders: filteredActiveOrders.length,
    confirming: filteredActiveOrders.filter(o => o.orderStatus === "訂單確認中").length,
    pendingPayment: filteredActiveOrders.filter(o => o.orderStatus === "待付款").length,
    waitingShipping: filteredActiveOrders.filter(o => normalizeAdminStatus(o.orderStatus) === "待出貨").length,
    readyPickup: filteredActiveOrders.filter(o => o.orderStatus === "可取貨").length,
    shipped: filteredActiveOrders.filter(o => o.orderStatus === "已出貨").length,
    pickedUp: filteredActiveOrders.filter(o => o.orderStatus === "已完成").length,
    voided: allOrders.filter(o => o.orderStatus === "已取消" && orderPassDashboardFilter(o, state)).length
  };

  document.getElementById("dashboardStatsArea").innerHTML = `
    <div class="text-xs md:text-sm font-medium text-stone-500 -mt-1">目前顯示：${escapeHtml(periodLabel)}｜${getMethodFilterLabel(state.method)}｜依下單日期統計</div>
    ${renderDashboardOpenOrdersReminder(allOrders)}
    <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
      ${dashboardOverviewCard("今日新增訂單", todayNewOrders.length, `今日下單｜門市 ${todayNewStoreOrders}｜店到店 ${todayNewDeliveryOrders}`)}
      ${dashboardOverviewCard("總訂單", d.totalOrders, `已完成 ${d.pickedUp}｜已取消 ${d.voided}`)}
      ${dashboardOverviewCard(periodLabel === "全部期間" ? "總營業額" : periodLabel === "近 7 日" ? "近7天營業額" : "區間營業額", formatCurrency(rangeRevenue), `門市 ${formatCurrency(storeRevenue)}｜店到店 ${formatCurrency(deliveryRevenue)}`)}
    </div>

    ${renderDashboardStatusBar(d)}
    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
      ${renderTodayPickupCard()}
      ${renderDashboardCoupons()}
    </div>
    ${renderFutureSevenDayPreview()}
    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
      ${renderSalesRankingChart(summary.production)}
      ${renderDailyRevenueChart(revenueRows, rangeRevenue, periodLabel)}
    </div>`;
}

function getOrderMethodType(order) {
  const method = (order.shippingMethod || "").toString().trim().toLowerCase();
  const raw = [order.shippingMethod || "", order.address || ""].join(" ").toLowerCase();
  if (method.includes("store")) return "store";
  if (method.includes("取貨付款") || method.includes("cod")) return "delivery_cod";
  if (method.includes("7-11") || method.includes("711")) return "delivery";
  if (raw.includes("取貨付款") || raw.includes("cod")) return "delivery_cod";
  if (raw.includes("7-11") || raw.includes("711")) return "delivery";
  return "store";
}
function getOrderMethodFamily(order) {
  const type = getOrderMethodType(order);
  return type === "store" ? "store" : "delivery";
}
function getOrderShippingLabel(order) {
  return getOrderMethodFamily(order) === "delivery" ? "🚚 7-11 店到店" : "🏪 門市自取";

function statusClass(status) {
  status = normalizeAdminStatus(status);
  if (status === "已取消") return "bg-red-50 text-red-700 border-red-200";
  if (status === "已完成") return "bg-emerald-100 text-emerald-800 border-emerald-300";
  if (status === "已出貨") return "bg-emerald-50 text-emerald-700 border-emerald-200";
  if (status === "待出貨" || status === "可取貨") return "bg-blue-50 text-blue-700 border-blue-200";
  if (status === "待付款") return "bg-amber-50 text-amber-700 border-amber-200";
  return "bg-stone-50 text-stone-700 border-stone-200";
}


function formatDateInputValue(date) {
  const y = date.getFullYear();
  const m = String(date.getMonth() + 1).padStart(2, "0");
  const d = String(date.getDate()).padStart(2, "0");
  return `${y}-${m}-${d}`;
}

function getDefaultMonthRange() {
  const now = new Date();
  const start = new Date(now.getFullYear(), now.getMonth(), 1);
  const end = new Date(now.getFullYear(), now.getMonth() + 1, 0);
  return {
    start: formatDateInputValue(start),
    end: formatDateInputValue(end)
  };
}

function getTodayDateInputValue() {
  return formatDateInputValue(new Date());
}

function setOrderDateFutureDefault() {
  const startInput = document.getElementById("orderStartDate");
  const endInput = document.getElementById("orderEndDate");
  if (!startInput || !endInput) return;
  startInput.value = getTodayDateInputValue();
  endInput.value = "";
  updateOrderRangeButtons("future");
  filterOrders();
}

function normalizeOrderDateForCompare(value) {
  const raw = (value || "").toString().trim();
  if (!raw) return "";

  const match = raw.match(/(\d{4})[\/\-](\d{1,2})[\/\-](\d{1,2})/);
  if (!match) return "";

  const y = match[1];
  const m = String(match[2]).padStart(2, "0");
  const d = String(match[3]).padStart(2, "0");
  return `${y}-${m}-${d}`;
}

function normalizeOrderDateTimeForCompare(value) {
  const raw = (value || "").toString().trim();
  if (!raw) return "";

  const match = raw.match(/(\d{4})[\/\-](\d{1,2})[\/\-](\d{1,2})(?:\s+(\d{1,2}):(\d{1,2})(?::(\d{1,2}))?)?/);
  if (!match) return normalizeOrderDateForCompare(raw);

  const y = match[1];
  const m = String(match[2]).padStart(2, "0");
  const d = String(match[3]).padStart(2, "0");
  const hh = String(match[4] || "0").padStart(2, "0");
  const mm = String(match[5] || "0").padStart(2, "0");
  const ss = String(match[6] || "0").padStart(2, "0");

  return `${y}-${m}-${d} ${hh}:${mm}:${ss}`;
}

function getOrderCreatedDateTime(order) {
  const timestampDateTime = normalizeOrderDateTimeForCompare(order.timestamp || "");
  if (timestampDateTime) return timestampDateTime;
  const createdDate = getOrderCreatedDate(order);
  return createdDate ? `${createdDate} 00:00:00` : "";
}


function setOrderDateDefaultMonth() {

}

function syncOrderFilterDetails() {
  const details = document.getElementById("orderFilterDetails");
  if (!details) return;
  details.open = !!(window.matchMedia && window.matchMedia("(min-width: 768px)").matches);
}

function getOrderRangeLabel(startDate, endDate) {
  if (!startDate && !endDate) return "全部日期";
  const month = getDefaultMonthRange();
  if (startDate === getTodayDateInputValue() && !endDate) return "未來";
  if (startDate === month.start && endDate === month.end) return "本月";
  if (startDate && endDate) return `${startDate.replace(/-/g, "/")}～${endDate.replace(/-/g, "/")}`;
  if (startDate && !endDate) return `${startDate.replace(/-/g, "/")} 之後`;
  return `${endDate.replace(/-/g, "/")} 以前`;
}

function updateOrderFilterSummary(startDate, endDate, method, sortMode) {
  const el = document.getElementById("orderMobileFilterSummary");
  if (!el) return;
  const methodText = getMethodFilterLabel(method);
  el.textContent = `${getOrderRangeLabel(startDate, endDate)}｜${methodText}｜${getOrderSortLabel(sortMode)}`;
}

function updateOrderRangeButtons(mode) {
  document.querySelectorAll(".order-range-btn").forEach(btn => {
    const active = mode && btn.dataset.orderRange === mode;
    btn.style.backgroundColor = active ? "#5B7290" : "#ffffff";
    btn.style.borderColor = active ? "#5B7290" : "#E7E5E4";
    btn.style.color = active ? "#ffffff" : "#57534E";
  });
}

function getOrderRangeMode(startDate, endDate) {
  const month = getDefaultMonthRange();
  if (!startDate && !endDate) return "all";
  if (startDate === getTodayDateInputValue() && !endDate) return "future";
  if (startDate === month.start && endDate === month.end) return "month";
  return "";
}

    arrivalDesc: "取貨／到貨日期遠到近",
    orderDesc: "訂單日期近到遠",
    orderAsc: "訂單日期遠到近",
    amountDesc: "金額高到低",
    amountAsc: "金額低到高"
  };
  return labels[sortMode] || labels.arrivalAsc;
}

function compareTextValue(a, b) {
  return (a || "").toString().localeCompare((b || "").toString());
}

function filterOrders() {
  const q = (document.getElementById("orderSearch")?.value || "").toLowerCase();
  const status = document.getElementById("orderStatusFilter")?.value || "";
  const method = document.getElementById("orderMethodFilter")?.value || "";
  const startDate = document.getElementById("orderStartDate")?.value || "";
  const endDate = document.getElementById("orderEndDate")?.value || "";
  const sortMode = document.getElementById("orderSortFilter")?.value || "orderDesc";

  const orders = (adminData.orders || []).filter(o => {
    const text = [o.id,o.name,o.phone,o.date,o.email,o.shippingMethod,o.address].join(" ").toLowerCase();
    const orderDate = normalizeOrderDateForCompare(o.date);
    const methodType = getOrderMethodType(o);

    const keywordOk = !q || text.includes(q);
    const statusOk =
      status === "已取消"
        ? o.orderStatus === "已取消"
        : ((!status || o.orderStatus === status) && o.orderStatus !== "已取消");
    const methodOk = !method || methodType === method;
    const startOk = !startDate || (orderDate && orderDate >= startDate);
    const endOk = !endDate || (orderDate && orderDate <= endDate);

    return keywordOk && statusOk && methodOk && startOk && endOk;
  }).sort((a, b) => {
    const arrivalA = normalizeOrderDateForCompare(a.date) || "9999-12-31";
    const arrivalB = normalizeOrderDateForCompare(b.date) || "9999-12-31";
    const orderDateA = getOrderCreatedDate(a) || "0000-00-00";
    const orderDateB = getOrderCreatedDate(b) || "0000-00-00";
    const timestampA = getOrderCreatedDateTime(a) || "0000-00-00 00:00:00";
    const timestampB = getOrderCreatedDateTime(b) || "0000-00-00 00:00:00";
    const amountA = parseMoneyNumber(a.total);
    const amountB = parseMoneyNumber(b.total);

    if (sortMode === "amountDesc" || sortMode === "amountAsc") {
      const amountCompare = amountA - amountB;
      if (amountCompare !== 0) return sortMode === "amountDesc" ? -amountCompare : amountCompare;
      const arrivalCompare = compareTextValue(arrivalA, arrivalB);
      if (arrivalCompare !== 0) return arrivalCompare;
    }

    if (sortMode === "orderDesc" || sortMode === "orderAsc") {
      const dateCompare = compareTextValue(orderDateA, orderDateB);
      if (dateCompare !== 0) return sortMode === "orderDesc" ? -dateCompare : dateCompare;
      const timeCompare = compareTextValue(timestampA, timestampB);
      if (timeCompare !== 0) return sortMode === "orderDesc" ? -timeCompare : timeCompare;
    }

    const arrivalCompare = compareTextValue(arrivalA, arrivalB);
    if (arrivalCompare !== 0) return sortMode === "arrivalDesc" ? -arrivalCompare : arrivalCompare;
    const timeCompare = compareTextValue(timestampA, timestampB);
    if (timeCompare !== 0) return -timeCompare;
    return compareTextValue(a.id, b.id);
  });
  const effectiveOrders = orders;
  const voidCount = (adminData.orders || []).filter(o => o.orderStatus === "已取消").length;
  const storeCount = effectiveOrders.filter(o => getOrderMethodType(o) === "store").length;
  const deliveryCreditCount = effectiveOrders.filter(o => getOrderMethodType(o) === "delivery").length;
  const deliveryCodCount = effectiveOrders.filter(o => getOrderMethodType(o) === "delivery_cod").length;
  const rangeText = startDate && !endDate ? `｜日期：${startDate} 之後` : startDate && endDate ? `｜日期：${startDate}～${endDate}` : !startDate && endDate ? `｜日期：${endDate} 以前` : "｜日期：全部";
  updateOrderFilterSummary(startDate, endDate, method, sortMode);
  updateOrderRangeButtons(getOrderRangeMode(startDate, endDate));
  const countLabel = status === "已取消" ? "筆已取消訂單" : "筆有效訂單";
  const hiddenVoidText = status === "已取消" || voidCount <= 0 ? "" : `｜已隱藏取消 ${voidCount}`;
  document.getElementById("orderCount").textContent = `${effectiveOrders.length} ${countLabel}｜門市自取 ${storeCount}｜信用卡 ${deliveryCreditCount}｜取貨付款 ${deliveryCodCount}${hiddenVoidText}${rangeText}｜排序：${getOrderSortLabel(sortMode)}`;
  const area = document.getElementById("ordersArea");
  if (!orders.length) {
    area.innerHTML = `<div class="bg-white rounded-3xl border border-stone-100 p-8 text-center text-stone-400 font-bold">目前沒有符合條件的訂單</div>`;
    return;
  }
  area.innerHTML = orders.map(orderCard).join("");

  const start = startDate;
  const end = endDate;

}

function formatOrderTimestampMinute(value) {
  const raw = (value || "").toString().trim();
  if (!raw) return "-";
  const match = raw.match(/(\d{4})[\/-](\d{1,2})[\/-](\d{1,2})\s+(\d{1,2}):(\d{2})/);
  if (!match) return raw;
  const y = match[1];
  const m = String(match[2]).padStart(2, "0");
  const d = String(match[3]).padStart(2, "0");
  const hh = String(match[4]).padStart(2, "0");
  const mm = match[5];
  return `${y}/${m}/${d} ${hh}:${mm}`;
}

async function updateOrder(orderId) {
  const card = document.querySelector(`[data-order-id="${CSS.escape(orderId)}"]`);
  if (!card) return;
  const payload = {
    action: "adminUpdateOrder",
    token: getToken(),
    orderId,
    orderStatus: card.querySelector(".admin-status").value,
    paymentLink: card.querySelector(".admin-payment").value.trim(),
    trackingNo: card.querySelector(".admin-tracking").value.trim(),
    statusNote: card.querySelector(".admin-note").value.trim(),
    internalNote: card.querySelector(".admin-internal-note")?.value.trim() || ""
  };
  await postAdmin(payload, `${orderId} 已更新。`);
}

  return name || "未命名設定";
}

function formatDateHyphenFromInput(value) {
  const normalized = normalizeOrderDateForCompare(value);
  return normalized || "";
}

function formatDateDisplaySlash(value) {
  const normalized = formatDateHyphenFromInput(value);
  return normalized ? normalized.replace(/-/g, "/") : "";
}

function formatDateDisplayWithWeekday(value) {
  const normalized = formatDateHyphenFromInput(value);
  if (!normalized) return "";
  const date = new Date(normalized + "T00:00:00");
  const weekdays = ["日", "一", "二", "三", "四", "五", "六"];
  const weekday = isNaN(date.getTime()) ? "" : `(${weekdays[date.getDay()]})`;
  return normalized.replace(/-/g, "/") + weekday;
}

function parseDateList(value) {
  return (value || "").toString()
    .replace(/[\r\n、，]/g, ",")
    .split(",")
    .map(v => formatDateHyphenFromInput(v.trim()))
    .filter(Boolean);
}

function uniqueSortedDateList(value) {
  return Array.from(new Set(parseDateList(value))).sort();
}

function serializeDateList(dates) {
  return Array.from(new Set((dates || []).map(formatDateHyphenFromInput).filter(Boolean))).sort().join(",");
}


function getRevenueSettingsRows() {
  return adminData?.revenueSettings || [];
}

function getRevenueSettingByMonth(month) {
  const rows = getRevenueSettingsRows();
  return rows.find(row => (row.month || "").toString().trim() === month) || null;
}

function getRevenueRateForOrder(order) {
  const date = normalizeOrderDateForCompare(order.date || order.timestamp || "");
  const month = date ? date.slice(0, 7) : "";
  const setting = getRevenueSettingByMonth(month);
  const methodType = getOrderMethodType(order);
  const rawRate = getOrderMethodFamily(order) === "delivery" ? setting?.deliveryRate : setting?.storeRate;
  const rate = Number(rawRate);
  return {
    month,
    rate: isNaN(rate) ? 0 : rate,
    missing: !setting
  };
}

function getRevenueShareRows() {
  const startDate = document.getElementById("revenueStartDate")?.value || "";
  const endDate = document.getElementById("revenueEndDate")?.value || "";
  const methodFilter = document.getElementById("revenueMethodFilter")?.value || "";

  return (adminData.orders || [])
    .filter(order => {
      if (normalizeAdminStatus(order.orderStatus) === "已取消") return false;
      const orderDate = normalizeOrderDateForCompare(order.date || order.timestamp || "");
      if (startDate && (!orderDate || orderDate < startDate)) return false;
      if (endDate && (!orderDate || orderDate > endDate)) return false;
      const methodType = getOrderMethodType(order);
      if (methodFilter && methodType !== methodFilter) return false;
      return true;
    })
    .map(order => {
      const rateInfo = getRevenueRateForOrder(order);
      const amount = parseMoneyNumber(order.total);
      const commission = amount * rateInfo.rate / 100;
      return {
        id: order.id || "",
        date: normalizeOrderDateForCompare(order.date || order.timestamp || ""),
        name: order.name || "",
        methodType: getOrderMethodType(order),
        methodLabel: getOrderMethodLabel(order),
        status: normalizeAdminStatus(order.orderStatus || ""),
        amount,
        month: rateInfo.month,
        rate: rateInfo.rate,
        commission,
        missingRate: rateInfo.missing
      };
    })
    .sort((a, b) => (a.date || "").localeCompare(b.date || "") || (a.id || "").localeCompare(b.id || ""));
}

function exportRevenueShareCsv() {
  const rows = getRevenueShareRows();
  if (!rows.length) {
    showAdminToast("目前沒有可匯出的分潤資料。", "info");
    return;
  }
  const header = ["訂單編號", "日期", "出貨方式", "金額", "比例", "分潤"];
  const body = rows.map(row => [row.id, row.date, row.methodLabel, Math.round(row.amount), row.rate, Math.round(row.commission)]);
  const csv = [header].concat(body).map(row => row.map(value => `"${(value ?? "").toString().replace(/"/g, '""')}"`).join(",")).join("\n");
  const blob = new Blob(["\ufeff" + csv], { type: "text/csv;charset=utf-8;" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  const start = document.getElementById("revenueStartDate")?.value || "revenue";
  const end = document.getElementById("revenueEndDate")?.value || "share";
  a.href = url;
  a.download = `${start}_${end}_分潤統計.csv`;
  document.body.appendChild(a);
  a.click();
  a.remove();
  URL.revokeObjectURL(url);
}

        <option value="single" ${cleanVal === "single" ? "selected" : ""}>單品</option>
      </select>`;
    } else if ((tab === "products" || tab === "packaging") && key === "display") {
      const cleanVal = (val === undefined || val === "") ? "TRUE" : val.toString().trim().toUpperCase();
      field = `<select data-key="${key}" class="w-full h-10 rounded-xl border border-stone-200 px-3 bg-stone-50">
        <option value="TRUE" ${cleanVal !== "FALSE" ? "selected" : ""}>上架</option>
        <option value="FALSE" ${cleanVal === "FALSE" ? "selected" : ""}>下架</option>
      </select>`;
    } else if (tab === "products" && key === "shipping_rule") {
      const cleanVal = (val || "all").toString().trim().toLowerCase();
      field = `<select data-key="${key}" class="w-full h-10 rounded-xl border border-stone-200 px-3 bg-stone-50">
        <option value="all" ${cleanVal === "all" ? "selected" : ""}>自取與宅配</option>
        <option value="pickup" ${cleanVal === "pickup" ? "selected" : ""}>僅自取</option>
        <option value="delivery" ${cleanVal === "delivery" ? "selected" : ""}>僅宅配</option>
      </select>`;
    } else if (tab === "products" && ["ingredients","allergens","storage","nutrition","origin_manufacturer"].includes(key)) {
      const heightClass = key === "nutrition" ? "min-h-[112px]" : "min-h-[72px]";
      field = `<textarea data-key="${key}" class="w-full ${heightClass} rounded-xl border border-stone-200 px-3 py-2 bg-stone-50 leading-relaxed">${escapeHtml(val)}</textarea>`;
    } else if (tab === "coupons" && key === "type") {
      field = `<select data-key="${key}" class="w-full h-10 rounded-xl border border-stone-200 px-3 bg-stone-50">
        <option value="minus" ${val === "minus" ? "selected" : ""}>現折金額</option>
        <option value="discount" ${val === "discount" ? "selected" : ""}>折扣比例</option>
      </select>`;
    } else if (tab === "coupons" && (key === "start_date" || key === "end_date")) {
      field = `<input type="date" data-key="${key}" class="w-full h-10 rounded-xl border border-stone-200 px-3 bg-stone-50" value="${normalizeOrderDateForCompare(val)}">`;
    } else if (textareaLong && idx === 1) {
      field = `<textarea data-key="${key}" class="w-full rounded-xl border border-stone-200 px-3 py-2 bg-stone-50">${escapeHtml(val)}</textarea>`;
    } else {
      field = `<input data-key="${key}" class="w-full h-10 rounded-xl border border-stone-200 px-3 bg-stone-50" value="${escapeHtml(val)}">`;
    }

    const cellClass = getAdminCellClass(tab, key);
    return `<td class="px-2 py-2 align-top ${cellClass}">${field}</td>`;
  }).join("")}<td class="px-1 py-2 align-top text-center">
    <button onclick="this.closest('tr').remove()" title="刪除" aria-label="刪除" class="inline-flex h-10 w-10 items-center justify-center rounded-xl bg-red-50 text-red-500 font-black hover:bg-red-100">
      ✕
    </button>
  </td></tr>`;
}

function getSettingBlock(button) {
  return button.closest("[data-setting-row]");
}

function getSettingDates(box) {
  const hidden = box.querySelector(".setting-date-value");
  return hidden ? uniqueSortedDateList(hidden.value) : [];
}

function setSettingDates(box, dates) {
  const hidden = box.querySelector(".setting-date-value");
  const tags = box.querySelector(".setting-date-tags");
  const count = box.querySelector(".setting-date-count");
  const clean = Array.from(new Set((dates || []).map(formatDateHyphenFromInput).filter(Boolean))).sort();
  const serialized = clean.join(",");
  if (hidden) hidden.value = serialized;
  if (tags) tags.innerHTML = renderSettingDateTags(clean);
  if (count) count.textContent = clean.length;
}

function mergeSettingDates(box, dates) {
  setSettingDates(box, getSettingDates(box).concat(dates));
}

function appendSettingDate(button) {
  const box = getSettingBlock(button);
  const dateInput = box.querySelector(".setting-date-picker");
  const date = formatDateHyphenFromInput(dateInput?.value || "");
  if (!date) return;
  mergeSettingDates(box, [date]);
  dateInput.value = "";
}

function appendSettingDateRange(button) {
  const box = getSettingBlock(button);
  const startInput = box.querySelector(".setting-range-start");
  const endInput = box.querySelector(".setting-range-end");
  if (!startInput?.value || !endInput?.value) return;

  const start = new Date(startInput.value + "T00:00:00");
  const end = new Date(endInput.value + "T00:00:00");
  if (isNaN(start.getTime()) || isNaN(end.getTime()) || start > end) {
    alert("請確認起始日期不可晚於結束日期。");
    return;
  }

  const dates = [];
  const cursor = new Date(start);
  while (cursor <= end) {
    dates.push(formatDateInputValue(cursor));
    cursor.setDate(cursor.getDate() + 1);
  }
  mergeSettingDates(box, dates);
}

function appendSettingMonth(button) {
  const box = getSettingBlock(button);
  const monthInput = box.querySelector(".setting-month-picker");
  const value = monthInput?.value || "";
  if (!value) return;

  const [yearText, monthText] = value.split("-");
  const year = Number(yearText);
  const month = Number(monthText);
  if (!year || !month) return;

  const lastDay = new Date(year, month, 0).getDate();
  const dates = [];
  for (let day = 1; day <= lastDay; day++) {
    dates.push(`${year}-${String(month).padStart(2, "0")}-${String(day).padStart(2, "0")}`);
  }
  mergeSettingDates(box, dates);
}

function removeSettingDate(button, date) {
  const box = getSettingBlock(button);
  setSettingDates(box, getSettingDates(box).filter(d => d !== date));
}

function clearSettingDates(button) {
  if (!confirm("確定要清空這個日期設定嗎？")) return;
  setSettingDates(getSettingBlock(button), []);
}

function sortSettingDates(button) {
  const box = getSettingBlock(button);
  setSettingDates(box, getSettingDates(box));
}

function addRow(tab) {
  const table = document.querySelector(`[data-edit-table="${tab}"]`);
  const keys = table.dataset.keys.split(",");
  const textareaLong = tab === "settings";
  const defaults = tab === "products" ? { type: "combo", display: "TRUE", shipping_rule: "all", sort: "10" } : {};
  table.querySelector("tbody").insertAdjacentHTML("beforeend", editRowHtml(tab, keys, defaults, textareaLong));
}

function collectRows(tab) {
  const table = document.querySelector(`[data-edit-table="${tab}"]`);
  const keys = table.dataset.keys.split(",");

  if (tab === "settings") {
    return [...table.querySelectorAll("[data-setting-row]")].map(row => {
      const obj = {};
      keys.forEach(key => {
        const input = row.querySelector(`[data-key="${key}"]`);
        obj[key] = input ? input.value.trim() : "";
      });
      return obj;
    });
  }

  return [...table.querySelectorAll("tbody tr")].map(tr => {
    const obj = {};
    keys.forEach(key => {
      const input = tr.querySelector(`[data-key="${key}"]`);
      obj[key] = input ? input.value.trim() : "";
    });
    return obj;
  });
}

async function saveSheet(tab, sheetName) {
  const rows = collectRows(tab);
  await postAdmin({ action:"adminReplaceSheetRows", token:getToken(), sheetName, rows }, `${sheetName} 已儲存。`);
}

async function postAdmin(payload, successMessage) {
  const restoreButton = setButtonLoading(getActiveActionButton(), "儲存中...");
  const loadingToast = showAdminToast("儲存中...", "loading", 0);
  hideAdminInlineMessage();
  try {
    const res = await fetch(API_URL, { method:"POST", body: JSON.stringify(payload) });
    const data = await res.json();
    if (data.status !== "success") {
      hideAdminInlineMessage();
      removeAdminToast(loadingToast);
      showAdminToast(data.message || "儲存失敗。", "error", 4200);
      return;
    }
    const cleanMessage = (successMessage || data.message || "已儲存。").replace(/。$/, "");
    hideAdminInlineMessage();
    removeAdminToast(loadingToast);
    showAdminToast(cleanMessage, "success");
    await loadAll();
  } catch (err) {
    hideAdminInlineMessage();
    removeAdminToast(loadingToast);
    showAdminToast("儲存失敗：" + err.message, "error", 4200);
  } finally {
    if (restoreButton) restoreButton();
  }
}

  
document.getElementById("adminPassword").addEventListener("keydown", e => { if (e.key === "Enter") adminLogin(); });
if (getToken()) { setLoggedInState(true); loadAll(); }

window.addEventListener("resize", syncOrderFilterDetails);
</script>
