<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Lilou｜後台管理系統</title>
  <meta name="robots" content="noindex,nofollow">
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <!--Developed by TylerChen Design 2026-->
  <style>
    input, select, textarea { -webkit-appearance:none; appearance:none; font-size:16px; }
    textarea { min-height: 44px; }
    .tab-active { background:#5B7290; color:#fff; }
    .tab-idle { background:#fff; color:#57534e; }
    .mono { font-variant-numeric: tabular-nums; }
    .admin-toast {
      transform: translateY(16px);
      opacity: 0;
      transition: opacity .22s ease, transform .22s ease;
      box-shadow: 0 18px 40px rgba(28, 23, 21, .16);
    }
    .admin-toast.show { transform: translateY(0); opacity: 1; }
    .admin-toast-spinner {
      width: 16px; height: 16px; border-radius: 999px;
      border: 2px solid rgba(255,255,255,.45);
      border-top-color: #fff;
      animation: adminSpin .75s linear infinite;
    }
    @keyframes adminSpin { to { transform: rotate(360deg); } }
  </style>
</head>
<body class="bg-[#F4F6F9] text-stone-800 min-h-screen">
  <header class="bg-[#5B7290] text-white sticky top-0 z-40 shadow-sm">
    <div class="max-w-7xl mx-auto px-4 py-4 flex items-center justify-between gap-3">
      <div>
        <h1 class="text-sm md:text-lg font-black tracking-wide">LILOU｜後台管理系統</h1>
      </div>
      <div class="flex items-center gap-2">
        <button id="adminReloadBtn" onclick="loadAll()" title="重新整理資料" class="hidden border border-white/30 rounded-xl px-3 py-2 text-xs font-black hover:bg-white/10">重新整理</button>
        <button id="logoutBtn" onclick="logoutAdmin()" class="hidden border border-white/30 rounded-xl px-3 py-2 text-xs font-black hover:bg-white/10">登出</button>
      </div>
    </div>
  </header>

  <main class="max-w-7xl mx-auto p-4 md:p-6">
    <section id="loginPanel" class="bg-white rounded-3xl border border-stone-100 shadow-sm p-5 md:p-8 max-w-md mx-auto mt-10 space-y-4">
      <div>
        <h2 class="text-xl font-black text-stone-900">後台登入</h2>
        <p class="text-sm text-stone-500 mt-1">此頁不會顯示在前台，請輸入管理密碼。</p>
      </div>
      <div>
        <label class="text-xs font-black text-stone-500 tracking-widest">管理密碼</label>
        <input id="adminPassword" type="password" class="mt-1 w-full h-12 rounded-xl border border-stone-200 px-3 bg-stone-50 focus:outline-none focus:border-[#5B7290]" placeholder="請輸入密碼">
      </div>
      <button onclick="adminLogin()" class="w-full h-12 rounded-xl bg-[#5B7290] text-white font-black tracking-widest hover:bg-[#3E4F66]">登入</button>
      <p id="loginMessage" class="hidden text-sm font-bold"></p>
    </section>

    <section id="adminPanel" class="hidden space-y-5">
      <div class="bg-white rounded-3xl border border-stone-100 shadow-sm p-3 overflow-x-auto">
        <div id="tabs" class="flex gap-2 min-w-max">
          <button onclick="switchTab('dashboard')" data-tab="dashboard" class="tab-btn px-4 py-2 rounded-xl font-black text-sm tab-active">Dashboard</button>
          <button onclick="switchTab('orders')" data-tab="orders" class="tab-btn px-4 py-2 rounded-xl font-black text-sm tab-idle">訂單管理</button>
          <button onclick="switchTab('products')" data-tab="products" class="tab-btn px-4 py-2 rounded-xl font-black text-sm tab-idle">產品</button>
          <button onclick="switchTab('packaging')" data-tab="packaging" class="tab-btn px-4 py-2 rounded-xl font-black text-sm tab-idle">包裝</button>
          <button onclick="switchTab('coupons')" data-tab="coupons" class="tab-btn px-4 py-2 rounded-xl font-black text-sm tab-idle">優惠券</button>
          <button onclick="switchTab('settings')" data-tab="settings" class="tab-btn px-4 py-2 rounded-xl font-black text-sm tab-idle">日期設定</button>
        </div>
      </div>

      <p id="adminMessage" class="hidden text-sm font-bold" aria-live="polite"></p>

      <section id="tab-dashboard" class="tab-page space-y-5"></section>
      <section id="tab-orders" class="tab-page hidden space-y-5"></section>
      <section id="tab-products" class="tab-page hidden space-y-5"></section>
      <section id="tab-packaging" class="tab-page hidden space-y-5"></section>
      <section id="tab-coupons" class="tab-page hidden space-y-5"></section>
      <section id="tab-settings" class="tab-page hidden space-y-5"></section>
    </section>
  </main>
  <div id="adminToastArea" class="fixed right-4 bottom-4 z-[9999] flex flex-col gap-2 pointer-events-none"></div>

<script>
const API_URL = "https://script.google.com/macros/s/AKfycbyA3ovLtC-hDYGL-_9CMNKk9A--TcrU-W-mN6Hc0GaZ8eDrvAsew3ZdtYBLSyimuiU/exec";
const TOKEN_KEY = "lilou_admin_token";
let adminData = null;
let currentTab = "dashboard";

function escapeHtml(value) {
  return (value ?? "").toString()
    .replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;")
    .replace(/"/g, "&quot;").replace(/'/g, "&#039;");
}

function showMessage(id, text, type = "info") {
  const el = document.getElementById(id);
  el.textContent = text;
  el.classList.remove("hidden", "text-red-500", "text-emerald-600", "text-stone-500");
  el.classList.add(type === "error" ? "text-red-500" : type === "success" ? "text-emerald-600" : "text-stone-500");
}

function formatAdminNow() {
  const now = new Date();
  return now.getFullYear() + "/" +
    String(now.getMonth() + 1).padStart(2, "0") + "/" +
    String(now.getDate()).padStart(2, "0") + " " +
    String(now.getHours()).padStart(2, "0") + ":" +
    String(now.getMinutes()).padStart(2, "0") + ":" +
    String(now.getSeconds()).padStart(2, "0");
}

function showSuccessMessage(id, text) {
  showMessage(id, `✅ ${text}（${formatAdminNow()}）`, "success");
}

function showAdminToast(message, type = "info", duration = 2600) {
  const area = document.getElementById("adminToastArea");
  if (!area) return;

  const toast = document.createElement("div");
  const isError = type === "error";
  const isSuccess = type === "success";
  const isLoading = type === "loading";
  const bgClass = isError ? "bg-red-600" : isSuccess ? "bg-emerald-600" : "bg-[#5B7290]";
  const icon = isLoading ? `<span class="admin-toast-spinner"></span>` : isError ? "❌" : isSuccess ? "✅" : "ℹ️";

  toast.className = `admin-toast pointer-events-auto ${bgClass} text-white rounded-2xl px-4 py-3 min-w-[220px] max-w-[340px] flex items-center gap-2 text-sm font-black tracking-wide`;
  toast.innerHTML = `<span class="shrink-0">${icon}</span><span class="leading-relaxed">${escapeHtml(message)}</span>`;
  area.appendChild(toast);

  requestAnimationFrame(() => toast.classList.add("show"));

  if (duration !== 0) {
    setTimeout(() => removeAdminToast(toast), duration);
  }
  return toast;
}

function removeAdminToast(toast) {
  if (!toast) return;
  toast.classList.remove("show");
  setTimeout(() => toast.remove(), 240);
}

function setButtonLoading(button, loadingText) {
  if (!button || button.tagName !== "BUTTON") return null;
  const original = {
    text: button.innerHTML,
    disabled: button.disabled
  };
  button.disabled = true;
  button.classList.add("opacity-70", "cursor-wait");
  button.innerHTML = `<span class="inline-flex items-center gap-2"><span class="admin-toast-spinner !w-4 !h-4"></span>${escapeHtml(loadingText || "處理中...")}</span>`;
  return function restoreButton() {
    button.disabled = original.disabled;
    button.classList.remove("opacity-70", "cursor-wait");
    button.innerHTML = original.text;
  };
}

function getActiveActionButton() {
  const active = document.activeElement;
  return active && active.tagName === "BUTTON" ? active : null;
}

function getToken() { return localStorage.getItem(TOKEN_KEY) || ""; }

function setLoggedInState(isLoggedIn) {
  document.getElementById("loginPanel").classList.toggle("hidden", isLoggedIn);
  document.getElementById("adminPanel").classList.toggle("hidden", !isLoggedIn);
  document.getElementById("logoutBtn").classList.toggle("hidden", !isLoggedIn);
  document.getElementById("adminReloadBtn")?.classList.toggle("hidden", !isLoggedIn);
}

async function adminLogin() {
  const password = document.getElementById("adminPassword").value.trim();
  if (!password) { showMessage("loginMessage", "請輸入管理密碼。", "error"); return; }
  showMessage("loginMessage", "登入中...", "info");
  try {
    const res = await fetch(`${API_URL}?action=adminLogin&password=${encodeURIComponent(password)}&_=${Date.now()}`);
    const data = await res.json();
    if (data.status !== "success") { showMessage("loginMessage", data.message || "登入失敗。", "error"); return; }
    localStorage.setItem(TOKEN_KEY, data.token);
    setLoggedInState(true);
    await loadAll();
  } catch (err) {
    showMessage("loginMessage", "登入失敗：" + err.message, "error");
  }
}

function logoutAdmin() {
  localStorage.removeItem(TOKEN_KEY);
  adminData = null;
  setLoggedInState(false);
}

function switchTab(tab) {
  currentTab = tab;
  document.querySelectorAll(".tab-btn").forEach(btn => {
    const active = btn.dataset.tab === tab;
    btn.classList.toggle("tab-active", active);
    btn.classList.toggle("tab-idle", !active);
  });
  document.querySelectorAll(".tab-page").forEach(page => page.classList.add("hidden"));
  document.getElementById("tab-" + tab).classList.remove("hidden");
}

async function loadAll() {
  const token = getToken();
  if (!token) { setLoggedInState(false); return; }
  const restoreButton = setButtonLoading(getActiveActionButton(), "同步中...");
  const loadingToast = showAdminToast("同步資料中...", "loading", 0);
  showMessage("adminMessage", "載入中...", "info");
  try {
    const res = await fetch(`${API_URL}?action=adminGetAll&token=${encodeURIComponent(token)}&_=${Date.now()}`);
    const data = await res.json();
    if (data.status !== "success") {
      showMessage("adminMessage", data.message || "載入失敗。", "error");
      removeAdminToast(loadingToast);
      showAdminToast(data.message || "載入失敗。", "error");
      if ((data.message || "").includes("登入")) logoutAdmin();
      return;
    }
    adminData = data;
    renderAll();
    showSuccessMessage("adminMessage", "資料已更新");
    removeAdminToast(loadingToast);
    showAdminToast(`資料已更新 ${formatAdminNow().slice(11)}`, "success");
  } catch (err) {
    showMessage("adminMessage", "載入失敗：" + err.message, "error");
    removeAdminToast(loadingToast);
    showAdminToast("載入失敗：" + err.message, "error", 4200);
  } finally {
    if (restoreButton) restoreButton();
  }
}

function renderAll() {
  renderDashboard();
  renderOrders();
  renderProducts();
  renderPackaging();
  renderCoupons();
  renderSettings();
  switchTab(currentTab);
}


function normalizePackageForSummary(packageName) {
  const raw = (packageName || "未命名包裝").toString().trim();
  const match = raw.match(/^(.*?)(?:\s*[x×]\s*(\d+)\s*組)\s*$/i);
  if (match) {
    return {
      name: (match[1] || "未命名包裝").trim(),
      qty: Math.max(1, parseInt(match[2], 10) || 1)
    };
  }
  return { name: raw || "未命名包裝", qty: 1 };
}

function parseOrderDetailGroups(details) {
  const text = (details || "").toString().trim();
  const groups = [];
  if (!text) return { text, groups };

  const regex = /【第(\d+)組:\s*([^】]+)】([\s\S]*?)(?=\s*｜\s*【第\d+組:|$)/g;
  let match;
  while ((match = regex.exec(text)) !== null) {
    const groupNo = match[1];
    const packageInfo = normalizePackageForSummary(match[2]);
    const packageName = packageInfo.name;
    const packageQty = packageInfo.qty;
    const itemsText = (match[3] || "").trim().replace(/^｜\s*/, "");
    const items = itemsText
      .split(/、/)
      .map(item => item.trim())
      .filter(Boolean);
    groups.push({ groupNo, packageName, packageQty, items });
  }
  return { text, groups };
}

function summarizeOrderItems(details) {
  const { text, groups } = parseOrderDetailGroups(details);
  const itemSummary = {};

  if (groups.length) {
    groups.forEach(group => {
      group.items.forEach(item => {
        const itemMatch = item.match(/^(.+?)[(（](\d+)/);
        if (itemMatch) {
          const itemName = itemMatch[1].trim();
          const qty = parseInt(itemMatch[2], 10) || 0;
          if (itemName && qty) itemSummary[itemName] = (itemSummary[itemName] || 0) + qty;
        }
      });
    });
  } else if (text) {
    const itemRegex = /([^、｜()（）]+)[(（](\d+)/g;
    let itemMatch;
    while ((itemMatch = itemRegex.exec(text)) !== null) {
      const name = itemMatch[1].trim();
      const qty = Number(itemMatch[2]) || 0;
      if (name && qty) itemSummary[name] = (itemSummary[name] || 0) + qty;
    }
  }

  return { text, groups, itemSummary };
}

function formatOrderDetailsAdmin(details) {
  const { text, groups, itemSummary } = summarizeOrderItems(details);
  if (!text) return `<p class="text-stone-400 font-bold">無商品明細</p>`;

  const itemChips = Object.entries(itemSummary)
    .sort((a, b) => b[1] - a[1])
    .map(([name, qty]) => `<span class="inline-flex items-center rounded-full bg-white border border-stone-200 px-2 py-0.5 text-[11px] font-black text-stone-700">${escapeHtml(name)} × ${qty}</span>`)
    .join("");

  if (!groups.length && !itemChips) {
    return `<div class="whitespace-pre-wrap text-stone-700 font-bold leading-relaxed bg-white border border-stone-200 rounded-2xl p-3">${escapeHtml(text)}</div>`;
  }

  return `<div class="bg-white border border-stone-200 rounded-xl px-3 py-2 space-y-1.5">
    <div class="font-black text-stone-800 text-sm">共 ${groups.length || "-"} 組</div>
    <div class="flex flex-wrap gap-1.5">${itemChips || `<span class="text-xs text-stone-400 font-bold">無品項統計</span>`}</div>
  </div>`;
}

function formatOrderGroupDetailsAdmin(details) {
  const { text, groups } = parseOrderDetailGroups(details);
  if (!text) return `<p class="text-stone-400 font-bold">無商品明細</p>`;

  if (!groups.length) {
    return `<div class="whitespace-pre-wrap text-stone-700 font-bold leading-relaxed bg-white border border-stone-200 rounded-2xl p-3">${escapeHtml(text)}</div>`;
  }

  return `<div class="grid grid-cols-1 md:grid-cols-2 gap-2">
    ${groups.map(group => `
      <div class="bg-white border border-stone-200 rounded-2xl p-3">
        <div class="flex flex-wrap items-center gap-2 mb-2">
          <span class="inline-flex items-center justify-center rounded-full bg-[#5B7290] text-white text-[11px] font-black px-2 py-0.5">
            第${escapeHtml(group.groupNo)}組
          </span>
          <span class="font-black text-stone-800">${escapeHtml(group.packageName)}</span>
        </div>
        <div class="flex flex-wrap gap-1.5">
          ${group.items.length
            ? group.items.map(item => `<span class="inline-flex rounded-lg bg-stone-50 border border-stone-100 px-2 py-1 text-xs text-stone-700 font-bold">${escapeHtml(item)}</span>`).join("")
            : `<span class="text-sm text-stone-400 font-bold">無品項資料</span>`}
        </div>
      </div>
    `).join("")}
  </div>`;
}


function renderCompactItemSummary(details) {
  const text = (details || "").toString().trim();
  if (!text) return `<p class="text-stone-400 font-bold text-sm">無品項資料</p>`;

  const itemSummary = {};
  const groupRegex = /【第\d+組:\s*[^】]+】([\s\S]*?)(?=\s*｜\s*【第\d+組:|$)/g;
  let groupMatch;
  let hasGroup = false;

  while ((groupMatch = groupRegex.exec(text)) !== null) {
    hasGroup = true;
    const itemsText = groupMatch[1] || "";
    const itemRegex = /([^、｜()（）]+)[(（](\d+)/g;
    let itemMatch;
    while ((itemMatch = itemRegex.exec(itemsText)) !== null) {
      const name = itemMatch[1].trim();
      const qty = Number(itemMatch[2]) || 0;
      if (name && qty) itemSummary[name] = (itemSummary[name] || 0) + qty;
    }
  }

  if (!hasGroup) {
    const itemRegex = /([^、｜()（）]+)[(（](\d+)/g;
    let itemMatch;
    while ((itemMatch = itemRegex.exec(text)) !== null) {
      const name = itemMatch[1].trim();
      const qty = Number(itemMatch[2]) || 0;
      if (name && qty) itemSummary[name] = (itemSummary[name] || 0) + qty;
    }
  }

  const entries = Object.entries(itemSummary).sort((a, b) => b[1] - a[1]);
  if (!entries.length) {
    return `<p class="text-stone-500 font-bold text-sm line-clamp-2">${escapeHtml(text)}</p>`;
  }

  return `<div class="flex flex-wrap gap-1.5">
    ${entries.map(([name, qty]) => `<span class="inline-flex items-center rounded-full bg-white border border-stone-200 px-2 py-0.5 text-[11px] font-black text-stone-700">${escapeHtml(name)} × ${qty}</span>`).join("")}
  </div>`;
}

function summaryList(summary) {
  const entries = Object.entries(summary || {}).sort((a,b) => b[1] - a[1]);
  if (!entries.length) return `<p class="text-stone-400 font-bold">目前無資料</p>`;
  return entries.map(([name, qty]) => `
    <div class="flex items-center justify-between gap-3 bg-stone-50 rounded-xl px-3 py-2 border border-stone-100">
      <span class="font-bold text-stone-700">${escapeHtml(name)}</span>
      <span class="font-black text-[#5B7290] mono">${qty}</span>
    </div>`).join("");
}

function parseMoneyNumber(value) {
  const n = Number((value || "").toString().replace(/[^0-9.-]/g, ""));
  return isNaN(n) ? 0 : n;
}

function getOrdersByDateRange(startDate, endDate) {
  return (adminData.orders || []).filter(o => {
    const orderDate = normalizeOrderDateForCompare(o.date);
    const startOk = !startDate || (orderDate && orderDate >= startDate);
    const endOk = !endDate || (orderDate && orderDate <= endDate);
    return startOk && endOk;
  });
}

function summarizeDetailsFromOrders(orders) {
  const production = {};
  const packaging = {};

  orders.forEach(order => {
    const details = (order.details || "").toString();
    const groupRegex = /【第\d+組:\s*([^】]+)】([\s\S]*?)(?=\s*｜\s*【第\d+組:|$)/g;
    let groupMatch;
    let matchedGroup = false;

    while ((groupMatch = groupRegex.exec(details)) !== null) {
      matchedGroup = true;
      const packageInfo = normalizePackageForSummary(groupMatch[1] || "未命名包裝");
      const packageName = packageInfo.name;
      packaging[packageName] = (packaging[packageName] || 0) + packageInfo.qty;

      const itemsText = groupMatch[2] || "";
      const itemRegex = /([^、｜()（）]+)[(（](\d+)/g;
      let itemMatch;
      while ((itemMatch = itemRegex.exec(itemsText)) !== null) {
        const name = itemMatch[1].trim();
        const qty = Number(itemMatch[2]) || 0;
        if (name && qty) production[name] = (production[name] || 0) + qty;
      }
    }

    if (!matchedGroup && details) {
      const itemRegex = /([^、｜()（）]+)[(（](\d+)/g;
      let itemMatch;
      while ((itemMatch = itemRegex.exec(details)) !== null) {
        const name = itemMatch[1].trim();
        const qty = Number(itemMatch[2]) || 0;
        if (name && qty) production[name] = (production[name] || 0) + qty;
      }
    }
  });

  return { production, packaging };
}


function addDaysToDateInput(dateInput, days) {
  const date = new Date(dateInput + "T00:00:00");
  if (isNaN(date.getTime())) return "";
  date.setDate(date.getDate() + days);
  return formatDateInputValue(date);
}

function formatMonthDayWithWeekday(value) {
  const normalized = normalizeOrderDateForCompare(value);
  if (!normalized) return "-";
  const date = new Date(normalized + "T00:00:00");
  const weekdays = ["日", "一", "二", "三", "四", "五", "六"];
  const mm = String(date.getMonth() + 1).padStart(2, "0");
  const dd = String(date.getDate()).padStart(2, "0");
  return `${mm}/${dd}（${weekdays[date.getDay()]}）`;
}

function renderTodayPickupCard() {
  const today = getTodayDateInputValue();
  const orders = (adminData.orders || []).filter(o =>
    normalizeOrderDateForCompare(o.date) === today &&
    getOrderMethodType(o) === "store" &&
    o.orderStatus !== "已取貨" &&
    o.orderStatus !== "已作廢"
  );

  return `<div class="bg-white rounded-3xl border border-stone-100 shadow-sm p-4 md:p-5">
    <div class="flex items-center justify-between gap-3 mb-3">
      <h3 class="font-black text-[#5B7290] tracking-widest">🏪 今日待取貨</h3>
      <span class="text-xl font-black text-stone-900 mono">${orders.length}</span>
    </div>
    ${orders.length ? `<div class="space-y-2">${orders.slice(0, 6).map(o => `
      <div class="flex items-center justify-between gap-3 rounded-xl bg-stone-50 border border-stone-100 px-3 py-2 text-sm">
        <div class="font-black text-stone-800">${escapeHtml(o.id)}</div>
        <div class="text-stone-500 font-bold">${escapeHtml(o.name || "-")}</div>
        <div class="inline-flex rounded-full border px-2 py-0.5 text-xs font-black ${statusClass(o.orderStatus)}">${escapeHtml(o.orderStatus || "未設定")}</div>
      </div>`).join("")}</div>` : `<p class="text-stone-400 font-bold">今天沒有未完成的門市自取訂單。</p>`}
  </div>`;
}

function renderFutureSevenDayPreview() {
  const today = getTodayDateInputValue();
  const endDate = addDaysToDateInput(today, 6);
  const rows = [];

  for (let i = 0; i < 7; i++) {
    const date = addDaysToDateInput(today, i);
    const dayOrders = (adminData.orders || []).filter(o => normalizeOrderDateForCompare(o.date) === date && o.orderStatus !== "已取貨" && o.orderStatus !== "已作廢");
    rows.push({
      date,
      store: dayOrders.filter(o => getOrderMethodType(o) === "store").length,
      delivery: dayOrders.filter(o => getOrderMethodType(o) === "delivery").length,
      total: dayOrders.length
    });
  }

  return `<div class="bg-white rounded-3xl border border-stone-100 shadow-sm p-4 md:p-5">
    <div class="flex flex-col md:flex-row md:items-center md:justify-between gap-2 mb-3">
      <h3 class="font-black text-[#5B7290] tracking-widest">📦 未來 7 天訂單預覽</h3>

function normalizeCouponDate(value) {
  return normalizeOrderDateForCompare(value) || "";
}

function formatCouponDate(value) {
  const d = normalizeCouponDate(value);
  return d ? d.replace(/-/g, "/") : "未設定";
}

function couponTypeText(type, value) {
  const t = (type || "").toString().toLowerCase();
  if (t === "minus") return `現折 $${escapeHtml(value || 0)}`;
  if (t === "discount") return `${escapeHtml(value || "")} 折扣比例`;
  return escapeHtml(type || "未設定");
}

function couponStatusBadge(coupon) {
  const today = getTodayDateInputValue();
  const start = normalizeCouponDate(coupon.start_date);
  const end = normalizeCouponDate(coupon.end_date);

  if (start && today < start) return `<span class="rounded-full border border-blue-200 bg-blue-50 px-2 py-0.5 text-xs font-black text-blue-700">尚未開始</span>`;
  if (end && today > end) return `<span class="rounded-full border border-stone-200 bg-stone-50 px-2 py-0.5 text-xs font-black text-stone-500">已結束</span>`;
  if (end) {
    const diff = Math.ceil((new Date(end + "T00:00:00") - new Date(today + "T00:00:00")) / (24 * 60 * 60 * 1000));
    if (diff <= 7) return `<span class="rounded-full border border-amber-200 bg-amber-50 px-2 py-0.5 text-xs font-black text-amber-700">剩 ${diff} 天</span>`;
  }
  return `<span class="rounded-full border border-emerald-200 bg-emerald-50 px-2 py-0.5 text-xs font-black text-emerald-700">進行中</span>`;
}

function getOrderMethodType(order) {
  const method = (order.shippingMethod || "").toString().trim().toLowerCase();
  if (method.includes("store")) return "store";
  if (method.includes("7-11") || method.includes("711")) return "delivery";

  const raw = [order.shippingMethod || "", order.address || ""].join(" ").toLowerCase();
  if (raw.includes("7-11") || raw.includes("711")) return "delivery";
  return "store";
}
function getOrderMethodLabel(order) {
  return getOrderMethodType(order) === "delivery" ? "7-11 店到店" : "門市自取";
}
function methodBadgeClass(order) {
  return getOrderMethodType(order) === "delivery"
    ? "bg-amber-50 text-amber-700 border-amber-200"
    : "bg-blue-50 text-blue-700 border-blue-200";
}
function methodCardClass(order) {
  return getOrderMethodType(order) === "delivery"
    ? "border-l-4 border-l-amber-400"
    : "border-l-4 border-l-blue-400";
}

function statusClass(status) {
  if (status === "已作廢") return "bg-red-50 text-red-700 border-red-200";
  if (status === "已取貨") return "bg-emerald-100 text-emerald-800 border-emerald-300";
  if (status === "已出貨") return "bg-emerald-50 text-emerald-700 border-emerald-200";
  if (status === "付款已確認" || status === "可取貨") return "bg-blue-50 text-blue-700 border-blue-200";
  if (status === "待付款") return "bg-amber-50 text-amber-700 border-amber-200";
  return "bg-stone-50 text-stone-700 border-stone-200";
}


function formatDateInputValue(date) {
  const y = date.getFullYear();
  const m = String(date.getMonth() + 1).padStart(2, "0");
  const d = String(date.getDate()).padStart(2, "0");
  return `${y}-${m}-${d}`;
}

function getDefaultMonthRange() {
  const now = new Date();
  const start = new Date(now.getFullYear(), now.getMonth(), 1);
  const end = new Date(now.getFullYear(), now.getMonth() + 1, 0);
  return {
    start: formatDateInputValue(start),
    end: formatDateInputValue(end)
  };
}

function getTodayDateInputValue() {
  return formatDateInputValue(new Date());
}

function setOrderDateFutureDefault() {

function normalizeOrderDateForCompare(value) {
  const raw = (value || "").toString().trim();
  if (!raw) return "";

  const match = raw.match(/(\d{4})[\/\-](\d{1,2})[\/\-](\d{1,2})/);
  if (!match) return "";

  const y = match[1];
  const m = String(match[2]).padStart(2, "0");
  const d = String(match[3]).padStart(2, "0");
  return `${y}-${m}-${d}`;
}

function setOrderDateDefaultMonth() {

  const startInput = document.getElementById("orderStartDate");
  const endInput = document.getElementById("orderEndDate");
  if (startInput) startInput.value = range.start;

function filterOrders() {
  const q = (document.getElementById("orderSearch")?.value || "").toLowerCase();
  const status = document.getElementById("orderStatusFilter")?.value || "";
  const method = document.getElementById("orderMethodFilter")?.value || "";
  const startDate = document.getElementById("orderStartDate")?.value || "";
  const endDate = document.getElementById("orderEndDate")?.value || "";
  const sortMode = document.getElementById("orderSortFilter")?.value || "dateAsc";

  const orders = (adminData.orders || []).filter(o => {
    const text = [o.id,o.name,o.phone,o.date,o.email,o.shippingMethod,o.address].join(" ").toLowerCase();
    const orderDate = normalizeOrderDateForCompare(o.date);
    const methodType = getOrderMethodType(o);

    const keywordOk = !q || text.includes(q);
    const statusOk = !status || o.orderStatus === status;
    const methodOk = !method || methodType === method;
    const startOk = !startDate || (orderDate && orderDate >= startDate);
    const endOk = !endDate || (orderDate && orderDate <= endDate);

    return keywordOk && statusOk && methodOk && startOk && endOk;
  }).sort((a, b) => {
    const dateA = normalizeOrderDateForCompare(a.date) || "9999-12-31";
    const dateB = normalizeOrderDateForCompare(b.date) || "9999-12-31";
    const dateCompare = dateA.localeCompare(dateB);
    if (dateCompare !== 0) {
      return sortMode === "dateDesc" ? -dateCompare : dateCompare;
    }
    const timeA = (a.timestamp || "").toString();
    const timeB = (b.timestamp || "").toString();
    const timeCompare = timeA.localeCompare(timeB);
    if (timeCompare !== 0) {
      return sortMode === "dateDesc" ? -timeCompare : timeCompare;
    }
    return (a.id || "").toString().localeCompare((b.id || "").toString());
  });
  const effectiveOrders = orders.filter(o => o.orderStatus !== "已作廢");
  const voidCount = orders.length - effectiveOrders.length;
  const storeCount = effectiveOrders.filter(o => getOrderMethodType(o) === "store").length;
  const deliveryCount = effectiveOrders.filter(o => getOrderMethodType(o) === "delivery").length;
  const rangeText = startDate && !endDate ? `｜日期：${startDate} 之後` : startDate && endDate ? `｜日期：${startDate}～${endDate}` : !startDate && endDate ? `｜日期：${endDate} 以前` : "｜日期：全部";
  const sortText = sortMode === "dateDesc" ? "遠到近" : "近到遠";
  const voidText = voidCount > 0 ? `｜已作廢 ${voidCount}` : "";
  document.getElementById("orderCount").textContent = `${effectiveOrders.length} 筆有效訂單｜門市自取 ${storeCount}｜7-11店到店 ${deliveryCount}${voidText}${rangeText}｜排序：${sortText}`;
  const area = document.getElementById("ordersArea");
  if (!orders.length) {
    area.innerHTML = `<div class="bg-white rounded-3xl border border-stone-100 p-8 text-center text-stone-400 font-bold">目前沒有符合條件的訂單</div>`;
    return;
  }
  area.innerHTML = orders.map(orderCard).join("");
}

function formatOrderTimestampMinute(value) {
  const raw = (value || "").toString().trim();
  if (!raw) return "-";
  const match = raw.match(/(\d{4})[\/-](\d{1,2})[\/-](\d{1,2})\s+(\d{1,2}):(\d{2})/);
  if (!match) return raw;
  const y = match[1];
  const m = String(match[2]).padStart(2, "0");
  const d = String(match[3]).padStart(2, "0");
  const hh = String(match[4]).padStart(2, "0");
  const mm = match[5];
  return `${y}/${m}/${d} ${hh}:${mm}`;
}

      <div class="font-black text-stone-500 tracking-widest text-[11px] mb-2">完整商品明細</div>
      ${formatOrderDetailsAdmin(order.details)}
    </div>

    <details class="group">
      <summary class="cursor-pointer list-none rounded-xl bg-stone-50 border border-stone-200 px-3 py-2 font-black text-[#5B7290] flex items-center justify-between gap-3 text-sm">
        <span>展開完整資料／更新狀態</span>
        <span class="text-xs group-open:hidden">展開</span>
        <span class="text-xs text-stone-400 hidden group-open:inline">收合</span>
      </summary>
      <div class="mt-2 space-y-3 border-t border-stone-100 pt-3">
        <div class="bg-stone-50 border border-stone-100 rounded-xl p-3 text-sm leading-relaxed">
          <div class="font-black text-stone-500 tracking-widest text-[11px] mb-2">每組完整明細</div>
          ${formatOrderGroupDetailsAdmin(order.details)}
        </div>
        ${order.note ? `<div class="bg-amber-50 border border-amber-200 rounded-xl p-3 text-sm"><strong>客人備註：</strong>${escapeHtml(order.note)}</div>` : ""}
        <div class="grid grid-cols-1 md:grid-cols-2 gap-3 pt-1">
          ${statusFields}
        </div>
        <div class="flex flex-col md:flex-row md:items-center justify-between gap-3 pt-1">
          <div class="text-xs text-stone-400 font-bold">最後更新：${escapeHtml(order.lastUpdate || "-")}</div>
          <button onclick="updateOrder('${escapeHtml(order.id)}')" class="h-11 rounded-xl bg-[#3E2D20] text-white px-5 font-black hover:bg-[#2B1F16]">儲存更新</button>
        </div>
      </div>
    </details>
  </article>`;
}

async function updateOrder(orderId) {
  const card = document.querySelector(`[data-order-id="${CSS.escape(orderId)}"]`);
  if (!card) return;
  const payload = {
    action: "adminUpdateOrder",
    token: getToken(),
    orderId,
    orderStatus: card.querySelector(".admin-status").value,
    paymentLink: card.querySelector(".admin-payment").value.trim(),
    trackingNo: card.querySelector(".admin-tracking").value.trim(),
    statusNote: card.querySelector(".admin-note").value.trim()
  };
  await postAdmin(payload, `${orderId} 已更新。`);
}

function renderProducts() {
  renderEditableTable("products", "Products", ["name","price","stock"], ["商品名稱","價格","庫存"], adminData.products || []);
}
function renderPackaging() {
  renderEditableTable("packaging", "Packaging", ["name","extra_price"], ["包裝名稱","加價"], adminData.packaging || []);
}
function renderCoupons() {
  renderEditableTable("coupons", "Coupons", ["code","type","value","min_spend","start_date","end_date"], ["折扣碼","類型","折扣值","低消","開始日","結束日"], adminData.coupons || []);
}
function settingDisplayName(name) {
  const key = (name || "").toString().trim().toLowerCase();
  if (key === "store_available_dates" || key === "pickup_available_dates" || key.includes("store") || key.includes("pickup") || key.includes("自取")) return "自取日期";
  if (key === "delivery_available_dates" || key.includes("delivery") || key.includes("711") || key.includes("7-11") || key.includes("店到店")) return "店到店出貨日期";
  return name || "未命名設定";
}

function settingSaveName(name) {
  const display = settingDisplayName(name);
  if (display === "自取日期") return "自取日期";
  if (display === "店到店出貨日期") return "店到店出貨日期";
  return name || "";
}

function formatDateHyphenFromInput(value) {
  const normalized = normalizeOrderDateForCompare(value);
  return normalized || "";
}

function formatDateDisplaySlash(value) {
  const normalized = formatDateHyphenFromInput(value);
  return normalized ? normalized.replace(/-/g, "/") : "";
}

function formatDateDisplayWithWeekday(value) {
  const normalized = formatDateHyphenFromInput(value);
  if (!normalized) return "";
  const date = new Date(normalized + "T00:00:00");
  const weekdays = ["日", "一", "二", "三", "四", "五", "六"];
  const weekday = isNaN(date.getTime()) ? "" : `(${weekdays[date.getDay()]})`;
  return normalized.replace(/-/g, "/") + weekday;
}

function parseDateList(value) {
  return (value || "").toString()
    .replace(/[\r\n、，]/g, ",")
    .split(",")
    .map(v => formatDateHyphenFromInput(v.trim()))
    .filter(Boolean);
}

function uniqueSortedDateList(value) {
  return Array.from(new Set(parseDateList(value))).sort();
}

function serializeDateList(dates) {
  return Array.from(new Set((dates || []).map(formatDateHyphenFromInput).filter(Boolean))).sort().join(",");
}

function settingValueByLabel(label) {
  const rows = adminData.settings || [];
  const found = rows.find(row => settingDisplayName(row.setting_name) === label);
  return found ? (found.value || "") : "";
}

function renderSettings() {
  const settingsRows = [
    { setting_name: "自取日期", value: settingValueByLabel("自取日期") },
    { setting_name: "店到店出貨日期", value: settingValueByLabel("店到店出貨日期") }
  ];

  document.getElementById("tab-settings").innerHTML = `
    <div class="bg-white rounded-3xl border border-stone-100 shadow-sm p-4 md:p-5 space-y-5">
      <div class="flex flex-col md:flex-row md:items-center justify-between gap-3">
        <div>
          <h2 class="text-xl font-black text-stone-900">日期設定</h2>
          <p class="text-sm text-stone-500 mt-1">用區間新增可用日期。</p>
        </div>
        <button onclick="saveSheet('settings','Settings')" class="h-10 rounded-xl bg-[#5B7290] text-white px-4 font-black hover:bg-[#3E4F66]">儲存 日期設定</button>
      </div>
      <div data-edit-table="settings" data-keys="setting_name,value" class="space-y-5">
        ${settingsRows.map(row => settingDateBlock(row.setting_name, row.value)).join("")}
      </div>
    </div>`;
}

function settingDateBlock(label, value) {
  const cleanDates = uniqueSortedDateList(value);
  const cleanValue = cleanDates.join(",");
  return `<section class="rounded-3xl border border-stone-100 bg-stone-50/60 p-4 md:p-5 space-y-4" data-setting-row>
    <input type="hidden" data-key="setting_name" value="${escapeHtml(label)}">
    <input type="hidden" data-key="value" class="setting-date-value" value="${escapeHtml(cleanValue)}">
    <div class="flex flex-col md:flex-row md:items-center md:justify-between gap-2">
      <div>
        <h3 class="text-lg font-black text-stone-900">${escapeHtml(label)}</h3>
        <p class="text-xs text-stone-400 font-bold mt-1">請選擇起始與結束日期，一次加入多天。</p>
      </div>
      <div class="flex gap-2">
        <button type="button" onclick="clearSettingDates(this)" class="h-10 rounded-xl border border-red-100 bg-red-50 px-4 font-black text-red-500 hover:bg-red-100 text-xs">清空日期</button>
        <button type="button" onclick="sortSettingDates(this)" class="h-10 rounded-xl border border-stone-200 bg-white px-4 font-black text-stone-600 hover:bg-stone-50 text-xs">整理日期</button>
      </div>
    </div>

    <div class="bg-white rounded-2xl border border-stone-100 p-3 space-y-3">
      <div class="text-xs font-black text-stone-500 tracking-widest">區間新增</div>
      <div class="grid grid-cols-1 md:grid-cols-[1fr_1fr_auto] gap-2">
        <input type="date" class="setting-range-start h-11 rounded-xl border border-stone-200 px-3 bg-stone-50" aria-label="開始日期">
        <input type="date" class="setting-range-end h-11 rounded-xl border border-stone-200 px-3 bg-stone-50" aria-label="結束日期">
        <button type="button" onclick="appendSettingDateRange(this)" class="h-11 rounded-xl bg-[#5B7290] text-white px-5 font-black hover:bg-[#3E4F66] text-sm">加入區間</button>
      </div>
    </div>

    <div class="bg-white rounded-2xl border border-stone-100 p-3 space-y-3">
      <div class="flex items-center justify-between gap-3">
        <div class="text-xs font-black text-stone-500 tracking-widest">已設定日期</div>
        <div class="text-xs font-black text-[#5B7290] mono"><span class="setting-date-count">${cleanDates.length}</span> 天</div>
      </div>
      <div class="setting-date-tags flex flex-wrap gap-2 min-h-[44px]">
        ${renderSettingDateTags(cleanDates)}
      </div>
    </div>
  </section>`;
}

function renderSettingDateTags(dates) {
  if (!dates || !dates.length) {
    return `<div class="text-sm text-stone-400 font-bold py-2">尚未設定日期</div>`;
  }
  return dates.map(date => `<span class="inline-flex items-center gap-2 rounded-full border border-stone-200 bg-stone-50 px-3 py-1.5 text-sm font-black text-stone-700">
    ${escapeHtml(formatDateDisplayWithWeekday(date))}
    <button type="button" onclick="removeSettingDate(this, '${escapeHtml(date)}')" class="text-stone-400 hover:text-red-500 font-black" aria-label="刪除 ${escapeHtml(date)}">×</button>
  </span>`).join("");
}


function renderEditableTable(tab, sheetName, keys, labels, rows, textareaLong = false) {
  const id = "tab-" + tab;
  const productNamingNotice = tab === "products" ? `
      <p class="text-xs text-stone-500 font-bold leading-relaxed">
        📌 （限）＝限定品項，僅顯示在「期間限定商品」內｜（自取）＝限門市自取｜例：開心果可麗露（限）、巴斯克蛋糕（限自取）
      </p>` : "";
  const couponOperationNotice = tab === "coupons" ? `
      <p class="text-xs text-stone-500 font-bold leading-relaxed">
        📌 現折金額請直接輸入金額，例如 100；折扣比例請輸入小數，例如 0.9 代表 9 折。
      </p>` : "";

  document.getElementById(id).innerHTML = `
    <div class="bg-white rounded-3xl border border-stone-100 shadow-sm p-4 md:p-5 space-y-4">
      <div class="flex flex-col md:flex-row md:items-center justify-between gap-3">
        <div>
          <h2 class="text-xl font-black text-stone-900">${sheetName}</h2>
          <p class="text-sm text-stone-500 mt-1">修改後請按「儲存 ${sheetName}」。</p>
        </div>
        <div class="flex gap-2">
          <button onclick="addRow('${tab}')" class="h-10 rounded-xl border border-stone-200 px-4 font-black text-stone-600 bg-white hover:bg-stone-50">新增一列</button>
          <button onclick="saveSheet('${tab}','${sheetName}')" class="h-10 rounded-xl bg-[#5B7290] text-white px-4 font-black hover:bg-[#3E4F66]">儲存 ${sheetName}</button>
        </div>
      </div>
      ${productNamingNotice}
      ${couponOperationNotice}
      <div class="overflow-x-auto">
        <table class="w-full text-sm min-w-[720px]" data-edit-table="${tab}" data-keys="${keys.join(",")}">
          <thead><tr class="text-left text-xs tracking-widest text-stone-400">${labels.map(l => `<th class="px-2 py-2">${l}</th>`).join("")}<th class="px-2 py-2">操作</th></tr></thead>
          <tbody>${rows.map(row => editRowHtml(tab, keys, row, textareaLong)).join("")}</tbody>
        </table>
      </div>
    </div>`;
}

function editRowHtml(tab, keys, row = {}, textareaLong = false) {
  return `<tr class="border-t border-stone-100">${keys.map((key, idx) => {
    const val = row[key] || "";
    let field = "";

    if (tab === "coupons" && key === "type") {
      field = `<select data-key="${key}" class="w-full h-10 rounded-xl border border-stone-200 px-3 bg-stone-50">
        <option value="minus" ${val === "minus" ? "selected" : ""}>現折金額</option>
        <option value="discount" ${val === "discount" ? "selected" : ""}>折扣比例</option>
      </select>`;
    } else if (tab === "coupons" && (key === "start_date" || key === "end_date")) {
      field = `<input type="date" data-key="${key}" class="w-full h-10 rounded-xl border border-stone-200 px-3 bg-stone-50" value="${normalizeOrderDateForCompare(val)}">`;
    } else if (textareaLong && idx === 1) {
      field = `<textarea data-key="${key}" class="w-full rounded-xl border border-stone-200 px-3 py-2 bg-stone-50">${escapeHtml(val)}</textarea>`;
    } else {
      field = `<input data-key="${key}" class="w-full h-10 rounded-xl border border-stone-200 px-3 bg-stone-50" value="${escapeHtml(val)}">`;
    }

    return `<td class="px-2 py-2 align-top">${field}</td>`;
  }).join("")}<td class="px-2 py-2 align-top text-center">
    <button onclick="this.closest('tr').remove()" title="刪除" aria-label="刪除" class="inline-flex h-10 w-10 items-center justify-center rounded-xl bg-red-50 text-red-500 font-black hover:bg-red-100">
      🗑️
    </button>
  </td></tr>`;
}

function getSettingBlock(button) {
  return button.closest("[data-setting-row]");
}

function getSettingDates(box) {
  const hidden = box.querySelector(".setting-date-value");
  return hidden ? uniqueSortedDateList(hidden.value) : [];
}

function setSettingDates(box, dates) {
  const hidden = box.querySelector(".setting-date-value");
  const tags = box.querySelector(".setting-date-tags");
  const count = box.querySelector(".setting-date-count");
  const clean = Array.from(new Set((dates || []).map(formatDateHyphenFromInput).filter(Boolean))).sort();
  const serialized = clean.join(",");
  if (hidden) hidden.value = serialized;
  if (tags) tags.innerHTML = renderSettingDateTags(clean);
  if (count) count.textContent = clean.length;
}

function mergeSettingDates(box, dates) {
  setSettingDates(box, getSettingDates(box).concat(dates));
}

function appendSettingDate(button) {
  const box = getSettingBlock(button);
  const dateInput = box.querySelector(".setting-date-picker");
  const date = formatDateHyphenFromInput(dateInput?.value || "");
  if (!date) return;
  mergeSettingDates(box, [date]);
  dateInput.value = "";
}

function appendSettingDateRange(button) {
  const box = getSettingBlock(button);
  const startInput = box.querySelector(".setting-range-start");
  const endInput = box.querySelector(".setting-range-end");
  if (!startInput?.value || !endInput?.value) return;

  const start = new Date(startInput.value + "T00:00:00");
  const end = new Date(endInput.value + "T00:00:00");
  if (isNaN(start.getTime()) || isNaN(end.getTime()) || start > end) {
    alert("請確認起始日期不可晚於結束日期。");
    return;
  }

  const dates = [];
  const cursor = new Date(start);
  while (cursor <= end) {
    dates.push(formatDateInputValue(cursor));
    cursor.setDate(cursor.getDate() + 1);
  }
  mergeSettingDates(box, dates);
}

function appendSettingMonth(button) {
  const box = getSettingBlock(button);
  const monthInput = box.querySelector(".setting-month-picker");
  const value = monthInput?.value || "";
  if (!value) return;

  const [yearText, monthText] = value.split("-");
  const year = Number(yearText);
  const month = Number(monthText);
  if (!year || !month) return;

  const lastDay = new Date(year, month, 0).getDate();
  const dates = [];
  for (let day = 1; day <= lastDay; day++) {
    dates.push(`${year}-${String(month).padStart(2, "0")}-${String(day).padStart(2, "0")}`);
  }
  mergeSettingDates(box, dates);
}

function removeSettingDate(button, date) {
  const box = getSettingBlock(button);
  setSettingDates(box, getSettingDates(box).filter(d => d !== date));
}

function clearSettingDates(button) {
  if (!confirm("確定要清空這個日期設定嗎？")) return;
  setSettingDates(getSettingBlock(button), []);
}

function sortSettingDates(button) {
  const box = getSettingBlock(button);
  setSettingDates(box, getSettingDates(box));
}

function addRow(tab) {
  const table = document.querySelector(`[data-edit-table="${tab}"]`);
  const keys = table.dataset.keys.split(",");
  const textareaLong = tab === "settings";
  table.querySelector("tbody").insertAdjacentHTML("beforeend", editRowHtml(tab, keys, {}, textareaLong));
}

function collectRows(tab) {
  const table = document.querySelector(`[data-edit-table="${tab}"]`);
  const keys = table.dataset.keys.split(",");

  if (tab === "settings") {
    return [...table.querySelectorAll("[data-setting-row]")].map(row => {
      const obj = {};
      keys.forEach(key => {
        const input = row.querySelector(`[data-key="${key}"]`);
        obj[key] = input ? input.value.trim() : "";
      });
      return obj;
    });
  }

  return [...table.querySelectorAll("tbody tr")].map(tr => {
    const obj = {};
    keys.forEach(key => {
      const input = tr.querySelector(`[data-key="${key}"]`);
      obj[key] = input ? input.value.trim() : "";
    });
    return obj;
  });
}

async function saveSheet(tab, sheetName) {
  const rows = collectRows(tab);
  await postAdmin({ action:"adminReplaceSheetRows", token:getToken(), sheetName, rows }, `${sheetName} 已儲存。`);
}

async function postAdmin(payload, successMessage) {
  const restoreButton = setButtonLoading(getActiveActionButton(), "儲存中...");
  const loadingToast = showAdminToast("儲存中...", "loading", 0);
  showMessage("adminMessage", "儲存中...", "info");
  try {
    const res = await fetch(API_URL, { method:"POST", body: JSON.stringify(payload) });
    const data = await res.json();
    if (data.status !== "success") {
      showMessage("adminMessage", data.message || "儲存失敗。", "error");
      removeAdminToast(loadingToast);
      showAdminToast(data.message || "儲存失敗。", "error", 4200);
      return;
    }
    const cleanMessage = (successMessage || data.message || "已儲存。").replace(/。$/, "");
    showSuccessMessage("adminMessage", cleanMessage);
    removeAdminToast(loadingToast);
    showAdminToast(cleanMessage, "success");
    await loadAll();
  } catch (err) {
    showMessage("adminMessage", "儲存失敗：" + err.message, "error");
    removeAdminToast(loadingToast);
    showAdminToast("儲存失敗：" + err.message, "error", 4200);
  } finally {
    if (restoreButton) restoreButton();
  }
}

document.getElementById("adminPassword").addEventListener("keydown", e => { if (e.key === "Enter") adminLogin(); });
if (getToken()) { setLoggedInState(true); loadAll(); }
</script>
