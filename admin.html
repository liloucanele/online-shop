<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lilou 後台管理</title>
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <style>
    :root { --brand:#5B7290; --brandDark:#3E4F66; --bg:#F4F6F9; }
    input, select, textarea { font-size:16px; }
    .card { background:#fff; border:1px solid #e7e5e4; border-radius:1rem; box-shadow:0 1px 2px rgba(0,0,0,.03); }
    .btn { height:44px; border-radius:.75rem; font-weight:900; transition:.15s; }
    .btn-primary { background:var(--brand); color:#fff; }
    .btn-primary:hover { background:var(--brandDark); }
    .btn-soft { background:#f5f5f4; color:#44403c; border:1px solid #e7e5e4; }
    .field { width:100%; height:44px; border:1px solid #d6d3d1; border-radius:.75rem; padding:0 .75rem; background:#fff; outline:none; }
    .field:focus { border-color:var(--brand); box-shadow:0 0 0 1px var(--brand); }
    .textarea { width:100%; min-height:88px; border:1px solid #d6d3d1; border-radius:.75rem; padding:.75rem; background:#fff; outline:none; }
    .badge { display:inline-flex; align-items:center; padding:.25rem .55rem; border-radius:999px; font-size:12px; font-weight:900; }
    .status-訂單確認中 { background:#f5f5f4; color:#57534e; }
    .status-待付款 { background:#fff7ed; color:#c2410c; }
    .status-付款已確認 { background:#eff6ff; color:#1d4ed8; }
    .status-可取貨 { background:#ecfdf5; color:#047857; }
    .status-已出貨 { background:#eef2ff; color:#4338ca; }
    .status-已取貨 { background:#f0fdf4; color:#166534; }
    .method-store { background:#ecfeff; color:#0e7490; }
    .method-delivery { background:#fef3c7; color:#92400e; }
    th { white-space:nowrap; }
    .hidden-important { display:none !important; }
  </style>
</head>
<body class="bg-[#F4F6F9] text-stone-800 min-h-screen">
  <script>
    const API_URL = "https://script.google.com/macros/s/AKfycbyA3ovLtC-hDYGL-_9CMNKk9A--TcrU-W-mN6Hc0GaZ8eDrvAsew3ZdtYBLSyimuiU/exec";
    const ORDER_STATUSES = ["訂單確認中", "待付款", "付款已確認", "可取貨", "已出貨", "已取貨"];
    const STORE_FLOW = ["訂單確認中", "可取貨", "已取貨"];
    const DELIVERY_FLOW = ["訂單確認中", "待付款", "付款已確認", "已出貨", "已取貨"];

    let token = localStorage.getItem("lilou_admin_token") || "";
    let adminData = { orders: [], settings: [], dashboard: {} };
    let filteredOrders = [];

    const $ = (id) => document.getElementById(id);

    function escapeHtml(value) {
      return String(value ?? "").replace(/[&<>'"]/g, ch => ({"&":"&amp;","<":"&lt;",">":"&gt;","'":"&#39;","\"":"&quot;"}[ch]));
    }

    function normalizeMethod(method) {
      const m = String(method || "").trim();
      if (m === "Store Pickup" || m.toLowerCase().includes("store")) return "store";
      if (m === "7-11 Pickup" || m.includes("7-11") || m.includes("711")) return "delivery";
      return "delivery";
    }

    function methodLabel(method) {
      return normalizeMethod(method) === "store" ? "門市自取" : "7-11 店到店";
    }

    function methodBadge(method) {
      const type = normalizeMethod(method);
      return `<span class="badge ${type === "store" ? "method-store" : "method-delivery"}">${methodLabel(method)}</span>`;
    }

    function statusBadge(status) {
      const safe = escapeHtml(status || "訂單確認中");
      return `<span class="badge status-${safe}">${safe}</span>`;
    }

    function toDateInputValue(value) {
      if (!value) return "";
      const clean = String(value).trim().replace(/\//g, "-");
      const m = clean.match(/(\d{4})-(\d{1,2})-(\d{1,2})/);
      if (!m) return "";
      return `${m[1]}-${String(m[2]).padStart(2,"0")}-${String(m[3]).padStart(2,"0")}`;
    }

    function toSlashDate(value) {
      const v = toDateInputValue(value);
      return v ? v.replace(/-/g, "/") : "";
    }

    function todayMonthRange() {
      const d = new Date();
      const y = d.getFullYear();
      const m = String(d.getMonth() + 1).padStart(2, "0");
      const last = new Date(y, d.getMonth() + 1, 0).getDate();
      return { start: `${y}-${m}-01`, end: `${y}-${m}-${String(last).padStart(2, "0")}` };
    }

    async function apiGet(action, params = {}) {
      const url = new URL(API_URL);
      url.searchParams.set("action", action);
      Object.entries(params).forEach(([k, v]) => url.searchParams.set(k, v));
      url.searchParams.set("_", Date.now());
      const res = await fetch(url.toString());
      return await res.json();
    }

    async function apiPost(payload) {
      const res = await fetch(API_URL, { method: "POST", body: JSON.stringify(payload) });
      return await res.json();
    }

    function setBusy(isBusy, text = "處理中...") {
      $("globalBusyText").textContent = text;
      $("globalBusy").classList.toggle("hidden", !isBusy);
    }

    async function login() {
      const password = $("adminPassword").value.trim();
      if (!password) return alert("請輸入後台密碼");
      setBusy(true, "登入中...");
      try {
        const data = await apiGet("adminLogin", { password });
        if (data.status !== "success") throw new Error(data.message || "登入失敗");
        token = data.token;
        localStorage.setItem("lilou_admin_token", token);
        $("loginPanel").classList.add("hidden");
        $("adminPanel").classList.remove("hidden");
        await loadAll();
      } catch (e) {
        alert(e.message);
      } finally {
        setBusy(false);
      }
    }

    function logout() {
      localStorage.removeItem("lilou_admin_token");
      token = "";
      location.reload();
    }

    async function loadAll() {
      if (!token) return;
      setBusy(true, "同步後台資料中...");
      try {
        const data = await apiGet("adminGetAll", { token });
        if (data.status !== "success") throw new Error(data.message || "讀取失敗");
        adminData = data;
        initFilterDefaults();
        applyOrderFilters();
        renderSettings();
        renderDashboard();
      } catch (e) {
        alert(e.message);
        if (String(e.message).includes("登入") || String(e.message).includes("token")) logout();
      } finally {
        setBusy(false);
      }
    }

    function initFilterDefaults() {
      if (!$("filterStart").value && !$("filterEnd").value) {
        const range = todayMonthRange();
        $("filterStart").value = range.start;
        $("filterEnd").value = range.end;
      }
      if (!$("dashboardDate").value) {
        const today = new Date();
        $("dashboardDate").value = `${today.getFullYear()}-${String(today.getMonth()+1).padStart(2,"0")}-${String(today.getDate()).padStart(2,"0")}`;
      }
    }

    function applyOrderFilters() {
      const start = $("filterStart").value;
      const end = $("filterEnd").value;
      const method = $("filterMethod").value;
      const status = $("filterStatus").value;
      const keyword = $("filterKeyword").value.trim().toLowerCase();

      filteredOrders = (adminData.orders || []).filter(o => {
        const dateValue = toDateInputValue(o.date || o.timestamp);
        if (start && dateValue && dateValue < start) return false;
        if (end && dateValue && dateValue > end) return false;
        if (method && normalizeMethod(o.shippingMethod) !== method) return false;
        if (status && String(o.orderStatus || "") !== status) return false;
        if (keyword) {
          const haystack = [o.id, o.name, o.phone, o.email, o.address, o.details, o.note, o.statusNote, o.trackingNo].join(" ").toLowerCase();
          if (!haystack.includes(keyword)) return false;
        }
        return true;
      }).sort((a,b) => String(b.timestamp || b.id).localeCompare(String(a.timestamp || a.id)));

      renderOrders();
      renderFilterSummary();
    }

    function resetOrderFilters() {
      const range = todayMonthRange();
      $("filterStart").value = range.start;
      $("filterEnd").value = range.end;
      $("filterMethod").value = "";
      $("filterStatus").value = "";
      $("filterKeyword").value = "";
      applyOrderFilters();
    }

    function renderFilterSummary() {
      const total = filteredOrders.length;
      const amount = filteredOrders.reduce((sum, o) => sum + (Number(String(o.total || "").replace(/[^0-9.-]/g, "")) || 0), 0);
      $("orderFilterSummary").innerHTML = `目前顯示 <b>${total}</b> 筆訂單，金額合計 <b>$${amount.toLocaleString()}</b>`;
    }

    function renderOrders() {
      const body = $("ordersBody");
      if (!filteredOrders.length) {
        body.innerHTML = `<tr><td colspan="8" class="text-center py-10 text-stone-400 font-bold">沒有符合條件的訂單</td></tr>`;
        return;
      }

      body.innerHTML = filteredOrders.map(o => {
        const type = normalizeMethod(o.shippingMethod);
        const isStore = type === "store";
        const statusOptions = (isStore ? STORE_FLOW : DELIVERY_FLOW).map(s => `<option value="${s}" ${s === o.orderStatus ? "selected" : ""}>${s}</option>`).join("");
        const paymentBlock = isStore ? "" : `
          <label class="block text-xs font-black text-stone-500 mt-3 mb-1">PChomePay 付款連結</label>
          <input class="field" id="pay-${escapeHtml(o.id)}" value="${escapeHtml(o.paymentLink)}" placeholder="https://..." />
          <label class="block text-xs font-black text-stone-500 mt-3 mb-1">貨運編號</label>
          <input class="field" id="track-${escapeHtml(o.id)}" value="${escapeHtml(o.trackingNo)}" placeholder="請輸入貨運編號" />`;

        return `
          <tr class="border-t border-stone-100 align-top">
            <td class="p-3 min-w-[150px]">
              <div class="font-black text-stone-900">${escapeHtml(o.id)}</div>
              <div class="text-xs text-stone-400 mt-1">${escapeHtml(o.timestamp)}</div>
              <div class="mt-2">${methodBadge(o.shippingMethod)}</div>
            </td>
            <td class="p-3 min-w-[150px]">
              <div class="font-black">${escapeHtml(o.name)}</div>
              <div class="text-xs text-stone-500">${escapeHtml(o.phone)}</div>
              <div class="text-xs text-stone-400 break-all">${escapeHtml(o.email)}</div>
            </td>
            <td class="p-3 min-w-[150px]">
              <div class="font-black">${escapeHtml(o.date)}</div>
              <div class="text-xs text-stone-500 mt-1">${escapeHtml(o.address)}</div>
            </td>
            <td class="p-3 min-w-[260px]">
              <div class="text-xs leading-relaxed whitespace-pre-wrap">${escapeHtml(formatDetails(o.details))}</div>
              <div class="font-black text-[#5B7290] mt-2">$${escapeHtml(o.total)}</div>
            </td>
            <td class="p-3 min-w-[250px]">
              <label class="block text-xs font-black text-stone-500 mb-1">訂單狀態</label>
              <select class="field" id="status-${escapeHtml(o.id)}">${statusOptions}</select>
              ${paymentBlock}
              <label class="block text-xs font-black text-stone-500 mt-3 mb-1">訂單備註</label>
              <textarea class="textarea" id="note-${escapeHtml(o.id)}" placeholder="給客人看的狀態補充，非必填">${escapeHtml(o.statusNote)}</textarea>
            </td>
            <td class="p-3 min-w-[130px]">${statusBadge(o.orderStatus)}<div class="text-xs text-stone-400 mt-2">${escapeHtml(o.lastUpdate)}</div></td>
            <td class="p-3 min-w-[120px]"><button class="btn btn-primary px-4" onclick="saveOrder('${escapeHtml(o.id)}','${type}')">儲存</button></td>
          </tr>`;
      }).join("");
    }

    function formatDetails(details) {
      return String(details || "")
        .replace(/｜/g, "\n")
        .replace(/【第/g, "\n【第")
        .trim();
    }

    async function saveOrder(orderId, type) {
      const isStore = type === "store";
      const payload = {
        action: "adminUpdateOrder",
        token,
        orderId,
        orderStatus: $(`status-${orderId}`).value,
        statusNote: $(`note-${orderId}`).value.trim(),
        paymentLink: isStore ? "" : $(`pay-${orderId}`).value.trim(),
        trackingNo: isStore ? "" : $(`track-${orderId}`).value.trim()
      };

      if (isStore && !STORE_FLOW.includes(payload.orderStatus)) {
        return alert("門市自取只能使用：訂單確認中、可取貨、已取貨");
      }
      if (!isStore && !DELIVERY_FLOW.includes(payload.orderStatus)) {
        return alert("7-11 店到店只能使用：訂單確認中、待付款、付款已確認、已出貨、已取貨");
      }

      setBusy(true, "更新訂單中...");
      try {
        const data = await apiPost(payload);
        if (data.status !== "success") throw new Error(data.message || "更新失敗");
        await loadAll();
        alert("訂單已更新。若狀態有變更，系統會依 GS 設定寄出通知信。");
      } catch (e) {
        alert(e.message);
      } finally {
        setBusy(false);
      }
    }

    function dashboardOrders() {
      const date = $("dashboardDate").value;
      const method = $("dashboardMethod").value;
      return (adminData.orders || []).filter(o => {
        if (date && toDateInputValue(o.date || o.timestamp) !== date) return false;
        if (method && normalizeMethod(o.shippingMethod) !== method) return false;
        return true;
      });
    }

    function renderDashboard() {
      const orders = dashboardOrders();
      const countBy = (status) => orders.filter(o => o.orderStatus === status).length;
      const revenue = orders.reduce((sum, o) => sum + (Number(String(o.total || "").replace(/[^0-9.-]/g, "")) || 0), 0);

      const cards = [
        ["當日訂單", orders.length],
        ["訂單確認中", countBy("訂單確認中")],
        ["待付款", countBy("待付款")],
        ["付款已確認", countBy("付款已確認")],
        ["可取貨", countBy("可取貨")],
        ["已出貨", countBy("已出貨")],
        ["已取貨", countBy("已取貨")],
        ["當日金額", "$" + revenue.toLocaleString()]
      ];
      $("dashboardCards").innerHTML = cards.map(([label, value]) => `
        <div class="card p-4">
          <div class="text-xs font-black text-stone-400 tracking-widest">${label}</div>
          <div class="text-2xl font-black text-stone-900 mt-1">${value}</div>
        </div>`).join("");

      const production = {};
      const packaging = {};
      orders.forEach(o => {
        extractProduction(o.details).forEach(([name, qty]) => production[name] = (production[name] || 0) + qty);
        extractPackaging(o.details).forEach(([name, qty]) => packaging[name] = (packaging[name] || 0) + qty);
      });
      renderSummaryTable("productionSummary", production, "品項");
      renderSummaryTable("packagingSummary", packaging, "包裝");
      renderDashboardOrderList(orders);
    }

    function extractProduction(details) {
      const text = String(details || "");
      const result = [];
      const regex = /([^｜、,，\n]+?)\((\d+)個\)/g;
      let m;
      while ((m = regex.exec(text)) !== null) result.push([m[1].replace(/^.*】/, "").trim(), Number(m[2]) || 0]);
      return result;
    }

    function extractPackaging(details) {
      const text = String(details || "");
      const result = [];
      const regex = /【第\d+組:\s*([^】×]+)(?:×(\d+)組)?】/g;
      let m;
      while ((m = regex.exec(text)) !== null) result.push([m[1].trim(), Number(m[2]) || 1]);
      return result;
    }

    function renderSummaryTable(targetId, obj, label) {
      const rows = Object.entries(obj).sort((a,b) => b[1] - a[1]);
      $(targetId).innerHTML = rows.length ? rows.map(([name, qty]) => `
        <tr class="border-t border-stone-100"><td class="py-2 pr-2">${escapeHtml(name)}</td><td class="py-2 text-right font-black">${qty}</td></tr>`).join("")
        : `<tr><td class="py-4 text-stone-400 font-bold" colspan="2">此日期沒有${label}資料</td></tr>`;
    }

    function renderDashboardOrderList(orders) {
      $("dashboardOrders").innerHTML = orders.length ? orders.map(o => `
        <div class="border border-stone-100 rounded-xl p-3 bg-stone-50">
          <div class="flex flex-wrap items-center justify-between gap-2">
            <div class="font-black">${escapeHtml(o.id)}｜${escapeHtml(o.name)}</div>
            <div class="flex gap-2">${methodBadge(o.shippingMethod)}${statusBadge(o.orderStatus)}</div>
          </div>
          <div class="text-xs text-stone-500 mt-1">${escapeHtml(o.date)}｜$${escapeHtml(o.total)}｜${escapeHtml(o.address)}</div>
        </div>`).join("") : `<div class="text-center py-8 text-stone-400 font-bold">此日期沒有訂單</div>`;
    }

    function settingLabel(name) {
      const key = String(name || "").toLowerCase();
      if (key === "store_available_dates" || key === "pickup_available_dates") return "自取日期";
      if (key === "delivery_available_dates") return "店到店出貨日期";
      return name;
    }

    function isDateSetting(name) {
      const key = String(name || "").toLowerCase();
      return key.includes("date") || key.includes("日期") || key.includes("available");
    }

    function parseDateList(value) {
      return String(value || "").split(/[,，、\n]/).map(v => toSlashDate(v.trim())).filter(Boolean);
    }

    function renderSettings() {
      const settings = (adminData.settings || []).filter(s => s.setting_name);
      $("settingsList").innerHTML = settings.map((s, index) => {
        const key = escapeHtml(s.setting_name);
        const label = escapeHtml(settingLabel(s.setting_name));
        const dates = parseDateList(s.value);
        if (isDateSetting(s.setting_name)) {
          return `
            <div class="card p-4" data-setting-index="${index}">
              <div class="flex flex-wrap justify-between gap-3 items-center mb-3">
                <div>
                  <div class="text-sm font-black text-[#5B7290]">${label}</div>
                  <div class="text-xs text-stone-400 font-bold">設定名稱已鎖定：${key}</div>
                </div>
              </div>
              <input type="hidden" id="setting-name-${index}" value="${key}" />
              <div class="flex gap-2">
                <input type="date" id="setting-date-${index}" class="field" />
                <button class="btn btn-primary px-4" onclick="addSettingDate(${index})">加入日期</button>
              </div>
              <div id="setting-chips-${index}" class="flex flex-wrap gap-2 mt-3">${dates.map(d => settingDateChip(index, d)).join("")}</div>
              <textarea id="setting-value-${index}" class="textarea mt-3 hidden">${escapeHtml(dates.join(","))}</textarea>
            </div>`;
        }
        return `
          <div class="card p-4" data-setting-index="${index}">
            <div class="mb-2">
              <div class="text-sm font-black text-[#5B7290]">${label}</div>
              <div class="text-xs text-stone-400 font-bold">設定名稱已鎖定：${key}</div>
            </div>
            <input type="hidden" id="setting-name-${index}" value="${key}" />
            <textarea id="setting-value-${index}" class="textarea">${escapeHtml(s.value)}</textarea>
          </div>`;
      }).join("");
    }

    function settingDateChip(index, date) {
      return `<span class="badge bg-stone-100 text-stone-700 gap-2" data-date="${escapeHtml(date)}">${escapeHtml(date)} <button class="text-red-500 font-black" onclick="removeSettingDate(${index}, '${escapeHtml(date)}')">×</button></span>`;
    }

    function addSettingDate(index) {
      const input = $(`setting-date-${index}`);
      const date = toSlashDate(input.value);
      if (!date) return;
      const textarea = $(`setting-value-${index}`);
      const dates = Array.from(new Set([...parseDateList(textarea.value), date])).sort();
      textarea.value = dates.join(",");
      $(`setting-chips-${index}`).innerHTML = dates.map(d => settingDateChip(index, d)).join("");
      input.value = "";
    }

    function removeSettingDate(index, date) {
      const textarea = $(`setting-value-${index}`);
      const dates = parseDateList(textarea.value).filter(d => d !== date);
      textarea.value = dates.join(",");
      $(`setting-chips-${index}`).innerHTML = dates.map(d => settingDateChip(index, d)).join("");
    }

    async function saveSettings() {
      const rows = [];
      document.querySelectorAll("[data-setting-index]").forEach(card => {
        const index = card.getAttribute("data-setting-index");
        rows.push({
          setting_name: $(`setting-name-${index}`).value,
          value: $(`setting-value-${index}`).value.trim()
        });
      });
      setBusy(true, "儲存日期設定中...");
      try {
        const data = await apiPost({ action: "adminReplaceSheetRows", token, sheetName: "Settings", rows });
        if (data.status !== "success") throw new Error(data.message || "儲存失敗");
        await loadAll();
        alert("日期設定已更新。設定名稱維持不變。 ");
      } catch (e) {
        alert(e.message);
      } finally {
        setBusy(false);
      }
    }

    function switchTab(tab) {
      ["dashboard", "orders", "settings"].forEach(t => {
        $(`tab-${t}`).classList.toggle("hidden", t !== tab);
        $(`btn-${t}`).classList.toggle("btn-primary", t === tab);
        $(`btn-${t}`).classList.toggle("btn-soft", t !== tab);
      });
      if (tab === "dashboard") renderDashboard();
      if (tab === "orders") applyOrderFilters();
    }

    window.addEventListener("DOMContentLoaded", async () => {
      ORDER_STATUSES.forEach(s => $("filterStatus").insertAdjacentHTML("beforeend", `<option value="${s}">${s}</option>`));
      if (token) {
        $("loginPanel").classList.add("hidden");
        $("adminPanel").classList.remove("hidden");
        await loadAll();
      }
    });
  </script>

  <div id="globalBusy" class="fixed inset-0 z-50 hidden items-center justify-center bg-stone-950/50 backdrop-blur-sm">
    <div class="bg-white rounded-2xl p-6 shadow-xl text-center mx-4">
      <div class="w-9 h-9 mx-auto rounded-full border-4 border-stone-200 border-l-[#5B7290] animate-spin"></div>
      <div id="globalBusyText" class="mt-3 font-black text-stone-700">處理中...</div>
    </div>
  </div>

  <main class="max-w-7xl mx-auto p-4 md:p-8 space-y-6">
    <header class="flex flex-wrap justify-between items-center gap-4">
      <div>
        <h1 class="text-2xl md:text-3xl font-black text-stone-900">Lilou 後台管理</h1>
        <p class="text-sm text-stone-500 font-bold mt-1">訂單、Dashboard 與日期設定</p>
      </div>
      <button onclick="logout()" class="btn btn-soft px-4">登出</button>
    </header>

    <section id="loginPanel" class="card p-6 max-w-md mx-auto mt-20 space-y-4">
      <div>
        <h2 class="text-xl font-black">後台登入</h2>
        <p class="text-sm text-stone-500 mt-1">請輸入管理密碼</p>
      </div>
      <input type="password" id="adminPassword" class="field" placeholder="後台密碼" onkeydown="if(event.key==='Enter') login()" />
      <button onclick="login()" class="btn btn-primary w-full">登入</button>
    </section>

    <section id="adminPanel" class="hidden space-y-5">
      <nav class="flex flex-wrap gap-2">
        <button id="btn-dashboard" onclick="switchTab('dashboard')" class="btn btn-primary px-4">Dashboard</button>
        <button id="btn-orders" onclick="switchTab('orders')" class="btn btn-soft px-4">訂單管理</button>
        <button id="btn-settings" onclick="switchTab('settings')" class="btn btn-soft px-4">日期設定</button>
        <button onclick="loadAll()" class="btn btn-soft px-4 ml-auto">重新整理</button>
      </nav>

      <section id="tab-dashboard" class="space-y-5">
        <div class="card p-4 grid grid-cols-1 md:grid-cols-4 gap-3 items-end">
          <div>
            <label class="block text-xs font-black text-stone-500 mb-1">Dashboard 日期</label>
            <input type="date" id="dashboardDate" class="field" onchange="renderDashboard()" />
          </div>
          <div>
            <label class="block text-xs font-black text-stone-500 mb-1">配送方式</label>
            <select id="dashboardMethod" class="field" onchange="renderDashboard()">
              <option value="">全部</option>
              <option value="store">門市自取</option>
              <option value="delivery">7-11 店到店</option>
            </select>
          </div>
        </div>
        <div id="dashboardCards" class="grid grid-cols-2 md:grid-cols-4 gap-3"></div>
        <div class="grid grid-cols-1 lg:grid-cols-2 gap-4">
          <div class="card p-4">
            <h3 class="font-black mb-2">當日製作統計</h3>
            <table class="w-full text-sm"><tbody id="productionSummary"></tbody></table>
          </div>
          <div class="card p-4">
            <h3 class="font-black mb-2">當日包裝統計</h3>
            <table class="w-full text-sm"><tbody id="packagingSummary"></tbody></table>
          </div>
        </div>
        <div class="card p-4">
          <h3 class="font-black mb-3">當日訂單清單</h3>
          <div id="dashboardOrders" class="space-y-2"></div>
        </div>
      </section>

      <section id="tab-orders" class="hidden space-y-4">
        <div class="card p-4 space-y-3">
          <div class="grid grid-cols-1 md:grid-cols-6 gap-3 items-end">
            <div>
              <label class="block text-xs font-black text-stone-500 mb-1">開始日期</label>
              <input type="date" id="filterStart" class="field" />
            </div>
            <div>
              <label class="block text-xs font-black text-stone-500 mb-1">結束日期</label>
              <input type="date" id="filterEnd" class="field" />
            </div>
            <div>
              <label class="block text-xs font-black text-stone-500 mb-1">配送方式</label>
              <select id="filterMethod" class="field"><option value="">全部</option><option value="store">門市自取</option><option value="delivery">7-11 店到店</option></select>
            </div>
            <div>
              <label class="block text-xs font-black text-stone-500 mb-1">訂單狀態</label>
              <select id="filterStatus" class="field"><option value="">全部</option></select>
            </div>
            <div>
              <label class="block text-xs font-black text-stone-500 mb-1">關鍵字</label>
              <input type="text" id="filterKeyword" class="field" placeholder="姓名/電話/編號" onkeydown="if(event.key==='Enter') applyOrderFilters()" />
            </div>
            <div class="flex gap-2">
              <button onclick="applyOrderFilters()" class="btn btn-primary px-4 flex-1">篩選</button>
              <button onclick="resetOrderFilters()" class="btn btn-soft px-4">重設</button>
            </div>
          </div>
          <div id="orderFilterSummary" class="text-sm text-stone-500 font-bold"></div>
        </div>
        <div class="card overflow-x-auto">
          <table class="w-full text-sm">
            <thead class="bg-stone-50 text-stone-500 text-xs font-black tracking-wider">
              <tr>
                <th class="text-left p-3">訂單</th>
                <th class="text-left p-3">客人</th>
                <th class="text-left p-3">取貨/出貨</th>
                <th class="text-left p-3">商品</th>
                <th class="text-left p-3">狀態欄位</th>
                <th class="text-left p-3">目前狀態</th>
                <th class="text-left p-3">操作</th>
              </tr>
            </thead>
            <tbody id="ordersBody"></tbody>
          </table>
        </div>
      </section>

      <section id="tab-settings" class="hidden space-y-4">
        <div class="card p-4 flex flex-wrap justify-between gap-3 items-center">
          <div>
            <h2 class="font-black text-lg">日期設定</h2>
            <p class="text-sm text-stone-500 font-bold">設定名稱已鎖定不可修改；請用日曆加入日期。沒有刪除整列按鈕。</p>
          </div>
          <button onclick="saveSettings()" class="btn btn-primary px-5">儲存日期設定</button>
        </div>
        <div id="settingsList" class="grid grid-cols-1 md:grid-cols-2 gap-4"></div>
      </section>
    </section>
  </main>
</body>
</html>
