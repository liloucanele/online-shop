<script>
const API_URL = "https://script.google.com/macros/s/AKfycbyA3ovLtC-hDYGL-_9CMNKk9A--TcrU-W-mN6Hc0GaZ8eDrvAsew3ZdtYBLSyimuiU/exec";
const TOKEN_KEY = "lilou_admin_token";
let adminData = null;
let currentTab = "dashboard";

const unsavedTabs = new Set();
function markUnsaved(tab) {
  if (!tab || tab === 'dashboard' || tab === 'revenue') return;
  unsavedTabs.add(tab);
  const btn = document.querySelector(`.tab-btn[data-tab="${tab}"]`);
  if (btn) btn.classList.add('has-unsaved');
}
function clearUnsaved(tab) {
  unsavedTabs.delete(tab);
  const btn = document.querySelector(`.tab-btn[data-tab="${tab}"]`);
  if (btn) btn.classList.remove('has-unsaved');
}
function clearAllUnsaved() {
  unsavedTabs.clear();
  document.querySelectorAll('.tab-btn.has-unsaved').forEach(btn => btn.classList.remove('has-unsaved'));
}

document.addEventListener('input', e => {
  const page = e.target.closest('.tab-page');
  if (page) markUnsaved(page.id.replace('tab-', ''));
});
document.addEventListener('change', e => {
  const page = e.target.closest('.tab-page');
  if (page) markUnsaved(page.id.replace('tab-', ''));
});

/* =========================================================
   補回：日期格式化 Helper 函式庫
   ========================================================= */
function formatDateHyphenFromInput(value) { return normalizeOrderDateForCompare(value) || ""; }
function formatDateDisplaySlash(value) {
  const normalized = formatDateHyphenFromInput(value);
  return normalized ? normalized.replace(/-/g, "/") : "";
}
function formatDateDisplayWithWeekday(value) {
  const normalized = formatDateHyphenFromInput(value);
  if (!normalized) return "";
  const date = new Date(normalized + "T00:00:00");
  const weekdays = ["日", "一", "二", "三", "四", "五", "六"];
  const weekday = isNaN(date.getTime()) ? "" : `(${weekdays[date.getDay()]})`;
  return normalized.replace(/-/g, "/") + weekday;
}
function parseDateList(value) { return (value || "").toString().replace(/[\r\n、，]/g, ",").split(",").map(v => formatDateHyphenFromInput(v.trim())).filter(Boolean); }
function uniqueSortedDateList(value) { return Array.from(new Set(parseDateList(value))).sort(); }
/* ========================================================= */

function escapeHtml(value) {
  return (value ?? "").toString()
    .replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;")
    .replace(/"/g, "&quot;").replace(/'/g, "&#039;");
}

function showMessage(id, text, type = "info") {
  const el = document.getElementById(id);
  el.textContent = text;
  el.classList.remove("hidden", "text-red-500", "text-emerald-600", "text-stone-500");
  el.classList.add(type === "error" ? "text-red-500" : type === "success" ? "text-emerald-600" : "text-stone-500");
}

function formatAdminNow() {
  const now = new Date();
  return now.getFullYear() + "/" +
    String(now.getMonth() + 1).padStart(2, "0") + "/" +
    String(now.getDate()).padStart(2, "0") + " " +
    String(now.getHours()).padStart(2, "0") + ":" +
    String(now.getMinutes()).padStart(2, "0") + ":" +
    String(now.getSeconds()).padStart(2, "0");
}

function showSuccessMessage(id, text) {
  showMessage(id, `✅ ${text}（${formatAdminNow()}）`, "success");
}

function hideAdminInlineMessage() {
  const el = document.getElementById("adminMessage");
  if (!el) return;
  el.textContent = "";
  el.classList.add("hidden");
}

function showAdminToast(message, type = "info", duration = 2600) {
  const area = document.getElementById("adminToastArea");
  if (!area) return;

  const toast = document.createElement("div");
  const isError = type === "error";
  const isSuccess = type === "success";
  const isLoading = type === "loading";
  const bgClass = isError ? "bg-red-600" : isSuccess ? "bg-emerald-600" : "bg-[#5B7290]";
  const icon = isLoading ? `<span class="admin-toast-spinner"></span>` : isError ? "❌" : isSuccess ? "✅" : "ℹ️";

  toast.className = `admin-toast pointer-events-auto ${bgClass} text-white rounded-2xl px-4 py-3 min-w-[220px] max-w-[340px] flex items-center gap-2 text-sm font-black tracking-wide`;
  toast.innerHTML = `<span class="shrink-0">${icon}</span><span class="leading-relaxed">${escapeHtml(message)}</span>`;
  area.appendChild(toast);

  requestAnimationFrame(() => toast.classList.add("show"));

  if (duration !== 0) {
    setTimeout(() => removeAdminToast(toast), duration);
  }
  return toast;
}

function removeAdminToast(toast) {
  if (!toast) return;
  toast.classList.remove("show");
  setTimeout(() => toast.remove(), 240);
}

function showAdminConfirm(text, onConfirm, title = "確認操作") {
  const modal = document.getElementById("adminConfirmModal");
  const box = document.getElementById("adminConfirmBox");
  document.getElementById("adminConfirmTitle").textContent = title;
  document.getElementById("adminConfirmText").textContent = text;
  
  modal.classList.remove("hidden");
  requestAnimationFrame(() => {
    modal.classList.remove("opacity-0");
    box.classList.remove("scale-95");
  });
  
  const close = () => {
    modal.classList.add("opacity-0");
    box.classList.add("scale-95");
    setTimeout(() => modal.classList.add("hidden"), 200);
  };
  
  const cancelBtn = document.getElementById("adminConfirmCancel");
  const okBtn = document.getElementById("adminConfirmOk");
  cancelBtn.onclick = close;
  okBtn.onclick = () => { close(); onConfirm(); };
}

function setButtonLoading(button, loadingText) {
  if (!button || button.tagName !== "BUTTON") return null;
  const original = {
    text: button.innerHTML,
    disabled: button.disabled
  };
  button.disabled = true;
  button.classList.add("opacity-70", "cursor-wait");
  button.innerHTML = `<span class="inline-flex items-center gap-2"><span class="admin-toast-spinner !w-4 !h-4"></span>${escapeHtml(loadingText || "處理中...")}</span>`;
  return function restoreButton() {
    button.disabled = original.disabled;
    button.classList.remove("opacity-70", "cursor-wait");
    button.innerHTML = original.text;
  };
}

function getActiveActionButton() {
  const active = document.activeElement;
  return active && active.tagName === "BUTTON" ? active : null;
}

function getToken() { return localStorage.getItem(TOKEN_KEY) || ""; }

function setLoggedInState(isLoggedIn) {
  document.getElementById("loginPanel").classList.toggle("hidden", isLoggedIn);
  document.getElementById("adminPanel").classList.toggle("hidden", !isLoggedIn);
  document.getElementById("logoutBtn").classList.toggle("hidden", !isLoggedIn);
  document.getElementById("adminReloadBtn")?.classList.toggle("hidden", !isLoggedIn);
}

async function adminLogin() {
  const password = document.getElementById("adminPassword").value.trim();
  if (!password) { showMessage("loginMessage", "請輸入管理密碼。", "error"); return; }
  showMessage("loginMessage", "登入中...", "info");
  try {
    const res = await fetch(`${API_URL}?action=adminLogin&password=${encodeURIComponent(password)}&_=${Date.now()}`);
    const data = await res.json();
    if (data.status !== "success") { showMessage("loginMessage", data.message || "登入失敗。", "error"); return; }
    localStorage.setItem(TOKEN_KEY, data.token);
    setLoggedInState(true);
    await loadAll();
  } catch (err) {
    showMessage("loginMessage", "登入失敗：" + err.message, "error");

}

function logoutAdmin() {
  localStorage.removeItem(TOKEN_KEY);
  adminData = null;
  setLoggedInState(false);
}

function switchTab(tab) {
  currentTab = tab;
  document.querySelectorAll(".tab-btn").forEach(btn => {
    const active = btn.dataset.tab === tab;
    btn.classList.toggle("tab-active", active);
    btn.classList.toggle("tab-idle", !active);
  });
  document.querySelectorAll(".tab-page").forEach(page => page.classList.add("hidden"));
  document.getElementById("tab-" + tab).classList.remove("hidden");
}

async function loadAll() {
  const token = getToken();
  if (!token) { setLoggedInState(false); return; }
  const restoreButton = setButtonLoading(getActiveActionButton(), "同步中...");
  const loadingToast = showAdminToast("同步資料中...", "loading", 0);
  hideAdminInlineMessage();
  try {
    const res = await fetch(`${API_URL}?action=adminGetAll&token=${encodeURIComponent(token)}&_=${Date.now()}`);
    const data = await res.json();
    if (data.status !== "success") {
      hideAdminInlineMessage();
      removeAdminToast(loadingToast);
      showAdminToast(data.message || "載入失敗。", "error");
      if ((data.message || "").includes("登入")) logoutAdmin();
      return;
    }
    adminData = data;
    clearAllUnsaved();
    renderAll();
    hideAdminInlineMessage();
    removeAdminToast(loadingToast);
    showAdminToast(`資料已更新 ${formatAdminNow().slice(11)}`, "success");
  } catch (err) {
    hideAdminInlineMessage();
    removeAdminToast(loadingToast);
    showAdminToast("載入失敗：" + err.message, "error", 4200);
  } finally {
    if (restoreButton) restoreButton();
  }
}

function renderAll() {
  renderDashboard();

  renderRevenueShare();
  switchTab(currentTab);
}

function normalizePackageForSummary(packageName) {
  const raw = (packageName || "未命名包裝").toString().trim();
  const match = raw.match(/^(.*?)(?:\s*[x×]\s*(\d+)\s*組)\s*$/i);
  if (match) {
    return { name: (match[1] || "未命名包裝").trim(), qty: Math.max(1, parseInt(match[2], 10) || 1) };
  }
  return { name: raw || "未命名包裝", qty: 1 };
}

function parseOrderDetailGroups(details) {
  const text = (details || "").toString().trim();
  const groups = [];
  if (!text) return { text, groups };

  const regex = /【第(\d+)組:\s*([^】]+)】([\s\S]*?)(?=\s*｜\s*【第\d+組:|$)/g;
  let match;
  while ((match = regex.exec(text)) !== null) {
    const groupNo = match[1];
    const packageInfo = normalizePackageForSummary(match[2]);
    const packageName = packageInfo.name;
    const packageQty = packageInfo.qty;
    const itemsText = (match[3] || "").trim().replace(/^｜\s*/, "");
    const items = itemsText.split(/、/).map(item => item.trim()).filter(Boolean);
    groups.push({ groupNo, packageName, packageQty, items });
  }
  return { text, groups };
}

function summarizeOrderItems(details) {
  const { text, groups } = parseOrderDetailGroups(details);
  const itemSummary = {};

  if (groups.length) {
    groups.forEach(group => {
      group.items.forEach(item => {
        const itemMatch = item.match(/^(.+?)[(（](\d+)/);
        if (itemMatch) {
          const itemName = itemMatch[1].trim();
          const qty = parseInt(itemMatch[2], 10) || 0;
          if (itemName && qty) itemSummary[itemName] = (itemSummary[itemName] || 0) + qty;
        }
      });
    });
  } else if (text) {
    const itemRegex = /([^、｜()（）]+)[(（](\d+)/g;
    let itemMatch;
    while ((itemMatch = itemRegex.exec(text)) !== null) {
      const name = itemMatch[1].trim();
      const qty = Number(itemMatch[2]) || 0;
      if (name && qty) itemSummary[name] = (itemSummary[name] || 0) + qty;
    }
  }
  return { text, groups, itemSummary };
}

function formatOrderDetailsAdmin(details) {

function normalizeProductLookupKey(value) {
  return (value || "").toString()
    .toLowerCase()
    .replace(/[\s\u3000]/g, "")
    .replace(/[()（）【】\[\]・·,，、\/／\-＿_]/g, "")
    .replace(/迷你可麗露|大顆可麗露|可麗露|迷你露|口味|兩入袋|兩入|袋裝|袋/g, "")
    .trim();
}

function getProductUnitPriceByName(itemName) {
  const target = (itemName || "").toString().trim();
  if (!target) return 0;
  const products = adminData?.products || [];

  const exact = products.find(p => (p.name || "").toString().trim() === target);
  if (exact) return parseMoneyNumber(exact.price || 0);

  const targetKey = normalizeProductLookupKey(target);
  const found = products.find(p => {
    const productName = (p.name || "").toString().trim();
    const productKey = normalizeProductLookupKey(productName);
    if (!productName || !productKey || !targetKey) return false;
    return productName.includes(target) || target.includes(productName) ||
      productKey === targetKey || productKey.includes(targetKey) || targetKey.includes(productKey);
  });
  return parseMoneyNumber(found?.price || 0);
}

function parseGroupItemForAmount(itemText) {
  const raw = (itemText || "").toString().trim();
  const match = raw.match(/^(.+?)[(（](\d+)/);
  if (!match) return { name: raw, qty: 0 };
  return { name: (match[1] || "").trim(), qty: Number(match[2]) || 0 };
}

function calculateGroupAmount(group) {
  return (group.items || []).reduce((sum, item) => {
    const parsed = parseGroupItemForAmount(item);
    if (!parsed.name || !parsed.qty) return sum;
    return sum + getProductUnitPriceByName(parsed.name) * parsed.qty;
  }, 0);
}

function getOrderSubtotalForGroupAmount(order) {
  return getOrderAmountNumbers(order).subtotal;
}

function buildGroupAmountMap(groups, order) {
  const amounts = (groups || []).map(group => calculateGroupAmount(group));
  const subtotal = getOrderSubtotalForGroupAmount(order);
  const knownSum = amounts.reduce((sum, value) => sum + value, 0);
  const unknownIndexes = amounts
    .map((value, index) => value > 0 ? -1 : index)
    .filter(index => index >= 0);

  if (subtotal > 0 && unknownIndexes.length && knownSum < subtotal) {
    const remaining = subtotal - knownSum;
    if (unknownIndexes.length === 1) {
      amounts[unknownIndexes[0]] = remaining;
    } else {
      const weights = unknownIndexes.map(index => {
        const qty = (groups[index].items || []).reduce((sum, item) => sum + (parseGroupItemForAmount(item).qty || 0), 0);
        return qty || 1;
      });
      const weightSum = weights.reduce((sum, value) => sum + value, 0) || unknownIndexes.length;
      let assigned = 0;
      unknownIndexes.forEach((index, position) => {
        const value = position === unknownIndexes.length - 1
          ? remaining - assigned
          : Math.round(remaining * weights[position] / weightSum);
        amounts[index] = value;
        assigned += value;
      });
    }
  }
  return amounts;
}

function parseMoneyNumber(value) {
  const n = Number((value || "").toString().replace(/[^0-9.-]/g, ""));
  return isNaN(n) ? 0 : n;
}
function formatMoneyForOrder(value) {
  const n = parseMoneyNumber(value);
  return "NT$" + Math.round(n).toLocaleString("zh-TW");
}
function formatSignedMoneyForOrder(value, forceMinus = false) {
  const n = parseMoneyNumber(value);
  const absValue = Math.abs(n);
  if (!absValue) return "NT$0";
  const sign = forceMinus || n < 0 ? "-" : "+";
  return sign + "NT$" + Math.round(absValue).toLocaleString("zh-TW");
}

function firstAmountValue(order, keys) {
  if (!order) return 0;
  for (const key of keys) {
    if (order[key] !== undefined && order[key] !== null && order[key] !== "") {
      return parseMoneyNumber(order[key]);
    }
  }
  return 0;
}

function getOrderAmountNumbers(order) {
  const total = firstAmountValue(order, ["total", "totalPrice", "Total_Price", "total_price", "Total"]);
  const shipping = firstAmountValue(order, ["shippingFee", "shipping_fee", "Shipping_Fee", "ShippingFee"]);
  const discountRaw = firstAmountValue(order, ["discountAmount", "discount_amount", "Discount_Amount", "DiscountAmount"]);
  const discount = Math.abs(discountRaw);
  let subtotal = firstAmountValue(order, ["productSubtotal", "subtotalAmount", "subtotal_amount", "Subtotal_Amount", "SubtotalAmount"]);
  if (!subtotal && total) { subtotal = Math.max(0, total - shipping + discount); }
  const finalTotal = total || Math.max(0, subtotal + shipping - discount);
  return { subtotal, discount, shipping, total: finalTotal };
}

function summarizeDetailsFromOrders(orders) {
  const production = {};

    const groupRegex = /【第\d+組:\s*([^】]+)】([\s\S]*?)(?=\s*｜\s*【第\d+組:|$)/g;
    let groupMatch;
    let matchedGroup = false;

    while ((groupMatch = groupRegex.exec(details)) !== null) {
      matchedGroup = true;
      const packageInfo = normalizePackageForSummary(groupMatch[1] || "未命名包裝");
      const packageName = packageInfo.name;
      packaging[packageName] = (packaging[packageName] || 0) + packageInfo.qty;

      const itemsText = groupMatch[2] || "";
      const itemRegex = /([^、｜()（）]+)[(（](\d+)/g;
      let itemMatch;
      while ((itemMatch = itemRegex.exec(itemsText)) !== null) {
        const name = itemMatch[1].trim();
        const qty = Number(itemMatch[2]) || 0;
        if (name && qty) production[name] = (production[name] || 0) + qty;
      }
    }
    if (!matchedGroup && details) {
      const itemRegex = /([^、｜()（）]+)[(（](\d+)/g;
      let itemMatch;
      while ((itemMatch = itemRegex.exec(details)) !== null) {
        const name = itemMatch[1].trim();
        const qty = Number(itemMatch[2]) || 0;
        if (name && qty) production[name] = (production[name] || 0) + qty;
      }
    }
  });
  return { production, packaging };
}


function addDaysToDateInput(dateInput, days) {
  const date = new Date(dateInput + "T00:00:00");
  if (isNaN(date.getTime())) return "";
  date.setDate(date.getDate() + days);
  return formatDateInputValue(date);
}

function formatMonthDayWithWeekday(value) {
  const normalized = normalizeOrderDateForCompare(value);
  if (!normalized) return "-";
  const date = new Date(normalized + "T00:00:00");
  const weekdays = ["日", "一", "二", "三", "四", "五", "六"];
  const mm = String(date.getMonth() + 1).padStart(2, "0");
  const dd = String(date.getDate()).padStart(2, "0");
  return `${mm}/${dd}（${weekdays[date.getDay()]}）`;
}

  const date = normalizeOrderDateForCompare(dateValue);

  switchTab("orders");

    const searchInput = document.getElementById("orderSearch");
    const statusFilter = document.getElementById("orderStatusFilter");
    const methodFilter = document.getElementById("orderMethodFilter");
    const sortFilter = document.getElementById("orderSortFilter");
    const startInput = document.getElementById("orderStartDate");
    const endInput = document.getElementById("orderEndDate");
    if (searchInput) searchInput.value = "";
    if (statusFilter) statusFilter.value = "";
    if (methodFilter) methodFilter.value = "";
    if (sortFilter) sortFilter.value = "arrivalAsc";
    if (startInput) startInput.value = date;
    if (endInput) endInput.value = date;
    updateOrderRangeButtons("");
    filterOrders();
    requestAnimationFrame(() => { document.getElementById("orderFilterDetails")?.scrollIntoView({ behavior: "smooth", block: "start" }); });
  });
}

function normalizeCouponDate(value) { return normalizeOrderDateForCompare(value) || ""; }
function formatCouponDate(value) {
  const d = normalizeCouponDate(value);

}

function couponTypeText(type, value) {

}

function couponStatusBadge(coupon) {
  const today = getTodayDateInputValue();

  if (start && today < start) return `<span class="rounded-full border border-blue-200 bg-blue-50 px-2 py-0.5 text-xs font-black text-blue-700">尚未開始</span>`;
  if (end && today > end) return `<span class="rounded-full border border-stone-200 bg-stone-50 px-2 py-0.5 text-xs font-black text-stone-500">已結束</span>`;
  if (end) {
    const diff = Math.ceil((new Date(end + "T00:00:00") - new Date(today + "T00:00:00")) / (24 * 60 * 60 * 1000));
    if (diff <= 7) return `<span class="rounded-full border border-amber-200 bg-amber-50 px-2 py-0.5 text-xs font-black text-amber-700">即將到期｜剩 ${diff} 天</span>`;

function openCouponFromDashboard(code) {

}
function formatCurrency(value) {
  const n = Number(value || 0);
  return "NT$" + Math.round(isNaN(n) ? 0 : n).toLocaleString("zh-TW");
}

function getOrderCreatedDate(order) {
  const timestampDate = normalizeOrderDateForCompare(order.timestamp || "");
  if (timestampDate) return timestampDate;
  return normalizeOrderDateForCompare(order.date || "");
}

function getDateRangeRows(endDate, days) {
  const rows = [];
  for (let i = days - 1; i >= 0; i--) {
    const date = addDaysToDateInput(endDate, -i);
    const parts = date.split("-");
    rows.push({ date, label: `${Number(parts[1])}/${Number(parts[2])}`, revenue: 0 });
  }
  return rows;
}

function getRevenueRowsByCreatedDate(orders, endDate, days) {
  const rows = getDateRangeRows(endDate, days);
  const rowMap = Object.fromEntries(rows.map(row => [row.date, row]));
  orders.forEach(order => {
    const createdDate = getOrderCreatedDate(order);
    if (rowMap[createdDate]) rowMap[createdDate].revenue += parseMoneyNumber(order.total);
  });
  return rows;
}

function renderRevenueLineChart(rows) {
  if (!rows || !rows.length) return `<p class="text-stone-400 font-medium">目前無資料</p>`;
  const width = 720; const height = 290;
  const left = 54; const right = 18; const top = 24; const bottom = 42;
  const chartWidth = width - left - right; const chartHeight = height - top - bottom;
  const maxRevenue = Math.max(...rows.map(r => r.revenue), 1);
  const midValue = Math.round(maxRevenue / 2);
  const points = rows.map((row, index) => {
    const x = rows.length === 1 ? left + chartWidth / 2 : left + (chartWidth * index / (rows.length - 1));
    const y = top + chartHeight - (row.revenue / maxRevenue * chartHeight);
    return { ...row, x, y };
  });
  const pointLine = points.map(p => `${p.x},${p.y}`).join(" ");
  const areaLine = `${left},${top + chartHeight} ${pointLine} ${left + chartWidth},${top + chartHeight}`;
  const labelInterval = Math.max(1, Math.ceil(points.length / 7));

  return `
  <div>
    <svg viewBox="0 0 ${width} ${height}" class="w-full h-[280px]" role="img" aria-label="每日營業額">
      <line x1="${left}" y1="${top}" x2="${left}" y2="${top + chartHeight}" stroke="#E7E5E4"/>
      <line x1="${left}" y1="${top + chartHeight}" x2="${left + chartWidth}" y2="${top + chartHeight}" stroke="#E7E5E4"/>
      <line x1="${left}" y1="${top + chartHeight/2}" x2="${left + chartWidth}" y2="${top + chartHeight/2}" stroke="#F1F0EE"/>
      <text x="${left-8}" y="${top+4}" text-anchor="end" font-size="11" fill="#A8A29E">${formatCurrency(maxRevenue)}</text>
      <text x="${left-8}" y="${top + chartHeight/2 +4}" text-anchor="end" font-size="11" fill="#A8A29E">${formatCurrency(midValue)}</text>
      <text x="${left-8}" y="${top + chartHeight +4}" text-anchor="end" font-size="11" fill="#A8A29E">NT$0</text>
      <polygon points="${areaLine}" fill="#5B7290" opacity="0.08"></polygon>
      <polyline points="${pointLine}" fill="none" stroke="#5B7290" stroke-width="3" stroke-linejoin="round" stroke-linecap="round"></polyline>
      ${points.map(point => `<circle cx="${point.x}" cy="${point.y}" r="4" fill="#5B7290"><title>${escapeHtml(point.label)}：${formatCurrency(point.revenue)}</title></circle>`).join("")}
      ${points.filter((point, index) => index % labelInterval === 0 || index === points.length - 1).map(point => `<text x="${point.x}" y="${top + chartHeight + 30}" text-anchor="middle" font-size="12" fill="#78716C" font-weight="500">${escapeHtml(point.label)}</text>`).join("")}
    </svg>
  </div>`;
}

function getDateRangeRowsBetween(startDate, endDate) {
  const start = normalizeOrderDateForCompare(startDate);
  const end = normalizeOrderDateForCompare(endDate);
  if (!start || !end) return getDateRangeRows(getTodayDateInputValue(), 7);
  const rows = [];
  const startObj = new Date(start + "T00:00:00");
  const endObj = new Date(end + "T00:00:00");
  if (isNaN(startObj.getTime()) || isNaN(endObj.getTime()) || startObj > endObj) return [];
  const maxDays = 62; let current = new Date(startObj); let count = 0;
  while (current <= endObj && count < maxDays) {
    const date = formatDateInputValue(current);
    const parts = date.split("-");
    rows.push({ date, label: `${Number(parts[1])}/${Number(parts[2])}`, revenue: 0 });
    current.setDate(current.getDate() + 1);
    count++;
  }
  return rows;
}

function getRevenueRowsForRange(orders, startDate, endDate) {
  const rows = getDateRangeRowsBetween(startDate, endDate);
  const rowMap = Object.fromEntries(rows.map(row => [row.date, row]));
  orders.forEach(order => {
    const createdDate = getOrderCreatedDate(order);
    if (rowMap[createdDate]) rowMap[createdDate].revenue += parseMoneyNumber(order.total);
  });
  return rows;
}

function getDashboardDefaultRange() { return { start: "", end: "" }; }
function getDashboardSevenDayRange() {
  const today = getTodayDateInputValue();
  return { start: addDaysToDateInput(today, -6), end: today };
}

function getDashboardFilterState() {
  const fallback = getDashboardDefaultRange();
  const start = document.getElementById("dashboardStartDate")?.value || fallback.start;
  const end = document.getElementById("dashboardEndDate")?.value || fallback.end;
  const method = document.getElementById("dashboardMethodFilter")?.value || "";
  return { start, end, method };
}

function getDashboardPeriodLabel(start, end) {
  const seven = getDashboardSevenDayRange();
  if (!start && !end) return "全部期間";
  if (start === seven.start && end === seven.end) return "近 7 日";
  if (start && end) return `${start.replace(/-/g, "/")}～${end.replace(/-/g, "/")}`;
  if (start && !end) return `${start.replace(/-/g, "/")} 之後`;
  if (!start && end) return `${end.replace(/-/g, "/")} 以前`;
  return "全部期間";
}

function getDashboardRangeMode(start, end) {
  const today = getTodayDateInputValue();
  const seven = getDashboardSevenDayRange();
  const now = new Date(today + "T00:00:00");
  const monthStart = formatDateInputValue(new Date(now.getFullYear(), now.getMonth(), 1));
  const monthEnd = formatDateInputValue(new Date(now.getFullYear(), now.getMonth() + 1, 0));
  if (!start && !end) return "all";
  if (start === today && end === today) return "today";
  if (start === seven.start && end === seven.end) return "seven";
  if (start === monthStart && end === monthEnd) return "month";
  return "custom";
}

function dashboardRangeButton(mode, label) {
  return `<button data-dashboard-range="${mode}" onclick="setDashboardRange('${mode}')" class="dashboard-range-btn flex-1 h-11 rounded-xl border px-3 font-semibold text-xs transition-colors">${label}</button>`;
}

function orderPassDashboardFilter(order, state) {
  const createdDate = getOrderCreatedDate(order);
  const startOk = !state.start || (createdDate && createdDate >= state.start);
  const endOk = !state.end || (createdDate && createdDate <= state.end);
  const methodOk = !state.method || getOrderMethodType(order) === state.method;
  return startOk && endOk && methodOk;
}

function formatDateInputValue(date) {
  const y = date.getFullYear();
  const m = String(date.getMonth() + 1).padStart(2, "0");
  const d = String(date.getDate()).padStart(2, "0");
  return `${y}-${m}-${d}`;
}
function getDefaultMonthRange() {
  const now = new Date();
  return {
    start: formatDateInputValue(new Date(now.getFullYear(), now.getMonth(), 1)),
    end: formatDateInputValue(new Date(now.getFullYear(), now.getMonth() + 1, 0))
  };
}
function getTodayDateInputValue() { return formatDateInputValue(new Date()); }
function normalizeOrderDateForCompare(value) {
  const raw = (value || "").toString().trim();
  if (!raw) return "";
  const match = raw.match(/(\d{4})[\/\-](\d{1,2})[\/\-](\d{1,2})/);
  if (!match) return "";
  return `${match[1]}-${String(match[2]).padStart(2, "0")}-${String(match[3]).padStart(2, "0")}`;
}
function normalizeOrderDateTimeForCompare(value) {
  const raw = (value || "").toString().trim();
  if (!raw) return "";
  const match = raw.match(/(\d{4})[\/\-](\d{1,2})[\/\-](\d{1,2})(?:\s+(\d{1,2}):(\d{1,2})(?::(\d{1,2}))?)?/);
  if (!match) return normalizeOrderDateForCompare(raw);
  return `${match[1]}-${String(match[2]).padStart(2, "0")}-${String(match[3]).padStart(2, "0")} ${String(match[4] || "0").padStart(2, "0")}:${String(match[5] || "0").padStart(2, "0")}:${String(match[6] || "0").padStart(2, "0")}`;
}
function getOrderCreatedDateTime(order) {
  const timestampDateTime = normalizeOrderDateTimeForCompare(order.timestamp || "");
  if (timestampDateTime) return timestampDateTime;
  const createdDate = getOrderCreatedDate(order);
  return createdDate ? `${createdDate} 00:00:00` : "";

function getOrderRangeLabel(startDate, endDate) {
  if (!startDate && !endDate) return "全部日期";

  if (startDate && endDate) return `${startDate.replace(/-/g, "/")}～${endDate.replace(/-/g, "/")}`;
  if (startDate && !endDate) return `${startDate.replace(/-/g, "/")} 之後`;

}

function getOrderRangeMode(startDate, endDate) {

  if (!startDate && !endDate) return "all";
  if (startDate === getTodayDateInputValue() && !endDate) return "future";
  if (startDate === month.start && endDate === month.end) return "month";

function getOrderSortLabel(sortMode) {
  const labels = { arrivalAsc: "取貨／到貨日期近到遠", arrivalDesc: "取貨／到貨日期遠到近", orderDesc: "訂單日期近到遠", orderAsc: "訂單日期遠到近", amountDesc: "金額高到低", amountAsc: "金額低到高" };
  return labels[sortMode] || labels.arrivalAsc;
}

function compareTextValue(a, b) { return (a || "").toString().localeCompare((b || "").toString()); }

function filterOrders() {
  const q = (document.getElementById("orderSearch")?.value || "").toLowerCase();
  const status = document.getElementById("orderStatusFilter")?.value || "";
  const method = document.getElementById("orderMethodFilter")?.value || "";
  const startDate = document.getElementById("orderStartDate")?.value || "";
  const endDate = document.getElementById("orderEndDate")?.value || "";
  const sortMode = document.getElementById("orderSortFilter")?.value || "orderDesc";

  const orders = (adminData.orders || []).filter(o => {
    const text = [o.id,o.name,o.phone,o.date,o.email,o.shippingMethod,o.address].join(" ").toLowerCase();
    const orderDate = normalizeOrderDateForCompare(o.date);
    const methodType = getOrderMethodType(o);

    const keywordOk = !q || text.includes(q);
    const statusOk = status === "已取消" ? o.orderStatus === "已取消" : ((!status || o.orderStatus === status) && o.orderStatus !== "已取消");
    const methodOk = !method || methodType === method;
    const startOk = !startDate || (orderDate && orderDate >= startDate);
    const endOk = !endDate || (orderDate && orderDate <= endDate);
    return keywordOk && statusOk && methodOk && startOk && endOk;
  }).sort((a, b) => {
    const arrivalA = normalizeOrderDateForCompare(a.date) || "9999-12-31";
    const arrivalB = normalizeOrderDateForCompare(b.date) || "9999-12-31";
    const orderDateA = getOrderCreatedDate(a) || "0000-00-00";
    const orderDateB = getOrderCreatedDate(b) || "0000-00-00";
    const timestampA = getOrderCreatedDateTime(a) || "0000-00-00 00:00:00";
    const timestampB = getOrderCreatedDateTime(b) || "0000-00-00 00:00:00";
    const amountA = parseMoneyNumber(a.total);
    const amountB = parseMoneyNumber(b.total);

    if (sortMode === "amountDesc" || sortMode === "amountAsc") {
      const amountCompare = amountA - amountB;
      if (amountCompare !== 0) return sortMode === "amountDesc" ? -amountCompare : amountCompare;
      const arrivalCompare = compareTextValue(arrivalA, arrivalB);
      if (arrivalCompare !== 0) return arrivalCompare;
    }
    if (sortMode === "orderDesc" || sortMode === "orderAsc") {
      const dateCompare = compareTextValue(orderDateA, orderDateB);
      if (dateCompare !== 0) return sortMode === "orderDesc" ? -dateCompare : dateCompare;
      const timeCompare = compareTextValue(timestampA, timestampB);
      if (timeCompare !== 0) return sortMode === "orderDesc" ? -timeCompare : timeCompare;
    }
    const arrivalCompare = compareTextValue(arrivalA, arrivalB);
    if (arrivalCompare !== 0) return sortMode === "arrivalDesc" ? -arrivalCompare : arrivalCompare;
    const timeCompare = compareTextValue(timestampA, timestampB);
    if (timeCompare !== 0) return -timeCompare;
    return compareTextValue(a.id, b.id);
  });
  
  const effectiveOrders = orders;
  const voidCount = (adminData.orders || []).filter(o => o.orderStatus === "已取消").length;
  const storeCount = effectiveOrders.filter(o => getOrderMethodType(o) === "store").length;
  const deliveryCreditCount = effectiveOrders.filter(o => getOrderMethodType(o) === "delivery").length;
  const deliveryCodCount = effectiveOrders.filter(o => getOrderMethodType(o) === "delivery_cod").length;
  const rangeText = startDate && !endDate ? `｜日期：${startDate} 之後` : startDate && endDate ? `｜日期：${startDate}～${endDate}` : !startDate && endDate ? `｜日期：${endDate} 以前` : "｜日期：全部";
  updateOrderFilterSummary(startDate, endDate, method, sortMode);
  updateOrderRangeButtons(getOrderRangeMode(startDate, endDate));
  const countLabel = status === "已取消" ? "筆已取消訂單" : "筆有效訂單";
  const hiddenVoidText = status === "已取消" || voidCount <= 0 ? "" : `｜已取消 ${voidCount}`;
  document.getElementById("orderCount").textContent = `${effectiveOrders.length} ${countLabel}｜門市自取 ${storeCount}｜7-11店到店 ${deliveryCreditCount + deliveryCodCount}${hiddenVoidText}${rangeText}｜排序：${getOrderSortLabel(sortMode)}`;
  const area = document.getElementById("ordersArea");
  if (!orders.length) {
    area.innerHTML = `<div class="bg-white rounded-3xl border border-stone-100 p-8 text-center text-stone-400 font-bold">目前沒有符合條件的訂單</div>`;
    return;
  }
  area.innerHTML = orders.map(orderCard).join("");
}

function formatOrderTimestampMinute(value) {
  const raw = (value || "").toString().trim();
  if (!raw) return "-";
  const match = raw.match(/(\d{4})[\/-](\d{1,2})[\/-](\d{1,2})\s+(\d{1,2}):(\d{2})/);
  if (!match) return raw;
  const y = match[1];
  const m = String(match[2]).padStart(2, "0");
  const d = String(match[3]).padStart(2, "0");
  const hh = String(match[4]).padStart(2, "0");
  return `${y}/${m}/${d} ${hh}:${match[5]}`;
}

  const statuses = ["訂單確認中", "待付款", "待出貨", "可取貨", "已出貨", "已完成", "已取消"];

  const internalNotePreview = internalNoteText

      </div>`
    : "";
  const statusFields = `

async function updateOrder(orderId, btnElement) {
  const card = document.querySelector(`[data-order-id="${CSS.escape(orderId)}"]`);
  if (!card) return;
  const payload = {
    action: "adminUpdateOrder", token: getToken(), orderId,
    orderStatus: card.querySelector(".admin-status").value,
    paymentLink: card.querySelector(".admin-payment").value.trim(),
    trackingNo: card.querySelector(".admin-tracking").value.trim(),
    statusNote: card.querySelector(".admin-note").value.trim(),
    internalNote: card.querySelector(".admin-internal-note")?.value.trim() || ""
  };
  await postAdmin(payload, `${orderId} 已更新。`, btnElement);
}

function cancelOrderEdit(orderId) {
  const card = document.querySelector(`[data-order-id="${CSS.escape(orderId)}"]`);
  if (!card) return;
  [".admin-status", ".admin-payment", ".admin-tracking", ".admin-note", ".admin-internal-note"].forEach(selector => {
    const field = card.querySelector(selector);
    if (!field) return;
    field.value = field.dataset.originalValue || "";
    field.dispatchEvent(new Event("change", { bubbles: true }));
  });
  showAdminToast(`${orderId} 已取消修改。`, "info", 1800);
}

function settingDisplayName(name) {
  const key = (name || "").toString().trim().toLowerCase();
  if (key === "store_available_dates" || key === "pickup_available_dates" || key.includes("store") || key.includes("pickup") || key.includes("自取")) return "自取日期";
  if (key === "delivery_available_dates" || key.includes("delivery") || key.includes("711") || key.includes("7-11") || key.includes("店到店")) return "店到店出貨日期";
  return name || "未命名設定";
}

function getRevenueSettingsRows() { return adminData?.revenueSettings || []; }
function getRevenueSettingByMonth(month) {
  return getRevenueSettingsRows().find(row => (row.month || "").toString().trim() === month) || null;
}
function getRevenueRateForOrder(order) {
  const date = normalizeOrderDateForCompare(order.date || order.timestamp || "");
  const month = date ? date.slice(0, 7) : "";
  const setting = getRevenueSettingByMonth(month);
  const rawRate = getOrderMethodFamily(order) === "delivery" ? setting?.deliveryRate : setting?.storeRate;
  const rate = Number(rawRate);
  return { month, rate: isNaN(rate) ? 0 : rate, missing: !setting };
}

function getRevenueShareRows() {
  const startDate = document.getElementById("revenueStartDate")?.value || "";
  const endDate = document.getElementById("revenueEndDate")?.value || "";
  const methodFilter = document.getElementById("revenueMethodFilter")?.value || "";

  return (adminData.orders || []).filter(order => {
      if (normalizeAdminStatus(order.orderStatus) === "已取消") return false;
      const orderDate = normalizeOrderDateForCompare(order.date || order.timestamp || "");
      if (startDate && (!orderDate || orderDate < startDate)) return false;
      if (endDate && (!orderDate || orderDate > endDate)) return false;
      if (methodFilter && getOrderMethodFamily(order) !== methodFilter) return false;
      return true;
    }).map(order => {
      const rateInfo = getRevenueRateForOrder(order);
      const amount = parseMoneyNumber(order.total);
      return {
        id: order.id || "", date: normalizeOrderDateForCompare(order.date || order.timestamp || ""),
        name: order.name || "", methodType: getOrderMethodType(order), methodLabel: getOrderMethodLabel(order),
        status: normalizeAdminStatus(order.orderStatus || ""), amount, month: rateInfo.month,
        rate: rateInfo.rate, commission: amount * rateInfo.rate / 100, missingRate: rateInfo.missing
      };
    }).sort((a, b) => (a.date || "").localeCompare(b.date || "") || (a.id || "").localeCompare(b.id || ""));
}

function filterRevenueShare() {
  const rows = getRevenueShareRows();
  const area = document.getElementById("revenueShareResult");
  const note = document.getElementById("revenueRateNote");
  if (!area || !note) return;

  const settings = getRevenueSettingsRows();
  const months = Array.from(new Set(rows.map(row => row.month).filter(Boolean))).sort();
  const noteRows = months.map(month => {
    const setting = getRevenueSettingByMonth(month);
    if (!setting) return `${month}：未設定比例`;
    return `${month}：門市 ${setting.storeRate || 0}%｜店到店 ${setting.deliveryRate || 0}%`;
  });
  note.textContent = noteRows.length ? `套用比例：${noteRows.join("；")}` : (settings.length ? "此區間目前沒有可計算訂單。" : "尚未讀取到 Revenue_Settings，請確認試算表分頁名稱與欄位。");

  const summary = { store: { label: "門市自取", count: 0, amount: 0, commission: 0 }, delivery: { label: "7-11店到店", count: 0, amount: 0, commission: 0 } };
  rows.forEach(row => {
    const target = row.methodType === "store" ? summary.store : summary.delivery;
    target.count += 1; target.amount += row.amount; target.commission += row.commission;
  });

  const totalAmount = rows.reduce((sum, row) => sum + row.amount, 0);
  const totalCommission = rows.reduce((sum, row) => sum + row.commission, 0);
  area.innerHTML = `
    <div class="grid grid-cols-1 md:grid-cols-3 gap-3">
      ${revenueShareKpi("訂單數", rows.length + " 筆", "不含已取消")}
      ${revenueShareKpi("總營業額", formatCurrency(totalAmount), "依篩選區間")}
      ${revenueShareKpi("預估分潤", formatCurrency(totalCommission), "依每月比例")}
    </div>
    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">${revenueMethodCard(summary.store)}${revenueMethodCard(summary.delivery)}</div>
    <div class="bg-white rounded-3xl border border-stone-100 shadow-sm p-4 md:p-5">
      <div class="flex items-center justify-between gap-3 mb-3"><h3 class="font-black text-[#5B7290] tracking-widest">分潤明細</h3><span class="text-xs font-black text-stone-400">${rows.length} 筆</span></div>
      ${rows.length ? `
        <div class="overflow-x-auto">
          <table class="min-w-full text-sm">
            <thead class="text-xs text-stone-400 tracking-widest border-b border-stone-100">
              <tr><th class="text-left py-2 pr-3 font-black">訂單</th><th class="text-left py-2 pr-3 font-black">日期</th><th class="text-left py-2 pr-3 font-black">出貨方式</th><th class="text-right py-2 pr-3 font-black">金額</th><th class="text-right py-2 pr-3 font-black">比例</th><th class="text-right py-2 font-black">分潤</th></tr>
            </thead>
            <tbody class="divide-y divide-stone-100">
              ${rows.map(row => `<tr><td class="py-2 pr-3 font-bold text-stone-800 whitespace-nowrap">${escapeHtml(row.id)}</td><td class="py-2 pr-3 text-stone-600 whitespace-nowrap">${escapeHtml(row.date || "-")}</td><td class="py-2 pr-3 text-stone-600 whitespace-nowrap">${escapeHtml(row.methodLabel)}</td><td class="py-2 pr-3 text-right mono text-stone-800">${formatCurrency(row.amount)}</td><td class="py-2 pr-3 text-right mono ${row.missingRate ? "text-red-500 font-black" : "text-stone-600"}">${row.rate}%</td><td class="py-2 text-right mono font-black text-[#5B7290]">${formatCurrency(row.commission)}</td></tr>`).join("")}
            </tbody>
          </table>
        </div>` : `<p class="text-stone-400 font-bold">目前沒有符合條件的訂單。</p>`}
    </div>`;
}

  return `<div class="bg-white rounded-3xl border border-stone-100 p-4 shadow-sm min-w-0"><div class="dashboard-kpi-label font-black text-stone-400">${escapeHtml(label)}</div><div class="dashboard-money-value mt-1.5 font-black text-stone-900 mono whitespace-nowrap">${escapeHtml(value)}</div><div class="mt-1 text-xs font-bold text-stone-400">${escapeHtml(note || "")}</div></div>`;

function setRevenueCurrentMonth() {
  const today = getTodayDateInputValue();

function exportRevenueShareCsv() {
  const rows = getRevenueShareRows();
  if (!rows.length) { showAdminToast("目前沒有可匯出的分潤資料。", "info"); return; }
  const header = ["訂單編號", "日期", "出貨方式", "金額", "比例", "分潤"];
  const body = rows.map(row => [row.id, row.date, row.methodLabel, Math.round(row.amount), row.rate, Math.round(row.commission)]);
  const csv = [header].concat(body).map(row => row.map(value => `"${(value ?? "").toString().replace(/"/g, '""')}"`).join(",")).join("\n");
  const blob = new Blob(["\ufeff" + csv], { type: "text/csv;charset=utf-8;" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url;
  a.download = `${document.getElementById("revenueStartDate")?.value || "revenue"}_${document.getElementById("revenueEndDate")?.value || "share"}_分潤統計.csv`;
  document.body.appendChild(a); a.click(); a.remove(); URL.revokeObjectURL(url);
}

    <div class="bg-stone-50/70 border-b border-stone-100 px-5 py-4 flex flex-col xl:flex-row xl:items-center justify-between gap-4">
      <div>
        <h3 class="text-lg font-black text-[#5B7290] flex items-center gap-2">📅 ${escapeHtml(label)}</h3>
        <div class="text-xs text-stone-500 font-bold mt-1.5">點擊月曆即可快速選取或取消日期。</div>
      </div>
      <div class="flex flex-wrap items-center gap-2">
        ${copyBtnHtml}
        <button type="button" onclick="clearSettingDates(this)" class="flex items-center gap-1.5 px-3 py-2 rounded-xl border border-red-200 bg-red-50 text-xs font-black text-red-500 hover:bg-red-100 transition-colors">
            🗑️ 清空所有日期
        </button>
      </div>
    </div>

    <div class="grid grid-cols-1 md:grid-cols-[340px_1fr] md:min-h-[380px]">
      <div class="p-5 border-b md:border-b-0 md:border-r border-stone-100 bg-white">
         <div class="calendar-container w-full max-w-[280px] mx-auto"></div>
      </div>

      <div class="p-5 bg-stone-50/40">
         <div class="flex items-center justify-between mb-4">
            <div class="text-sm font-black text-stone-500 tracking-widest">已選取日期明細</div>
            <div class="text-xs font-black text-[#5B7290] bg-[#5B7290]/10 px-2 py-0.5 rounded-full"><span class="setting-date-count">${cleanDates.length}</span> 天</div>
         </div>
         <div class="tags-container space-y-4 max-h-[320px] overflow-y-auto pr-3 custom-scrollbar"></div>
      </div>
    </div>
  </section>`;
}

function getSettingDates(box) {
  const hidden = box.querySelector(".setting-date-value");
  return hidden ? uniqueSortedDateList(hidden.value) : [];
}

function setSettingDates(box, dates) {
  const hidden = box.querySelector(".setting-date-value");
  const count = box.querySelector(".setting-date-count");
  const clean = Array.from(new Set((dates || []).map(formatDateHyphenFromInput).filter(Boolean))).sort();
  if (hidden) hidden.value = clean.join(",");
  if (count) count.textContent = clean.length;
}

function updateSettingCalendarAndTags(box) {
  const valueInput = box.querySelector('.setting-date-value');
  const selectedDates = valueInput.value ? valueInput.value.split(',') : [];
  const calContainer = box.querySelector('.calendar-container');
  const tagsContainer = box.querySelector('.tags-container');

  let viewMonth = box.dataset.viewMonth;
  if (!viewMonth) {
      const now = new Date();
      viewMonth = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}`;
      box.dataset.viewMonth = viewMonth;
  }

  const [y, m] = viewMonth.split('-');
  const year = parseInt(y, 10);
  const month = parseInt(m, 10) - 1;

  let html = `
  <div class="flex items-center justify-between mb-3 bg-stone-50 rounded-xl p-1 border border-stone-100">
      <button type="button" onclick="changeCalendarMonth(this, -1)" class="w-8 h-8 flex items-center justify-center text-stone-500 hover:bg-white hover:shadow-sm rounded-lg transition-all font-black text-lg">‹</button>
      <input type="month" value="${viewMonth}" onchange="changeCalendarMonthTo(this)" class="font-black text-stone-700 bg-transparent border-none outline-none text-center cursor-pointer">
      <button type="button" onclick="changeCalendarMonth(this, 1)" class="w-8 h-8 flex items-center justify-center text-stone-500 hover:bg-white hover:shadow-sm rounded-lg transition-all font-black text-lg">›</button>
  </div>`;

  html += `<div class="grid grid-cols-7 gap-1 text-center text-xs mb-4">`;
  ['日','一','二','三','四','五','六'].forEach(day => {
      html += `<div class="font-bold text-stone-400 py-1.5">${day}</div>`;
  });

  const firstDay = new Date(year, month, 1).getDay();
  const daysInMonth = new Date(year, month + 1, 0).getDate();

  for(let i=0; i<firstDay; i++) { html += `<div></div>`; }
  
  for(let d=1; d<=daysInMonth; d++) {
      const dateStr = `${year}-${String(month+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
      const isSelected = selectedDates.includes(dateStr);
      const activeClass = isSelected 
        ? 'bg-[#5B7290] text-white font-black shadow-md border-[#5B7290]' 
        : 'bg-white text-stone-700 border-stone-100 hover:border-stone-300 hover:bg-stone-50 font-semibold';
      html += `<button type="button" onclick="toggleCalendarDate(this, '${dateStr}')" class="aspect-square rounded-xl border flex items-center justify-center ${activeClass} transition-all text-sm">${d}</button>`;
  }
  html += `</div>`;

  html += `
  <div class="grid grid-cols-2 gap-2 pt-4 border-t border-stone-100">
      <button type="button" onclick="selectMonthWeekdays(this)" class="h-10 text-xs font-black bg-stone-50 border border-stone-200 text-stone-600 rounded-xl hover:bg-white transition-colors">選取平日</button>
      <button type="button" onclick="selectMonthWeekends(this)" class="h-10 text-xs font-black bg-stone-50 border border-stone-200 text-stone-600 rounded-xl hover:bg-white transition-colors">選取週末</button>
      <button type="button" onclick="clearMonthDates(this)" class="h-10 text-xs font-black text-red-500 bg-red-50 border border-red-100 rounded-xl hover:bg-red-100 transition-colors col-span-2">清除本月設定</button>
  </div>`;
  calContainer.innerHTML = html;

  const groups = {};
  selectedDates.sort().forEach(date => {
      const my = date.substring(0, 7); 
      if(!groups[my]) groups[my] = [];
      groups[my].push(date);
  });

  if (selectedDates.length === 0) {
      tagsContainer.innerHTML = `<div class="text-stone-400 font-bold text-sm h-full flex items-center justify-center py-10">目前沒有選取任何日期</div>`;
  } else {
      let tagsHtml = '';
      for(const [grpMonth, dates] of Object.entries(groups)) {
          tagsHtml += `<div class="mb-5 last:mb-0 bg-white p-3 rounded-2xl border border-stone-100 shadow-sm">
              <div class="text-[13px] font-black text-stone-500 tracking-widest mb-3 border-b border-stone-50 pb-2">${grpMonth.replace('-','年')}月 <span class="text-stone-400 font-bold">(${dates.length}天)</span></div>
              <div class="flex flex-wrap gap-2">
                  ${dates.map(date => {
                      const d = new Date(date);
                      const w = ['日','一','二','三','四','五','六'][d.getDay()];
                      const dayStr = date.split('-')[2];
                      return `<span class="inline-flex items-center gap-1 rounded-full border border-stone-200 bg-stone-50 px-3 py-1.5 text-sm font-black text-stone-700 hover:bg-white transition-colors">
                          ${dayStr} <span class="text-stone-400 text-xs">(${w})</span>
                          <button type="button" onclick="toggleCalendarDate(this, '${date}')" class="text-stone-400 hover:text-red-500 w-5 h-5 flex items-center justify-center rounded-full hover:bg-red-50 ml-1 transition-colors" title="移除">×</button>
                      </span>`;
                  }).join('')}
              </div>
          </div>`;
      }
      tagsContainer.innerHTML = tagsHtml;
  }
}

function toggleCalendarDate(btn, dateStr) {
  const box = btn.closest('[data-setting-row]');
  let dates = getSettingDates(box);
  if (dates.includes(dateStr)) {
      dates = dates.filter(d => d !== dateStr);
  } else {
      dates.push(dateStr);
  }
  setSettingDates(box, dates);
  markUnsaved('settings');
  updateSettingCalendarAndTags(box);
}

function changeCalendarMonth(btn, delta) {
  const box = btn.closest('[data-setting-row]');
  let [y, m] = box.dataset.viewMonth.split('-');
  let date = new Date(y, m - 1 + delta, 1);
  box.dataset.viewMonth = `${date.getFullYear()}-${String(date.getMonth()+1).padStart(2,'0')}`;
  updateSettingCalendarAndTags(box);
}

function changeCalendarMonthTo(input) {
  if(!input.value) return;
  const box = input.closest('[data-setting-row]');
  box.dataset.viewMonth = input.value;
  updateSettingCalendarAndTags(box);
}

function getMonthDatesByCondition(box, conditionFn) {
  const [y, m] = box.dataset.viewMonth.split('-');
  const year = parseInt(y, 10);
  const month = parseInt(m, 10) - 1;
  const daysInMonth = new Date(year, month + 1, 0).getDate();
  const result = [];
  for(let d=1; d<=daysInMonth; d++) {
      const date = new Date(year, month, d);
      if (conditionFn(date)) {
          result.push(`${year}-${String(month+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`);
      }
  }
  return result;
}

function selectMonthWeekdays(btn) {
  const box = btn.closest('[data-setting-row]');
  const targetDates = getMonthDatesByCondition(box, d => d.getDay() >= 1 && d.getDay() <= 5);
  mergeSettingDatesAndRender(box, targetDates);
}

function selectMonthWeekends(btn) {
  const box = btn.closest('[data-setting-row]');
  const targetDates = getMonthDatesByCondition(box, d => d.getDay() === 0 || d.getDay() === 6);
  mergeSettingDatesAndRender(box, targetDates);
}

function clearMonthDates(btn) {
  const box = btn.closest('[data-setting-row]');
  const [y, m] = box.dataset.viewMonth.split('-');
  const prefix = `${y}-${m}-`;
  let dates = getSettingDates(box).filter(d => !d.startsWith(prefix));
  setSettingDates(box, dates);
  markUnsaved('settings');
  updateSettingCalendarAndTags(box);
}

function mergeSettingDatesAndRender(box, newDates) {
  let current = getSettingDates(box);
  const merged = Array.from(new Set([...current, ...newDates]));
  setSettingDates(box, merged);
  markUnsaved('settings');
  updateSettingCalendarAndTags(box);
}

function copyDatesFromSetting(btn, sourceLabel) {
  const box = btn.closest('[data-setting-row]');
  const targetLabel = box.dataset.settingName;
  const sourceBox = document.querySelector(`[data-setting-row][data-setting-name="${sourceLabel}"]`);
  
  if (!sourceBox) return;

  showAdminConfirm(`確定要將【${sourceLabel}】的日期完全覆蓋到【${targetLabel}】嗎？\n(此操作將會清除原本的設定)`, () => {
      const sourceDates = getSettingDates(sourceBox);
      setSettingDates(box, sourceDates);
      markUnsaved('settings');
      updateSettingCalendarAndTags(box);
      showAdminToast(`已成功從 ${sourceLabel} 複製日期`, 'success');
  }, "複製設定");
}

function clearSettingDates(button) {
  showAdminConfirm("確定要清空所有日期設定嗎？這會刪除所有月份的資料。", () => {
    const box = button.closest('[data-setting-row]');
    setSettingDates(box, []);
    markUnsaved('settings');
    updateSettingCalendarAndTags(box);
  }, "清空所有日期");
}

/* ========================================================= */

function getEditableTableMinWidth(tab) {
  if (tab === "products") return "min-w-[2680px]";
  if (tab === "packaging") return "min-w-[820px]";
  if (tab === "coupons") return "min-w-[980px]";
  return "min-w-[720px]";
}

function getEditableTableColgroup(tab, keys) {
  const widthMap = {
    products: { name: "190px", price: "70px", stock: "70px", type: "105px", display: "82px", shipping_rule: "112px", sort: "60px", description: "300px", ingredients: "330px", allergens: "300px", storage: "300px", weight: "80px", nutrition: "380px", origin_manufacturer: "320px" },
    packaging: { name: "280px", extra_price: "85px", box_size: "80px", type: "115px", display: "82px", sort: "70px" },
    coupons: { code: "34%", type: "160px", value: "110px", min_spend: "110px", start_date: "150px", end_date: "150px" }
  };
  return `<colgroup>${keys.map(key => `<col style="width:${widthMap[tab]?.[key] || '160px'}">`).join("")}<col style="width:56px"></colgroup>`;
}

function renderEditableTable(tab, sheetName, keys, labels, rows, textareaLong = false) {
  const id = "tab-" + tab;
  const isProductOrPackaging = tab === "products" || tab === "packaging";
  const productNamingNotice = tab === "products" ? `<div class="rounded-2xl bg-stone-50 border border-stone-100 p-3 text-xs text-stone-500 font-bold leading-relaxed space-y-1"><p>商品類型：組合商品／單品｜配送規則：自取與宅配／僅自取／僅宅配｜上架狀態可直接點擊開關切換。</p></div>` : "";
  const couponOperationNotice = tab === "coupons" ? `<p class="text-xs text-stone-500 font-bold leading-relaxed">現折金額請直接輸入金額，例如 100；折扣比例請輸入小數，例如 0.9 代表 9 折。</p>` : "";
  const stats = isProductOrPackaging ? getEditableTableStats(rows) : null;
  const searchBox = isProductOrPackaging ? `<div class="flex flex-col md:flex-row md:items-center gap-2 md:justify-end"><div id="${tab}Stats" class="text-sm text-stone-500 font-bold whitespace-nowrap">共 ${stats.total} 個${tab === "products" ? "商品" : "包裝"}｜上架 ${stats.active}｜下架 ${stats.inactive}</div><input type="search" id="${tab}Search" oninput="filterEditableTable('${tab}')" class="admin-edit-search h-10 rounded-xl border border-stone-200 px-3 bg-stone-50 text-sm font-bold" placeholder="搜尋${tab === "products" ? "商品" : "包裝"}"></div>` : "";

  document.getElementById(id).innerHTML = `
    <div class="bg-white rounded-3xl border border-stone-100 shadow-sm p-4 md:p-5 space-y-4">
      <div class="flex flex-col md:flex-row md:items-center justify-between gap-3">
        <div><h2 class="text-xl font-black text-stone-900">${sheetName}</h2><p class="text-sm text-stone-500 mt-1">修改後請按「儲存 ${sheetName}」。</p></div>
        <div class="flex flex-col md:flex-row md:items-center gap-2">
          ${searchBox}
          <div class="flex gap-2">
            <button onclick="addRow('${tab}')" class="h-10 rounded-xl border border-stone-200 px-4 font-black text-stone-600 bg-white hover:bg-stone-50">新增一列</button>
            <button onclick="saveSheet('${tab}','${sheetName}', this)" class="h-10 rounded-xl bg-[#5B7290] text-white px-4 font-black hover:bg-[#3E4F66]">儲存 ${sheetName}</button>
          </div>
        </div>
      </div>
      ${productNamingNotice}${couponOperationNotice}
      <div class="overflow-x-auto max-h-[70vh]">
        <table class="w-full text-sm table-fixed ${getEditableTableMinWidth(tab)}" data-edit-table="${tab}" data-keys="${keys.join(",")}">
          ${getEditableTableColgroup(tab, keys)}
          <thead><tr class="text-left text-xs tracking-widest text-stone-400">${labels.map(l => `<th class="px-2 py-2 whitespace-nowrap bg-white">${l}</th>`).join("")}<th class="px-1 py-2 bg-white"></th></tr></thead>
          <tbody>${rows.map(row => editRowHtml(tab, keys, row, textareaLong)).join("")}</tbody>
        </table>
      </div>
    </div>`;
  if (isProductOrPackaging) {
    requestAnimationFrame(() => {
      document.querySelectorAll(`#${id} tbody tr`).forEach(updateEditableRowState);
      updateEditableTableStats(tab);
    });
  }
}

function getAdminCellClass(tab, key) {
  if (tab === "products") {
    if (["price", "stock", "sort"].includes(key)) return "w-[70px]";
    if (key === "weight") return "w-[90px]";
    if (["type", "display", "shipping_rule"].includes(key)) return "";
    return "";
  }
  if (tab === "packaging" && ["extra_price", "box_size", "sort"].includes(key)) return "";
  if (tab === "coupons" && ["value", "min_spend"].includes(key)) return "";
  return "min-w-[140px]";
}

function deleteAdminRow(button, tab) {
  showAdminConfirm('確定要刪除這列嗎？', () => {
    button.closest('tr').remove(); updateEditableTableStats(tab); markUnsaved(tab);
  }, '刪除確認');
}

function editRowHtml(tab, keys, row = {}, textareaLong = false) {
  const rowAttr = tab === "coupons" && (row.code || "").toString().trim() ? ` data-coupon-code="${escapeHtml((row.code || "").toString().trim())}"` : "";
  const displayValue = row.display === undefined || row.display === "" ? "TRUE" : row.display;
  const inactiveClass = (tab === "products" || tab === "packaging") && !isDisplayOn(displayValue) ? " is-inactive" : "";

  return `<tr class="admin-edit-row border-t border-stone-100 transition-colors${inactiveClass}"${rowAttr}>${keys.map((key, idx) => {
    const val = row[key] || "";
    let field = "";

    if ((tab === "products" || tab === "packaging") && key === "type") {
      const cleanVal = (val || "combo").toString().trim().toLowerCase();
      field = `<select data-key="${key}" class="w-full h-10 rounded-xl border border-stone-200 px-3 bg-stone-50"><option value="combo" ${cleanVal === "combo" ? "selected" : ""}>組合商品</option><option value="single" ${cleanVal === "single" ? "selected" : ""}>單品</option></select>`;
    } else if ((tab === "products" || tab === "packaging") && key === "display") {
      const on = isDisplayOn(val === undefined || val === "" ? "TRUE" : val);
      field = `${renderDisplaySwitch(on)}<input type="hidden" data-key="${key}" value="${on ? "TRUE" : "FALSE"}">`;
    } else if (tab === "products" && key === "stock") {
      field = `<input data-key="${key}" type="number" inputmode="numeric" oninput="updateStockInputClass(this)" class="w-full h-10 rounded-xl border border-stone-200 px-3 bg-stone-50 ${stockInputClass(val)}" value="${escapeHtml(val)}">`;
    } else if (tab === "products" && key === "shipping_rule") {
      const cleanVal = (val || "all").toString().trim().toLowerCase();
      field = `<select data-key="${key}" class="w-full h-10 rounded-xl border border-stone-200 px-3 bg-stone-50"><option value="all" ${cleanVal === "all" ? "selected" : ""}>自取與宅配</option><option value="pickup" ${cleanVal === "pickup" ? "selected" : ""}>僅自取</option><option value="delivery" ${cleanVal === "delivery" ? "selected" : ""}>僅宅配</option></select>`;
    } else if (tab === "products" && ["description","ingredients","allergens","storage","nutrition","origin_manufacturer"].includes(key)) {
      const heightClass = key === "nutrition" ? "min-h-[112px]" : "min-h-[72px]";
      field = `<textarea data-key="${key}" class="w-full ${heightClass} rounded-xl border border-stone-200 px-3 py-2 bg-stone-50 leading-relaxed">${escapeHtml(val)}</textarea>`;
    } else if (tab === "coupons" && key === "type") {
      field = `<select data-key="${key}" class="w-full h-10 rounded-xl border border-stone-200 px-3 bg-stone-50"><option value="minus" ${val === "minus" ? "selected" : ""}>現折金額</option><option value="discount" ${val === "discount" ? "selected" : ""}>折扣比例</option></select>`;
    } else if (tab === "coupons" && (key === "start_date" || key === "end_date")) {
      field = `<input type="date" data-key="${key}" class="w-full h-10 rounded-xl border border-stone-200 px-3 bg-stone-50" value="${normalizeOrderDateForCompare(val)}">`;
    } else if (textareaLong && idx === 1) {
      field = `<textarea data-key="${key}" class="w-full rounded-xl border border-stone-200 px-3 py-2 bg-stone-50">${escapeHtml(val)}</textarea>`;
    } else {
      field = `<input data-key="${key}" class="w-full h-10 rounded-xl border border-stone-200 px-3 bg-stone-50" value="${escapeHtml(val)}">`;
    }

    return `<td class="px-2 py-2 align-top ${getAdminCellClass(tab, key)}">${field}</td>`;
  }).join("")}<td class="px-1 py-2 align-top text-center"><button type="button" onclick="deleteAdminRow(this, '${tab}')" title="刪除" aria-label="刪除" class="inline-flex h-10 w-10 items-center justify-center rounded-xl bg-red-50 text-red-500 font-black hover:bg-red-100">✕</button></td></tr>`;
}

function isDisplayOn(value) {
  const v = (value ?? "").toString().trim().toUpperCase();
  return v !== "FALSE" && v !== "0" && v !== "下架";
}

function renderDisplaySwitch(on) {
  return `<button type="button" onclick="toggleDisplaySwitch(this)" class="admin-switch ${on ? "is-on" : ""}" aria-label="${on ? "上架" : "下架"}" title="${on ? "上架" : "下架"}"><span></span></button>`;
}

function toggleDisplaySwitch(button) {
  const input = button.parentElement.querySelector('input[data-key="display"]');
  const nextOn = !button.classList.contains("is-on");
  button.classList.toggle("is-on", nextOn);
  button.setAttribute("aria-label", nextOn ? "上架" : "下架");
  button.setAttribute("title", nextOn ? "上架" : "下架");
  if (input) input.value = nextOn ? "TRUE" : "FALSE";
  
  const row = button.closest("tr");
  updateEditableRowState(row);
  
  const table = button.closest("table[data-edit-table]");
  if (table) {
    updateEditableTableStats(table.dataset.editTable);
    markUnsaved(table.dataset.editTable);
  }
}

function updateEditableRowState(row) {
  if (!row) return;
  const displayInput = row.querySelector('input[data-key="display"]');
  if (displayInput) row.classList.toggle("is-inactive", !isDisplayOn(displayInput.value));
  const stockInput = row.querySelector('input[data-key="stock"]');
  if (stockInput) updateStockInputClass(stockInput);
}

function stockInputClass(value) {
  const n = Number(value || 0);
  if (!isNaN(n) && n <= 0) return "admin-stock-zero";
  if (!isNaN(n) && n <= 5) return "admin-stock-low";
  return "";
}

function updateStockInputClass(input) {
  if (!input) return;
  input.classList.remove("admin-stock-zero", "admin-stock-low");
  const cls = stockInputClass(input.value);
  if (cls) input.classList.add(cls);
}

function getEditableTableStats(rows) {
  const list = rows || [];
  const total = list.length;
  const active = list.filter(row => isDisplayOn(row.display === undefined || row.display === "" ? "TRUE" : row.display)).length;
  return { total, active, inactive: total - active };
}

function updateEditableTableStats(tab) {
  if (!(tab === "products" || tab === "packaging")) return;
  const table = document.querySelector(`[data-edit-table="${tab}"]`);
  const statsEl = document.getElementById(`${tab}Stats`);
  if (!table || !statsEl) return;
  const rows = [...table.querySelectorAll("tbody tr")];
  const total = rows.length;
  const active = rows.filter(row => {
    const input = row.querySelector('input[data-key="display"]');
    return !input || isDisplayOn(input.value);
  }).length;
  statsEl.textContent = `共 ${total} 個${tab === "products" ? "商品" : "包裝"}｜上架 ${active}｜下架 ${total - active}`;
}

function filterEditableTable(tab) {
  const table = document.querySelector(`[data-edit-table="${tab}"]`);
  const input = document.getElementById(`${tab}Search`);
  if (!table || !input) return;
  const q = input.value.trim().toLowerCase();
  table.querySelectorAll("tbody tr").forEach(row => {
    const text = row.textContent.toLowerCase();
    row.style.display = !q || text.includes(q) ? "" : "none";
  });
}

function addRow(tab) {
  const table = document.querySelector(`[data-edit-table="${tab}"]`);
  const keys = table.dataset.keys.split(",");
  const textareaLong = tab === "settings";
  const defaults = tab === "products" ? { type: "combo", display: "TRUE", shipping_rule: "all", sort: "10" } : tab === "packaging" ? { type: "combo", display: "TRUE", sort: "10" } : {};
  table.querySelector("tbody").insertAdjacentHTML("beforeend", editRowHtml(tab, keys, defaults, textareaLong));
  const newRow = table.querySelector("tbody tr:last-child");
  updateEditableRowState(newRow);
  updateEditableTableStats(tab);
  markUnsaved(tab);
}

function collectRows(tab) {
  const table = document.querySelector(`[data-edit-table="${tab}"]`);
  const keys = table.dataset.keys.split(",");

  if (tab === "settings") {
    return [...table.querySelectorAll("[data-setting-row]")].map(row => {
      const obj = {};
      keys.forEach(key => {
        const input = row.querySelector(`[data-key="${key}"]`);
        obj[key] = input ? input.value.trim() : "";
      });
      return obj;
    });
  }

  return [...table.querySelectorAll("tbody tr")].map(tr => {
    const obj = {};
    keys.forEach(key => {
      const input = tr.querySelector(`[data-key="${key}"]`);
      obj[key] = input ? input.value.trim() : "";
    });
    return obj;
  });
}

async function saveSheet(tab, sheetName, btnElement) {
  const rows = collectRows(tab);
  await postAdmin({ action:"adminReplaceSheetRows", token:getToken(), sheetName, rows }, `${sheetName} 已儲存。`, btnElement);
  clearUnsaved(tab);
}

async function postAdmin(payload, successMessage, buttonElement = null) {
  const restoreButton = setButtonLoading(buttonElement || getActiveActionButton(), "儲存中...");
  const loadingToast = showAdminToast("儲存中...", "loading", 0);
  hideAdminInlineMessage();
  try {
    const res = await fetch(API_URL, { method:"POST", body: JSON.stringify(payload) });
    const data = await res.json();
    if (data.status !== "success") {
      hideAdminInlineMessage();
      removeAdminToast(loadingToast);
      showAdminToast(data.message || "儲存失敗。", "error", 4200);
      return;
    }
    const cleanMessage = (successMessage || data.message || "已儲存。").replace(/。$/, "");
    hideAdminInlineMessage();
    removeAdminToast(loadingToast);
    showAdminToast(cleanMessage, "success");
    await loadAll();
  } catch (err) {
    hideAdminInlineMessage();
    removeAdminToast(loadingToast);
    showAdminToast("儲存失敗：" + err.message, "error", 4200);
  } finally {
    if (restoreButton) restoreButton();
  }
}

document.getElementById("adminPassword").addEventListener("keydown", e => { if (e.key === "Enter") adminLogin(); });
if (getToken()) { setLoggedInState(true); loadAll(); }
window.addEventListener("resize", syncOrderFilterDetails);
</script>
