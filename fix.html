<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>網站維護中 | System Maintenance</title>
  <style>
    :root {
      --primary-color: #ff6b6b;
      --secondary-color: #4ecdc4;
      --dark-color: #2f3542;
      --light-color: #f7f9fb;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      background-color: var(--light-color);
      color: var(--dark-color);
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 20px;
    }

    .container {
      background: #ffffff;
      max-width: 600px;
      width: 100%;
      padding: 40px 30px;
      border-radius: 16px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
      text-align: center;
    }

    /* 動態齒輪圖示 */
    .icon-container {
      position: relative;
      width: 80px;
      height: 80px;
      margin: 0 auto 25px;
    }

    .gear {
      width: 100%;
      height: 100%;
      fill: var(--primary-color);
      animation: spin 8s linear infinite;
    }

    @keyframes spin {
      100% {
        transform: rotate(360deg);
      }
    }

    h1 {
      font-size: 2rem;
      margin-bottom: 12px;
      color: var(--dark-color);
    }

    p {
      font-size: 1rem;
      color: #666;
      line-height: 1.6;
      margin-bottom: 25px;
    }

    /* 倒數計時器 */
    .countdown {
      display: flex;
      justify-content: center;
      gap: 15px;
      margin-bottom: 30px;
    }

    .time-box {
      background: #f1f3f5;
      padding: 12px 16px;
      border-radius: 10px;
      min-width: 70px;
    }

    .time-box .num {
      font-size: 1.5rem;
      font-weight: bold;
      color: var(--primary-color);
      display: block;
    }

    .time-box .label {
      font-size: 0.75rem;
      color: #888;
      text-transform: uppercase;
    }

    /* 追蹤 / 訂閱區塊 */
    .subscribe-box {
      display: flex;
      gap: 10px;
      max-width: 400px;
      margin: 0 auto 20px;
    }

    .subscribe-box input {
      flex: 1;
      padding: 12px 16px;
      border: 1px solid #ddd;
      border-radius: 8px;
      font-size: 0.95rem;
      outline: none;
      transition: border 0.3s;
    }

    .subscribe-box input:focus {
      border-color: var(--primary-color);
    }

    .subscribe-box button {
      background: var(--primary-color);
      color: white;
      border: none;
      padding: 12px 20px;
      border-radius: 8px;
      font-weight: bold;
      cursor: pointer;
      transition: background 0.3s;
    }

    .subscribe-box button:hover {
      background: #ee5253;
    }

    .footer-note {
      font-size: 0.85rem;
      color: #999;
    }

    .footer-note a {
      color: var(--secondary-color);
      text-decoration: none;
    }

    .footer-note a:hover {
      text-decoration: underline;
    }

    @media (max-width: 480px) {
      .container {
        padding: 30px 20px;
      }

      .subscribe-box {
        flex-direction: column;
      }

      .subscribe-box button {
        width: 100%;
      }
    }
  </style>
</head>
<body>

  <div class="container">
    <!-- SVG 動態齒輪 -->
    <div class="icon-container">
      <svg class="gear" viewBox="0 0 24 24">
        <path d="M19.14,12.94c0.04-0.3,0.06-0.61,0.06-0.94c0-0.32-0.02-0.64-0.07-0.94l2.03-1.58c0.18-0.14,0.23-0.41,0.12-0.61 l-1.92-3.32c-0.12-0.22-0.37-0.29-0.59-0.22l-2.39,0.96c-0.5-0.38-1.03-0.7-1.62-0.94L14.4,2.81c-0.04-0.24-0.24-0.41-0.48-0.41 h-3.84c-0.24,0-0.43,0.17-0.47,0.41L9.25,5.35C8.66,5.59,8.12,5.92,7.63,6.29L5.24,5.33c-0.22-0.08-0.47,0-0.59,0.22L2.73,8.87 C2.62,9.08,2.66,9.34,2.86,9.48l2.03,1.58C4.84,11.36,4.8,11.69,4.8,12s0.02,0.64,0.07,0.94l-2.03,1.58 c-0.18,0.14-0.23,0.41-0.12,0.61l1.92,3.32c0.12,0.22,0.37,0.29,0.59,0.22l2.39-0.96c0.5,0.38,1.03,0.7,1.62,0.94l0.36,2.54 c0.05,0.24,0.24,0.41,0.48,0.41h3.84c0.24,0,0.44-0.17,0.47-0.41l0.36-2.54c0.59-0.24,1.13-0.56,1.62-0.94l2.39,0.96 c0.22,0.08,0.47,0,0.59-0.22l1.92-3.32c0.12-0.22,0.07-0.47-0.12-0.61L19.14,12.94z M12,15.6c-1.98,0-3.6-1.62-3.6-3.6 s1.62-3.6,3.6-3.6s3.6,1.62,3.6,3.6S13.98,15.6,12,15.6z"/>
      </svg>
    </div>

    <h1>網站升級維護中</h1>
    <p>為了提供更好的服務品質，我們正在進行系統升級與維護。<br>造成不便，敬請見諒！</p>

    <!-- 倒數計時器區塊 -->
    <div class="countdown">
      <div class="time-box">
        <span class="num" id="hours">02</span>
        <span class="label">小時</span>
      </div>
      <div class="time-box">
        <span class="num" id="minutes">45</span>
        <span class="label">分鐘</span>
      </div>
      <div class="time-box">
        <span class="num" id="seconds">30</span>
        <span class="label">秒</span>
      </div>
    </div>

    <!-- 重新上線通知 -->
    <div class="subscribe-box">
      <input type="email" placeholder="輸入您的 Email，上線第一時間通知您" required>
      <button type="button" onclick="alert('感謝您的訂閱！網站上線時會發送通知給您。')">訂閱通知</button>
    </div>

    <p class="footer-note">如需緊急協助，請聯繫 <a href="mailto:support@example.com">客服信箱</a></p>
  </div>

  <script>
    // 簡單的模擬倒數計時功能（設定為 3 小時倒數）
    let targetTime = new Date().getTime() + (2 * 60 * 60 * 1000) + (45 * 60 * 1000) + (30 * 1000);

    const timer = setInterval(function() {
      const now = new Date().getTime();
      const diff = targetTime - now;

      if (diff <= 0) {
        clearInterval(timer);
        document.querySelector('.countdown').innerHTML = "<p style='color:var(--secondary-color); font-weight:bold;'>維護已完成，即將重新載入...</p>";
        return;
      }

      const hours = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
      const minutes = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
      const seconds = Math.floor((diff % (1000 * 60)) / 1000);

      document.getElementById("hours").innerText = String(hours).padStart(2, '0');
      document.getElementById("minutes").innerText = String(minutes).padStart(2, '0');
      document.getElementById("seconds").innerText = String(seconds).padStart(2, '0');
    }, 1000);
  </script>

</body>
</html>
